<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mobile Service OS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0B0B0B" />
  <style>html,body{margin:0;background:#0a0a0f;color:#f0f0fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
  <script>
    // GitHub Pages SPA fallback. The base path MUST match Vite's `base` config.
    // Pages serves 404.html when no static file matches the URL; we use it to
    // bounce deep links back into the SPA, preserving the original path.
    (function () {
      var BASE = '/mobileserviceos/';
      try {
        var path = location.pathname + location.search + location.hash;
        if (path.indexOf(BASE) === 0) {
          sessionStorage.setItem('msos_redirect', path);
        }
      } catch (e) {}
      location.replace(BASE);
    })();
  </script>
</head>
<body>
  <noscript>
    <p style="text-align:center;margin-top:40px;padding:0 20px">
      Mobile Service OS requires JavaScript.
      <a href="/mobileserviceos/" style="color:#c8a44a">Open the app</a>.
    </p>
  </noscript>
</body>
</html>
