<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mobile Service OS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0B0B0B" />
  <style>html,body{margin:0;background:#0a0a0f;color:#f0f0fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
  <script>
    // SPA deep-link fallback. GitHub Pages serves this 404.html whenever
    // no static file matches the requested URL. We use it to bounce a
    // deep link back into the single-page app while preserving the
    // original path (index.html reads `msos_redirect` on boot and
    // restores it via history.replaceState).
    //
    // BASE is '/' — the app is served from the custom-domain root
    // (https://app.mobileserviceos.app). It must match Vite's `base`.
    (function () {
      var BASE = '/';
      try {
        var path = location.pathname + location.search + location.hash;
        // Stash the original deep-link path so index.html can restore it.
        // Skip storing when we're already at the bare root.
        if (path && path !== BASE) {
          sessionStorage.setItem('msos_redirect', path);
        }
      } catch (e) {}
      location.replace(BASE);
    })();
  </script>
</head>
<body>
  <noscript>
    <p style="text-align:center;margin-top:40px;padding:0 20px">
      Mobile Service OS requires JavaScript.
      <a href="/" style="color:#c8a44a">Open the app</a>.
    </p>
  </noscript>
</body>
</html>
