name: CI
# Runs on every PR + every push to main. The PR run is the gate; branch
# protection on `main` should require this workflow to pass before merge.
# The push-to-main run is a safety net for direct commits.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
# Saves CI minutes during rapid debugging.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 matches deploy.yml. Node 20 actions hit a deprecation
      # notice on GitHub-hosted runners (forced to Node 24 on June 2nd
      # 2026); 22 is the current LTS.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Note: no `cache: 'npm'` here because cache requires package-lock.json
          # to compute the cache key. Once a lockfile is committed, add it back.

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` because the repo does not
        # currently commit package-lock.json. Once a lockfile is added, switch
        # this back to `npm ci` for reproducible installs.
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      # Build with the same base path as production to catch any path-related
      # regressions before merge. VITE_BASE_PATH=/ matches the custom-domain
      # deployment at app.mobileserviceos.app.
      - name: Production build
        env:
          VITE_BASE_PATH: /
        run: npm run build

      # Guardrail: catches the recurring un-awaited generateInvoicePDF
      # regression. `continue-on-error: true` keeps this advisory — if the
      # grep heuristic has a false positive (comments, formatting changes,
      # etc.) the build still passes. The check still appears as a warning
      # in the workflow summary so real misses get flagged.
      - name: Lint critical async patterns
        continue-on-error: true
        run: |
          # Look for `generateInvoicePDF(` calls (not imports, not type refs).
          # Strip preceding `await ` matches, comment lines, and JSDoc lines.
          # Anything left is an un-awaited call site and a real regression.
          MATCHES=$(grep -nE "(^|[^a-zA-Z_])generateInvoicePDF\(" src/App.tsx \
            | grep -v "await generateInvoicePDF" \
            | grep -vE "^[0-9]+:\s*(//|\*|/\*)" \
            | grep -vE "^[0-9]+:\s*import" \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::warning::Possible un-awaited generateInvoicePDF callsite in App.tsx:"
            echo "$MATCHES"
            echo "::warning::If these are false positives (e.g. comments), the build still proceeds."
          else
            echo "✓ All generateInvoicePDF callsites properly awaited."
          fi
