# Mobile Service OS — Deploy to GitHub Pages
# Repository: MobileServiceOS/mobileserviceos
# Production:  https://app.mobileserviceos.app  (custom domain, served from root)
#
# One-time GitHub setup (in repo Settings → Pages):
#   1. Source: "GitHub Actions"
#   2. (Optional) Add repository secrets for Firebase env (see "env" block below).
#      Without them, the build falls back to the dev project hard-coded in src/lib/firebase.ts.
#
# Triggers:
#   - push to main
#   - manual dispatch from the Actions tab

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys need these scopes; nothing else does.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs from the same branch — the latest commit wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Node 20 runtime deprecation safety net.
# actions/checkout + setup-node are pinned to v5 (native Node 24).
# The GitHub Pages actions (configure-pages, upload-pages-artifact,
# deploy-pages) have not yet shipped Node 24 releases as of mid-2026.
# Setting this flag forces ANY action still bundled on Node 20 to run
# on the Node 24 runtime instead — GitHub's documented opt-in ahead of
# the June 2, 2026 enforced cutover. Safe to keep after the cutover;
# it becomes a no-op once all actions ship Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # Cache only when a lockfile exists; setup-node@v4 fails the step
          # otherwise. The shell expression resolves to 'npm' or '' at runtime.
          cache: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' && 'npm' || '' }}

      # Install: prefer reproducible `npm ci` when a lockfile is committed,
      # fall back to `npm install` otherwise (first-deploy scenario).
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — using npm ci"
            npm ci --no-audit --no-fund
          else
            echo "No lockfile — using npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build
        run: |
          # Vite base path defaults to '/' (custom domain root —
          # https://app.mobileserviceos.app). No VITE_BASE_PATH override:
          # setting it to a subpath would prefix every asset URL with that
          # subpath and 404 on the custom domain.
          #
          # Firebase config lives in .env.production (committed). For private
          # white-label deploys, set repo secrets and they override at build time.
          # Empty secrets are filtered out so .env.production stays authoritative.
          if [ -n "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.production.local
            echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env.production.local
            echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env.production.local
            echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env.production.local
            echo "Using Firebase config from repo secrets."
          else
            echo "Using Firebase config from .env.production (committed)."
          fi
          # Stripe price IDs — separate from Firebase so each can be
          # added/rotated independently. Empty values are tolerated:
          # the SubscribeButton renders a "Billing coming soon" disabled
          # state when the relevant price ID isn't present.
          if [ -n "${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}" ]; then
            echo "VITE_STRIPE_PRO_PRICE_ID=${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}" >> .env.production.local
            echo "Pro price ID injected."
          fi
          if [ -n "${{ secrets.VITE_STRIPE_CORE_PRICE_ID }}" ]; then
            echo "VITE_STRIPE_CORE_PRICE_ID=${{ secrets.VITE_STRIPE_CORE_PRICE_ID }}" >> .env.production.local
            echo "Core price ID injected."
          fi
          npm run build

      # GitHub Pages disables Jekyll only when .nojekyll is at the published root.
      # Vite copies public/.nojekyll into dist automatically — verify and re-create
      # if missing so a stripped checkout never produces a Jekyll-processed deploy.
      - name: Ensure .nojekyll
        run: touch dist/.nojekyll

      # Sanity-check: verify the build produced the entry HTML and that asset
      # references use the correct base path. Fails the deploy fast on misconfig.
      - name: Verify build output
        run: |
          set -e
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/manifest.webmanifest || { echo "::error::manifest missing"; exit 1; }
          test -f dist/sw.js || { echo "::error::service worker missing"; exit 1; }
          test -f dist/404.html || { echo "::error::SPA 404 fallback missing"; exit 1; }
          test -d dist/icons || { echo "::error::icons folder missing"; exit 1; }
          # Asset-path sanity: the custom domain serves from root, so
          # built asset references must point at /assets/... — NEVER a
          # /mobileserviceos/ subpath. A subpath here means a stale
          # VITE_BASE_PATH leaked in and every asset would 404 in prod.
          #
          # IMPORTANT: only inspect ASSET REFERENCE attributes
          # (src="..."/href="...) — not the whole file. index.html
          # legitimately contains the literal string "/mobileserviceos/"
          # inside the service-worker migration script (it detects and
          # unregisters the OLD GitHub Pages SW scope). A blunt
          # whole-file grep would false-positive on that script.
          if grep -oE '(src|href)="[^"]*"' dist/index.html | grep -q '/mobileserviceos/'; then
            echo "::error::dist/index.html has an asset reference under /mobileserviceos/ — Vite base path must be '/' for the custom domain"
            grep -oE '(src|href)="[^"]*"' dist/index.html | grep '/mobileserviceos/' || true
            exit 1
          fi
          if ! grep -q '/assets/' dist/index.html; then
            echo "::error::dist/index.html has no /assets/ references — build output looks malformed"
            exit 1
          fi
          # Verify the bundled JS embeds the correct Firebase project. Vite
          # inlines `import.meta.env.VITE_*` at build time, so the project ID
          # appears as a string literal in the bundle.
          if ! grep -rq 'mobile-service-os' dist/assets/ 2>/dev/null; then
            echo "::error::Bundled JS does not contain 'mobile-service-os' — Firebase config did not get baked in"
            exit 1
          fi
          echo "Build verification passed."
          echo "::notice::dist size: $(du -sh dist | cut -f1)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
