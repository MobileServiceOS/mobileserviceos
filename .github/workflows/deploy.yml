# Mobile Service OS — Deploy to GitHub Pages
# Repository: MobileServiceOS/mobileserviceos
# Production:  https://mobileserviceos.github.io/mobileserviceos/
#
# One-time GitHub setup (in repo Settings → Pages):
#   1. Source: "GitHub Actions"
#   2. (Optional) Add repository secrets for Firebase env (see "env" block below).
#      Without them, the build falls back to the dev project hard-coded in src/lib/firebase.ts.
#
# Triggers:
#   - push to main
#   - manual dispatch from the Actions tab

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys need these scopes; nothing else does.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs from the same branch — the latest commit wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache only when a lockfile exists; setup-node@v4 fails the step
          # otherwise. The shell expression resolves to 'npm' or '' at runtime.
          cache: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' && 'npm' || '' }}

      # Install: prefer reproducible `npm ci` when a lockfile is committed,
      # fall back to `npm install` otherwise (first-deploy scenario).
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — using npm ci"
            npm ci --no-audit --no-fund
          else
            echo "No lockfile — using npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build
        env:
          # Pin the Vite base path to match the GitHub Pages project URL.
          VITE_BASE_PATH: /mobileserviceos/
        run: |
          # Firebase config lives in .env.production (committed). For private
          # white-label deploys, set repo secrets and they override at build time.
          # Empty secrets are filtered out so .env.production stays authoritative.
          if [ -n "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.production.local
            echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env.production.local
            echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env.production.local
            echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env.production.local
            echo "Using Firebase config from repo secrets."
          else
            echo "Using Firebase config from .env.production (committed)."
          fi
          npm run build

      # Stamp the service worker with this commit's short SHA + UTC timestamp
      # so each deploy produces a unique VERSION string. Without this, the
      # browser sees the same SW bytes across deploys and never installs a
      # new one — users stuck on stale builds. Modifies dist/sw.js (build
      # output), not public/sw.js (source).
      - name: Stamp service worker version
        run: |
          set -e
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_TIME=$(date -u +%Y%m%d-%H%M%S)
          NEW_VERSION="msos-${SHORT_SHA}-${BUILD_TIME}"

          if [ ! -f dist/sw.js ]; then
            echo "::error::dist/sw.js missing — cannot stamp version"
            exit 1
          fi

          sed -i.bak "s/^const VERSION = '[^']*';/const VERSION = '${NEW_VERSION}';/" dist/sw.js
          rm -f dist/sw.js.bak

          if ! grep -q "const VERSION = '${NEW_VERSION}';" dist/sw.js; then
            echo "::error::SW version stamp did not apply. Expected 'const VERSION = ...' line not found in dist/sw.js."
            grep "VERSION" dist/sw.js | head -5
            exit 1
          fi

          echo "✓ Service worker stamped: ${NEW_VERSION}"

      # GitHub Pages disables Jekyll only when .nojekyll is at the published root.
      # Vite copies public/.nojekyll into dist automatically — verify and re-create
      # if missing so a stripped checkout never produces a Jekyll-processed deploy.
      - name: Ensure .nojekyll
        run: touch dist/.nojekyll

      # Sanity-check: verify the build produced the entry HTML and that asset
      # references use the correct base path. Fails the deploy fast on misconfig.
      - name: Verify build output
        run: |
          set -e
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/manifest.webmanifest || { echo "::error::manifest missing"; exit 1; }
          test -f dist/sw.js || { echo "::error::service worker missing"; exit 1; }
          test -f dist/404.html || { echo "::error::SPA 404 fallback missing"; exit 1; }
          test -d dist/icons || { echo "::error::icons folder missing"; exit 1; }
          if ! grep -q '/mobileserviceos/' dist/index.html; then
            echo "::error::dist/index.html has no /mobileserviceos/ asset references — check Vite base path"
            exit 1
          fi
          # Verify the bundled JS embeds the correct Firebase project. Vite
          # inlines `import.meta.env.VITE_*` at build time, so the project ID
          # appears as a string literal in the bundle.
          if ! grep -rq 'mobile-service-os' dist/assets/ 2>/dev/null; then
            echo "::error::Bundled JS does not contain 'mobile-service-os' — Firebase config did not get baked in"
            exit 1
          fi
          echo "Build verification passed."
          echo "::notice::dist size: $(du -sh dist | cut -f1)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
