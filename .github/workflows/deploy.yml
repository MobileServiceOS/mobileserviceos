name: Deploy to GitHub Pages
# Custom domain: https://app.mobileserviceos.app (served at root /).
# All guardrails below are advisory (continue-on-error: true) so that
# verification heuristics can never block a deploy — they only print
# diagnostic info into the workflow log.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 is the current LTS. Node 20 GitHub-hosted runners hit a
      # forced-upgrade deprecation on June 2nd 2026.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Lockfile found — using npm ci"
            npm ci --no-audit --no-fund
          else
            echo "No lockfile — using npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build
        env:
          # Custom domain serves at root. Override with /mobileserviceos/
          # to re-enable the legacy GitHub Pages project URL.
          VITE_BASE_PATH: /
        run: |
          # Firebase config: .env.production is the default; repo secrets
          # override when set. Empty secrets fall through to the committed file.
          if [ -n "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.production.local
            echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env.production.local
            echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env.production.local
            echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production.local
            echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env.production.local
            echo "Using Firebase config from repo secrets."
          else
            echo "Using Firebase config from .env.production (committed)."
          fi
          npm run build

      # Stamp the service worker with a unique VERSION per deploy. Forces
      # browsers holding the previous SW to detect a new install. ADVISORY.
      - name: Stamp service worker version
        continue-on-error: true
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_TIME=$(date -u +%Y%m%d-%H%M%S)
          NEW_VERSION="msos-${SHORT_SHA}-${BUILD_TIME}"
          if [ -f dist/sw.js ]; then
            sed -i.bak "s/^const VERSION = '[^']*';/const VERSION = '${NEW_VERSION}';/" dist/sw.js
            rm -f dist/sw.js.bak
            echo "✓ Service worker stamped: ${NEW_VERSION}"
          else
            echo "::warning::dist/sw.js missing — version stamp skipped"
          fi

      # Write CNAME so GitHub Pages serves the custom domain. ADVISORY in
      # case public/CNAME is already present (Vite copies it from public/).
      - name: Write CNAME for custom domain
        continue-on-error: true
        run: echo "app.mobileserviceos.app" > dist/CNAME

      # .nojekyll prevents GitHub Pages from running Jekyll processing.
      - name: Ensure .nojekyll
        continue-on-error: true
        run: touch dist/.nojekyll

      # Diagnostic dump of dist/ contents. Always runs, never fails.
      # If anything's wrong, the log shows exactly what was built.
      - name: List dist/ contents (diagnostic)
        continue-on-error: true
        run: |
          echo "═══ dist/ ═══"
          ls -la dist/ || echo "dist/ missing"
          echo ""
          echo "═══ dist/assets/ ═══"
          ls -la dist/assets/ 2>/dev/null || echo "dist/assets/ missing"
          echo ""
          echo "═══ dist/index.html (first 60 lines) ═══"
          head -60 dist/index.html 2>/dev/null || echo "dist/index.html missing"
          echo ""
          echo "═══ Asset reference check ═══"
          grep -E "src=|href=" dist/index.html 2>/dev/null | head -20 || true
          echo ""
          echo "═══ Size ═══"
          du -sh dist 2>/dev/null || true

      # All sanity checks below are ADVISORY — they print warnings but
      # never block the deploy. Production breakage is caught at the
      # CDN/browser level, not by these heuristics.
      - name: Verify build output (advisory)
        continue-on-error: true
        run: |
          [ -f dist/index.html ] || echo "::warning::dist/index.html missing"
          [ -f dist/manifest.webmanifest ] || echo "::warning::manifest missing"
          [ -f dist/sw.js ] || echo "::warning::service worker missing"
          [ -d dist/icons ] || echo "::warning::icons folder missing"
          [ -d dist/assets ] || echo "::warning::dist/assets/ folder missing"
          if [ -d dist/assets ]; then
            JS_COUNT=$(find dist/assets -name "*.js" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "dist/assets/ JS bundles: ${JS_COUNT}"
          fi
          echo "✓ Diagnostic complete"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
