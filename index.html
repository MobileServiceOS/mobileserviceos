    input,select,textarea{font-size:16px!important}
    button{cursor:pointer}
    /* ── App shell ── */
    .app{height:100%;display:flex;flex-direction:column;background:#f5f5f7}
    /* ── Header ── */
    .hdr{background:#fff;border-bottom:1px solid #efefef;padding:11px 16px;padding-top:calc(11px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
    .hdr-brand{display:flex;align-items:center;gap:10px;min-width:0}
    .hdr-logo{width:34px;height:34px;border-radius:9px;object-fit:contain;flex-shrink:0}
    .hdr-logo-placeholder{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .hdr-name{font-size:15px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hdr-sub{font-size:10px;color:#aaa;margin-top:1px;font-weight:500}
    /* ── Screen ── */
    .screen{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#f5f5f7}
    .page{padding:16px 16px 100px}
    /* ── Typography ── */
    .sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#999;margin:20px 0 10px}
    .sec:first-child{margin-top:0}
    /* ── Cards ── */
    .card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
    .cpad{padding:16px}
    .crow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid #f5f5f5}
    .crow:last-child{border-bottom:none}
    .dk{background:#111;border-radius:16px;padding:18px;margin-bottom:12px;color:#fff}
    /* ── KPIs ── */
    .kgrid{display:grid;gap:2px;background:#e8e8e8;border-radius:16px;overflow:hidden;margin-bottom:12px}
    .kgrid.g2{grid-template-columns:1fr 1fr}
    .kgrid.g3{grid-template-columns:1fr 1fr 1fr}
    .kgrid.g4{grid-template-columns:1fr 1fr 1fr 1fr}
    .kpi{background:#fff;padding:13px 12px}
    .kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:4px}
    .kpi-v{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:700;color:#111;line-height:1.1}
    .kpi-s{font-size:11px;color:#bbb;margin-top:3px}
    /* ── Pills ── */
    .pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;line-height:1.4;gap:4px;white-space:nowrap}
    .p-green{background:#dcfce7;color:#15803d}
    .p-red{background:#fee2e2;color:#dc2626}
    .p-orange{background:#ffedd5;color:#c2410c}
    .p-blue{background:#dbeafe;color:#2563eb}
    .p-gray{background:#f3f4f6;color:#6b7280}
    .p-purple{background:#ede9fe;color:#7c3aed}
    /* ── Buttons ── */
    .btn{border:none;border-radius:12px;padding:14px 18px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:opacity .12s,transform .06s;white-space:nowrap}
    .btn:active{opacity:.8;transform:scale(.98)}
    .b-primary{background:#111;color:#fff}
    .b-secondary{background:#fff;color:#111;border:1.5px solid #e5e5e5}
    .b-danger{background:#fee2e2;color:#dc2626}
    .b-success{background:#dcfce7;color:#15803d}
    .b-accent{background:#ea580c;color:#fff}
    .b-sm{padding:8px 14px;font-size:12px;border-radius:10px}
    .b-xs{padding:5px 10px;font-size:11px;border-radius:8px}
    .b-full{width:100%}
    /* ── Forms ── */
    .field{margin-bottom:14px}
    .flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:7px}
    .finp{width:100%;border:1.5px solid #e8e8e8;background:#fff;border-radius:12px;padding:13px 14px;outline:none;font-size:15px!important;color:#111;transition:border-color .15s;font-family:inherit}

    textarea.finp{min-height:72px;resize:vertical}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .fhint{font-size:11px;color:#bbb;margin-top:5px;line-height:1.5}
    /* ── Goal bar ── */
    .gtrack{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin:10px 0 6px}
    .gfill{height:100%;border-radius:999px;transition:width .4s}
    /* ── Job row ── */
    .jrow{background:#fff;border-radius:14px;padding:13px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .jicon{width:38px;height:38px;border-radius:10px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .jmain{flex:1;min-width:0}
    .jtitle{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .jright{text-align:right;flex-shrink:0}

    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
    .chip{border:1.5px solid #e5e5e5;background:#fff;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:#777;cursor:pointer;transition:all .12s}

    .chip.sm{padding:5px 10px;font-size:11px}

    .ob-content{flex:1;overflow-y:auto;padding:22px 22px 16px;-webkit-overflow-scrolling:touch}

    .ob-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;display:block;margin-bottom:6px}
    .ob-btn{border:none;border-radius:13px;padding:15px;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer;transition:opacity .12s}
    .ob-primary{background:#ea580c;color:#fff}
    .ob-back{background:rgba(255,255,255,.07);color:#555}
    .biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

    .logo-drop{border:2px dashed rgba(255,255,255,.12);border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:10px}

    .stab-bar{display:flex;overflow-x:auto;border-bottom:1px solid #f0f0f0;background:#fff;flex-shrink:0}
    .stab{display:flex;flex-direction:column;align-items:center;padding:10px 14px;border:none;background:none;cursor:pointer;flex-shrink:0;gap:2px;border-bottom:2.5px solid transparent;transition:border-color .15s}
    .stab.on{border-bottom-color:#111}

    .taxbox{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px 14px;margin-top:10px}

    .empty{padding:54px 20px;text-align:center}
    .eico{font-size:44px;margin-bottom:14px;opacity:.55}
    .etitle{font-size:16px;font-weight:700;margin-bottom:6px}
    .esub{font-size:13px;color:#999;line-height:1.6;margin-bottom:18px}
    /* Alert */
    .alert{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;font-weight:600;display:flex;align-items:flex-start;gap:8px}

    .a-green{background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0}
    .a-orange{background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa}

    .step-btn{background:#f5f5f7;border:none;width:36px;height:36px;font-size:18px;font-weight:700;color:#555;cursor:pointer}
    .step-val{width:44px;text-align:center;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;border:none;outline:none;background:#fff}
    /* Sync dot */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .syncing{animation:pulse 1.3s infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:375px){
      .frow{grid-template-columns:1fr}
      .pgrid{grid-template-columns:repeat(2,1fr)}
      .biz-grid{grid-template-columns:1fr}
    }
  </style>

/* ── Workspace-scoped Firestore helpers ─────────────────────────────────────
   Architecture: workspaces/{workspaceId}/jobs | services | expenses | profile
   workspaceId = user.uid (1 workspace per user for now, expandable)
   ─────────────────────────────────────────────────────────────────────────── */
const ws  = uid => _db ? _db.collection('workspaces').doc(uid) : null;
const wc  = (uid,col) => ws(uid) ? ws(uid).collection(col) : null;

function fbListen(c,cb){
  if(!c){cb([]);return ()=>{};}
  return c.onSnapshot(s=>cb(s.docs.map(d=>({...d.data(),id:d.id}))),()=>cb([]));
}
function fbListenDoc(ref,cb){
  if(!ref){cb(null);return ()=>{};}
  return ref.onSnapshot(s=>cb(s.exists()?s.data():null),()=>cb(null));
}
async function fbSet(c,id,data){ try{if(c)await c.doc(String(id)).set({...data,id:String(id)});}catch{} }
async function fbDel(c,id){ try{if(c)await c.doc(String(id)).delete();}catch{} }
async function fbBatch(c,items){
  if(!c||!items.length) return;
  const b=_db.batch();
  items.forEach(i=>b.set(c.doc(String(i.id)),{...i,id:String(i.id)}));
  try{await b.commit();}catch{}
}
async function fbSetDoc(ref,data){ try{if(ref)await ref.set(data,{merge:true});}catch{} }
</script>

// ─── Service deduplication — Map-based (permanent fix) ───────────────────────
// NEVER use [...existing, ...incoming] for services — always use mergeServices().
// mergeServices uses a Map keyed by service.id: latest write wins, no duplicates possible.

function mergeServices(existing, incoming) {
  const map = new Map();
  // existing first (lower priority)
  (existing||[]).forEach(s => { if(s && s.id) map.set(s.id, s); });
  // incoming overwrites (higher priority)
  (incoming||[]).forEach(s => { if(s && s.id) map.set(s.id, s); });
  return Array.from(map.values());
}

// dedupeServices: normalize a single array using Map (removes any duplicates in place)
function dedupeServices(svcs) {
  const map = new Map();
  (svcs||[]).forEach(s => { if(s && s.id) map.set(s.id, s); });
  return Array.from(map.values());
}

// Seed starter services for a business type — called ONCE during onboarding
function makeStarterServices(bizType) {
  const templates = BIZ[bizType]?.services || BIZ.general.services;
  const now = new Date().toISOString();
  return templates.map(t => ({
    ...t, dur:t.dur, active:true, sortOrder:0, source:'seeded',
    businessType:bizType, createdAt:now, updatedAt:now,
  }));
}

// ─── Business logic ───────────────────────────────────────────────────────────
const jDirect  = (j,p) => r2(Number(j.miles||0)*Number(p.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.partsCost||0)+Number(j.miscCost||0)+Number(j.diagFee||0));
const jGross   = (j,p) => r2(Number(j.revenue||0)-jDirect(j,p));
const wFixed   = p => r2((p.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);
const mFixed   = p => (p.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);

function premiums(j,p){
  let x=0;
  if(j.emergency) x+=Number(p.emergencyFee||25);
  if(j.lateNight) x+=Number(p.lateNightFee||25);
  if(j.highway)   x+=Number(p.highwayFee||15);
  if(j.weekend)   x+=Number(p.weekendFee||10);
  if(Number(j.miles||0)>Number(p.riskyMiles||25)) x+=20;
  return x;
}
function suggestedPrice(j,p,svcs){
  const svc=(svcs||[]).find(s=>s.id===j.serviceId)||{};
  const base=Number(svc.basePrice)||Number(p.repairTarget||BIZ[p.businessType||'tire']?.repairTarget||85);
  const direct=jDirect(j,p), prem=premiums(j,p);
  return Math.ceil((Math.max(base,direct+45)+prem)/5)*5;
}
function decision(j,p,svcs,weekGross=0){
  const rev=Number(j.revenue||0)||suggestedPrice(j,p,svcs);
  const profit=r2(rev-jDirect(j,p));
  const skip=Number(p.skipThreshold||65), risky=Number(p.riskyMiles||25);
  const miles=Number(j.miles||0), goal=Number(p.weeklyGoal||1200);
  const pct=goal>0?weekGross/goal:0;
  if(profit<skip) return {label:'Skip',c:'red',why:`Profit ${money(profit)} below min ${money(skip)}`};
  if(pct>=1&&miles>risky) return {label:'Skip',c:'red',why:'Goal hit — skip distance'};
  if(miles>risky&&profit<skip+30) return {label:'Risky',c:'orange',why:`${miles}mi + thin margin`};
  return {label:'Take',c:'green',why:`Profit ${money(profit)}`};
}
function weekSum(wjobs,p){
  const revenue=r2(wjobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const costs  =r2(wjobs.reduce((t,j)=>t+jDirect(j,p),0));
  const gross  =r2(revenue-costs);
  const fixed  =wFixed(p);
  const net    =r2(gross-fixed);
  return {revenue,costs,gross,fixed,net,count:wjobs.length};
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
function wkStart(d){
  const dt=new Date(d+'T00:00:00'),day=dt.getDay();
  dt.setDate(dt.getDate()-(day>=5?day-5:day+2));
  return dt.toISOString().slice(0,10);
}
function wkLabel(s){
  const d=new Date(s+'T00:00:00'),e=new Date(d);
  e.setDate(e.getDate()+6);
  const f=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(d)} – ${f(e)}`;
}
function nextFri(){
  const d=new Date(),diff=d.getDay()===5?7:(5-d.getDay()+7)%7;
  d.setDate(d.getDate()+diff);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function groupWeeks(jobs){
  const m={};
  [...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j=>{const k=wkStart(j.date);if(!m[k])m[k]=[];m[k].push(j);});
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
}

// ─── Logo compress ────────────────────────────────────────────────────────────
function compressLogo(file,maxPx=512,q=0.84){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=rej;
    reader.onload=e=>{
      const img=new Image();
      img.onerror=rej;
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        const ctx=cv.getContext('2d');ctx.clearRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
        res(cv.toDataURL(file.type==='image/png'?'image/png':'image/jpeg',q));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── CSV export ───────────────────────────────────────────────────────────────
function exportCSV(jobs,p){
  const h=['Date','Service','Area','Source','Revenue','Direct Cost','Gross Profit','Miles','Payment','Customer','Phone','Notes'];
  const r=[...jobs].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{
    const dc=jDirect(j,p),gp=jGross(j,p);
    return[j.date,j.serviceName||'',j.area||'',j.source||'',Number(j.revenue||0).toFixed(2),dc.toFixed(2),gp.toFixed(2),Number(j.miles||0).toFixed(1),j.payment||'',j.customerName||'',j.customerPhone||'',(j.note||'').replace(/,/g,' ')].map(v=>`"${v}"`).join(',');
  });
  const csv=[h.join(','),...r].join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a=document.createElement('a');a.href=url;a.download=`msos-jobs-${TODAY()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({jobs,services,profile,setTab,onRepeat}){
  const today=TODAY(), thisWk=wkStart(today);
  const wjobs=useMemo(()=>jobs.filter(j=>wkStart(j.date)===thisWk),[jobs,thisWk]);
  const tjobs=useMemo(()=>jobs.filter(j=>j.date===today),[jobs,today]);
  const tot  =useMemo(()=>weekSum(wjobs,profile),[wjobs,profile]);
  const cfg  =BIZ[profile.businessType]||BIZ.general;
  const avg  =wjobs.length?r2(tot.gross/wjobs.length):0;
  const gPct =clamp((tot.gross/(profile.weeklyGoal||1))*100,0,100);
  const need =avg>0?Math.max(0,Math.ceil(((profile.weeklyGoal||0)-tot.gross)/avg)):'—';
  const ao1  =profile.owner1Active!==false, ao2=profile.owner2Active===true;
  const st   =(ao1?Number(profile.profitSplit1||100):0)+(ao2?Number(profile.profitSplit2||0):0)||100;
  const o1   =tot.net>0&&ao1?r2(tot.net*(Number(profile.profitSplit1||100)/st)):0;
  const o2   =tot.net>0&&ao2?r2(tot.net*(Number(profile.profitSplit2||0)/st)):0;
  const tax  =tot.net>0&&profile.taxRate>0?r2(tot.net*(Number(profile.taxRate)/100)):0;
  const topSrc=useMemo(()=>{const m={};jobs.forEach(j=>{const s=j.source||'Other';m[s]=(m[s]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5);},[jobs]);
  const maxSrc=topSrc.length?topSrc[0][1]:1;
  const last4=useMemo(()=>groupWeeks(jobs).slice(0,4).reverse().map(([wk,wj])=>{const t=weekSum(wj,profile);return{wk,m:t.revenue>0?r2((t.gross/t.revenue)*100):0};}), [jobs,profile]);
  const recent=useMemo(()=>[...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,6),[jobs]);
  const margin=tot.revenue>0?r2((tot.gross/tot.revenue)*100):0;
  const barC  =gPct>=100?'#16a34a':gPct>=60?'#111':'#ea580c';

  return(
    <div className="screen"><div className="page">

      {/* ── Hero profit card ── */}
      <div style={{background:'#111',borderRadius:18,padding:'18px 20px',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'#555',marginBottom:6}}>This Week · Net Profit</div>
          <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:32,fontWeight:800,color:tot.net>=0?'#4ade80':'#f87171',letterSpacing:'-1px',lineHeight:1}}>{money(tot.net)}</div>
          <div style={{fontSize:12,color:'#555',marginTop:6}}>{money(tot.revenue)} rev · {money(tot.gross)} gross · {margin}% margin</div>
        </div>
        <button onClick={()=>setTab('add')} style={{background:'#ea580c',border:'none',borderRadius:12,padding:'12px 16px',color:'#fff',fontWeight:800,fontSize:14,cursor:'pointer',flexShrink:0,lineHeight:1.2,textAlign:'center'}}>
          <div style={{fontSize:18,marginBottom:2}}>＋</div>Job
        </button>
      </div>

      {/* ── Today strip (only if jobs today) ── */}
      {tjobs.length>0&&(
        <div className="kgrid g4" style={{marginBottom:10}}>
          <div className="kpi"><div className="kpi-l">Today</div><div className="kpi-v" style={{fontSize:22}}>{tjobs.length}</div><div className="kpi-s">jobs</div></div>
          <div className="kpi"><div className="kpi-l">Revenue</div><div className="kpi-v" style={{fontSize:14}}>{money(tjobs.reduce((s,j)=>s+Number(j.revenue||0),0))}</div></div>
          <div className="kpi"><div className="kpi-l">Profit</div><div className="kpi-v" style={{fontSize:14,color:'#16a34a'}}>{money(tjobs.reduce((s,j)=>s+jGross(j,profile),0))}</div></div>
          <div className="kpi"><div className="kpi-l">Avg</div><div className="kpi-v" style={{fontSize:14}}>{money(tjobs.reduce((s,j)=>s+jGross(j,profile),0)/tjobs.length)}</div></div>
        </div>
      )}

      {/* ── Weekly KPIs ── */}
      <div className="kgrid g2" style={{marginBottom:2}}>
        <div className="kpi"><div className="kpi-l">Revenue</div><div className="kpi-v">{money(tot.revenue)}</div><div className="kpi-s">{wjobs.length} job{wjobs.length!==1?'s':''}</div></div>
        <div className="kpi"><div className="kpi-l">Gross Profit</div><div className="kpi-v">{money(tot.gross)}</div><div className="kpi-s">{margin}% margin</div></div>
        <div className="kpi"><div className="kpi-l">Direct Costs</div><div className="kpi-v" style={{fontSize:15}}>{money(tot.costs)}</div><div className="kpi-s">travel + parts</div></div>
        <div className="kpi"><div className="kpi-l">Fixed Overhead</div><div className="kpi-v" style={{fontSize:15}}>{money(tot.fixed)}</div><div className="kpi-s">weekly</div></div>
      </div>
      <div className="kgrid g3" style={{marginBottom:12}}>
        <div className="kpi"><div className="kpi-l">Avg / Job</div><div className="kpi-v" style={{fontSize:15}}>{money(avg)}</div></div>
        <div className="kpi"><div className="kpi-l">Jobs to Goal</div><div className="kpi-v" style={{fontSize:15,color:typeof need==='number'&&need>0?'#ea580c':'#16a34a'}}>{need}</div></div>
        <div className="kpi"><div className="kpi-l">Goal %</div><div className="kpi-v" style={{fontSize:15,color:barC}}>{gPct.toFixed(0)}%</div></div>
      </div>

      {/* ── Goal bar ── */}
      <div className="card">
        <div className="cpad">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
            <div style={{fontSize:13,fontWeight:700,color:'#333'}}>Weekly Goal Progress</div>
            {gPct>=100
              ?<span className="pill p-green">🎉 Goal Hit</span>
              :<span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:'#aaa'}}>{money(tot.gross)} / {money(profile.weeklyGoal)}</span>
            }
          </div>
          <div className="gtrack"><div className="gfill" style={{width:`${gPct}%`,background:barC}}/></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#bbb'}}>
            <span>Payout: {nextFri()}</span>
            {typeof need==='number'&&need>0&&<span style={{color:'#ea580c',fontWeight:600}}>{need} more job{need!==1?'s':''} needed</span>}
          </div>
        </div>
      </div>

      {/* ── Payout projection ── */}
      <div className="dk">
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'#555',marginBottom:14}}>Payout Projection · {nextFri()}</div>
        {[{n:profile.owner1Name||'Owner 1',a:o1,ok:ao1},{n:profile.owner2Name||'Owner 2',a:o2,ok:ao2}].filter(o=>o.ok).map((o,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:12,borderBottom:'1px solid #1a1a1a'}}>
            <span style={{color:'#888',fontSize:14,fontWeight:600}}>{o.n}</span>
            <strong style={{fontFamily:'"JetBrains Mono",monospace',fontSize:24,color:o.a>0?'#4ade80':'#555'}}>{money(o.a)}</strong>
          </div>
        ))}
        <div style={{fontSize:11,color:'#2a2a2a',lineHeight:2}}>
          {money(tot.revenue)} rev  −  {money(tot.costs)} direct  =  {money(tot.gross)} gross<br/>
          {money(tot.gross)} gross  −  {money(tot.fixed)} fixed  =  <span style={{color:'#4ade80',fontWeight:700}}>{money(tot.net)} net</span>
        </div>
        {tax>0&&<div className="taxbox" style={{marginTop:12}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#92400e',marginBottom:5}}>💰 Tax Reserve ({profile.taxRate}%)</div><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:17,fontWeight:700,color:'#b45309'}}>{money(tax)}</div><div style={{fontSize:11,color:'#92400e',marginTop:2}}>~{money(tax/2)} per owner — set aside</div></div>}
      </div>

      {/* ── Margin trend ── */}
      {last4.length>1&&(
        <>
          <div className="sec">4-Week Margin Trend</div>
          <div className="card"><div className="cpad">
            <div style={{display:'flex',alignItems:'flex-end',gap:8,height:52,marginBottom:8}}>
              {last4.map((w,i)=>{const mx=Math.max(...last4.map(x=>x.m),1);const h=Math.max(4,Math.round((w.m/mx)*40));return(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{fontSize:9,color:'#aaa',fontFamily:'"JetBrains Mono",monospace'}}>{w.m}%</div>
                  <div style={{width:'100%',height:h,background:w.m>=50?'#111':'#ea580c',borderRadius:'4px 4px 0 0',transition:'height .3s'}}/>
                </div>
              );})}
            </div>
            <div style={{display:'flex',gap:8}}>{last4.map((w,i)=><div key={i} style={{flex:1,fontSize:9,color:'#bbb',textAlign:'center',overflow:'hidden'}}>{wkLabel(w.wk).split('–')[0].trim()}</div>)}</div>
          </div></div>
        </>
      )}

      {/* ── Lead sources ── */}
      {topSrc.length>0&&(
        <>
          <div className="sec">Lead Sources</div>
          <div className="card"><div className="cpad">
            {topSrc.map(([s,c])=>(
              <div className="srcbar" key={s}>
                <div style={{fontSize:12,color:'#555',width:120,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s}</div>
                <div style={{flex:1,height:6,background:'#f0f0f0',borderRadius:999,overflow:'hidden'}}><div style={{height:'100%',background:'#111',width:`${(c/maxSrc)*100}%`,borderRadius:999}}/></div>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:'#bbb',width:20,textAlign:'right',flexShrink:0}}>{c}</div>
              </div>
            ))}
          </div></div>
        </>
      )}

      {/* ── Recent jobs ── */}
      <div className="sec">Recent Jobs</div>
      {recent.length>0?(
        <div style={{display:'grid',gap:8}}>
          {recent.map(j=>{const gp=jGross(j,profile);const dec=decision(j,profile,[],0);return(
            <div className="jrow" key={j.id} style={{cursor:'pointer'}} onClick={()=>onRepeat(j)}>
              <div className="jicon" style={{background:cfg.color+'18'}}>{cfg.jobIcon}</div>
              <div className="jmain">
                <div className="jtitle">{j.serviceName||'Service'} · {j.area}</div>
                <div className="jmeta">{j.date}{j.tireSize?' · '+j.tireSize:''} · {j.payment}</div>
              </div>
              <div className="jright">
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:14,fontWeight:700}}>{money(j.revenue)}</div>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,fontWeight:700,color:gp>=0?'#16a34a':'#dc2626',marginTop:2}}>{money(gp)}</div>
              </div>
            </div>
          );})}
          <button className="btn b-secondary b-full" onClick={()=>setTab('history')} style={{marginTop:4}}>View all jobs →</button>
        </div>
      ):(
        <Empty icon={cfg.jobIcon} title="No jobs yet" sub={`Start logging ${cfg.label.toLowerCase()} jobs to see your P&L here.`}
          action={<button className="btn b-primary" onClick={()=>setTab('add')}>Log First Job</button>}/>
      )}
    </div></div>
  );
}
function AddJob({onSave,profile,services,jobs,prefill,onClear}){
  const cfg=BIZ[profile.businessType]||BIZ.general;
  const [mode,setMode]=useState('quick'); // 'quick' | 'full'

  // ── Deduped, sorted active services — final gate before dropdown ──────────
  const activeSvcs=useMemo(()=>{
    const d=dedupeServices((services||[]).filter(s=>s.active!==false));
    return [...d].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  },[services]);
  const [svcSearch,setSvcSearch]=useState('');
  const filteredSvcs=useMemo(()=>
    svcSearch.trim()?activeSvcs.filter(s=>s.name.toLowerCase().includes(svcSearch.toLowerCase())):activeSvcs
  ,[activeSvcs,svcSearch]);

  const EMPTY=()=>({
    date:TODAY(),serviceId:activeSvcs[0]?.id||'',serviceName:activeSvcs[0]?.name||'',
    area:profile.serviceArea||'',payment:'Cash',status:'Completed',source:'Google Search',
    customerName:'',customerPhone:'',miles:'',revenue:'',miscCost:'',
    tireCost:'',tireSize:'',qty:1,laborHours:'',partsCost:'',diagFee:'',
    repairCategory:'',packageType:'',vehicleSize:'',serviceCategory:'',
    note:'',emergency:false,lateNight:false,highway:false,weekend:false,
  });
  const [form,setForm]=useState(EMPTY);
  const [err,setErr]=useState('');
  const [tick,setTick]=useState(0);
  const sizes=useMemo(()=>[...new Set([...ls(`msos3-sizes-${profile.owner1Name||'u'}`,[]),...['225/55R17','235/60R18','245/45R18','215/65R16','265/65R17']])].slice(0,6),[tick]);

  const weekGross=useMemo(()=>{const tw=wkStart(TODAY());return jobs.filter(j=>wkStart(j.date)===tw).reduce((s,j)=>s+jGross(j,profile),0);},[jobs,profile]);

  useEffect(()=>{
    if(prefill){
      setForm({...EMPTY(),serviceId:prefill.serviceId||'',serviceName:prefill.serviceName||'',area:prefill.area||'',payment:prefill.payment||'Cash',source:prefill.source||'Google Search',tireSize:prefill.tireSize||'',qty:prefill.qty||1,miles:prefill.miles||'',tireCost:prefill.tireCost||'',miscCost:prefill.miscCost||'',emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend});
      if(onClear) onClear();
    }
  },[prefill]);

  const sf=(k,v)=>{setForm(p=>({...p,[k]:v}));setErr('');};
  const selSvc=id=>{const s=activeSvcs.find(x=>x.id===id);sf('serviceId',id);sf('serviceName',s?.name||'');sf('revenue','');};

  const dc  =useMemo(()=>jDirect(form,profile),[form,profile]);
  const sugg=useMemo(()=>suggestedPrice(form,profile,activeSvcs),[form,profile,activeSvcs]);
  const dec =useMemo(()=>decision({...form,revenue:form.revenue||sugg},profile,activeSvcs,weekGross),[form,profile,activeSvcs,sugg,weekGross]);
  const enteredRev=Number(form.revenue||0);
  const gp  =enteredRev?r2(enteredRev-dc):r2(sugg-dc);
  const marg=enteredRev>0?r2(((enteredRev-dc)/enteredRev)*100):0;

  // Color-code profit: green ≥ 50% margin, orange 20-50%, red < 20%
  const profitColor=marg>=50?'#16a34a':marg>=20?'#ea580c':'#dc2626';
  const profitBg   =marg>=50?'#f0fdf4':marg>=20?'#fff7ed':'#fff5f5';

  const save=(andAdd=false)=>{
    const rev=Number(form.revenue||0)||sugg;
    if(!rev){setErr('Enter a price or accept the suggestion.');return;}
    if(form.tireSize&&cfg.fields.includes('tireSize')){
      try{const p=ls(`msos3-sizes-${profile.owner1Name||'u'}`,[]);lss(`msos3-sizes-${profile.owner1Name||'u'}`,[form.tireSize,...p.filter(s=>s!==form.tireSize)].slice(0,10));}catch{}
    }
    const e={...form,id:uid(),revenue:r2(rev),qty:Number(form.qty||1),tireCost:r2(form.tireCost),miscCost:r2(form.miscCost),partsCost:r2(form.partsCost),miles:r2(form.miles),diagFee:r2(form.diagFee),laborHours:r2(form.laborHours)};
    onSave(e,andAdd);setTick(t=>t+1);
    if(andAdd){setForm(EMPTY());setErr('');}
  };

  const requestReview=()=>{
    const url=(profile.googleReviewUrl||'').trim();
    if(!url){alert('Add your Google Review URL in Settings → Business.');return;}
    const msg=encodeURIComponent('Hi'+(form.customerName?' '+form.customerName:'')+'! Thanks for choosing '+(profile.businessName||'us')+'! We\'d love a quick Google review — it means a lot! '+url);
    window.open(form.customerPhone?'sms:'+form.customerPhone+'?body='+msg:'sms:?body='+msg);
  };

  const FLAGS=[['emergency','🚨','Emergency',profile.emergencyFee||25],['lateNight','🌙','Late Night',profile.lateNightFee||25],['highway','🛣','Highway',profile.highwayFee||15],['weekend','📅','Weekend',profile.weekendFee||10]];

  return(
    <div className="screen"><div className="page">

      {/* ── Mode toggle ── */}
      <div style={{display:'flex',gap:8,marginBottom:16,padding:'4px',background:'#f0f0f0',borderRadius:12}}>
        {[['quick','⚡ Quick Add'],['full','📋 Full Form']].map(([m,l])=>(
          <button key={m} onClick={()=>setMode(m)} style={{flex:1,border:'none',borderRadius:9,padding:'9px',fontWeight:700,fontSize:12,cursor:'pointer',background:mode===m?'#111':'transparent',color:mode===m?'#fff':'#888',transition:'all .15s'}}>{l}</button>
        ))}
      </div>

      {err&&<div className="alert a-red" style={{marginBottom:14}}>{err}</div>}

      {/* ── Live profit preview (always visible) ── */}
      <div style={{background:profitBg,border:`1.5px solid ${profitColor}22`,borderRadius:14,padding:'12px 14px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'#aaa',marginBottom:3}}>
              {enteredRev?'Gross Profit':'Suggested Price'}
            </div>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:26,fontWeight:800,color:enteredRev?profitColor:'#111',lineHeight:1}}>
              {enteredRev?money(gp):money(sugg)}
            </div>
            {enteredRev>0&&<div style={{fontSize:11,color:profitColor,marginTop:3,fontWeight:600}}>{marg}% margin · {money(dc)} cost</div>}
            {!enteredRev&&<div style={{fontSize:11,color:'#aaa',marginTop:3}}>tap price to override</div>}
          </div>
          <span className={`pill p-${dec.c}`} style={{fontSize:11,padding:'6px 12px'}}>{dec.label}</span>
        </div>
      </div>

      {/* ── Service picker ── */}
      <div className="field">
        <label className="flabel">Service</label>
        {activeSvcs.length>6&&(
          <input className="finp" value={svcSearch} onChange={e=>setSvcSearch(e.target.value)} placeholder="Search services…" style={{marginBottom:8,fontSize:14}}/>
        )}
        {filteredSvcs.length>0?(
          <select className="finp" value={form.serviceId} onChange={e=>selSvc(e.target.value)}>
            <option value="">— Choose a service —</option>
            {filteredSvcs.map(s=>(
              <option key={s.id} value={s.id}>
                {s.name}{s.basePrice>0?'  ·  '+money(s.basePrice):''}
              </option>
            ))}
          </select>
        ):(
          <div className="alert a-orange">No active services. Add them in the Services tab.</div>
        )}
      </div>

      {/* ── Price input ── */}
      <div className="field">
        <label className="flabel">Job Price <span style={{color:'#ccc',textTransform:'none',fontWeight:500}}>— suggested: {money(sugg)}</span></label>
        <input type="number" min="0" inputMode="decimal" className="finp"
          value={form.revenue} onChange={e=>sf('revenue',e.target.value)}
          placeholder={String(sugg)}
          style={{fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:18}}/>
      </div>

      {/* ── Quick mode: just the essentials ── */}
      <div className="frow" style={{marginBottom:14}}>
        <div className="field" style={{marginBottom:0}}><label className="flabel">Date</label><input type="date" className="finp" value={form.date} onChange={e=>sf('date',e.target.value)}/></div>
        <div className="field" style={{marginBottom:0}}><label className="flabel">Miles</label><input type="number" min="0" inputMode="decimal" className="finp" value={form.miles} onChange={e=>sf('miles',e.target.value)} placeholder="0"/></div>
      </div>

      {/* ── Payment ── */}
      <div className="field">
        <label className="flabel">Payment</label>
        <div className="pgrid">
          {PAYMENT.map(({l,i})=><button key={l} type="button" className={`pbtn ${form.payment===l?'on':''}`} onClick={()=>sf('payment',l)}><span style={{fontSize:18}}>{i}</span>{l}</button>)}
        </div>
      </div>

      {/* ── Full form extras ── */}
      {mode==='full'&&(
        <>
          <div className="frow" style={{marginBottom:14}}>
            <div className="field" style={{marginBottom:0}}><label className="flabel">Area</label><select className="finp" value={form.area} onChange={e=>sf('area',e.target.value)}><option value="">Select…</option>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
            <div className="field" style={{marginBottom:0}}><label className="flabel">Source</label><select className="finp" value={form.source} onChange={e=>sf('source',e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
          </div>

          {/* Business-type fields */}
          {cfg.fields.includes('tireSize')&&(
            <>
              <div className="frow" style={{marginBottom:14}}>
                <div className="field" style={{marginBottom:0}}><label className="flabel">Tire Cost ($)</label><input type="number" min="0" inputMode="decimal" className="finp" value={form.tireCost} onChange={e=>sf('tireCost',e.target.value)} placeholder="0"/></div>
                <div className="field" style={{marginBottom:0}}><label className="flabel">Misc Cost ($)</label><input type="number" min="0" inputMode="decimal" className="finp" value={form.miscCost} onChange={e=>sf('miscCost',e.target.value)} placeholder="0"/></div>
              </div>
              <div className="field">
                <label className="flabel">Tire Size</label>
                <input className="finp" value={form.tireSize} onChange={e=>sf('tireSize',e.target.value)} placeholder="225/55R17" style={{marginBottom:8}}/>
                <div className="chips">{sizes.map(sz=><button key={sz} type="button" className={`chip sm ${form.tireSize===sz?'on':''}`} onClick={()=>sf('tireSize',sz)}>{sz}</button>)}</div>
              </div>
              <div className="frow" style={{marginBottom:14}}>
                <div className="field" style={{marginBottom:0}}><label className="flabel">Qty</label><input type="number" min="1" className="finp" value={form.qty} onChange={e=>sf('qty',e.target.value)}/></div>
                <div className="field" style={{marginBottom:0}}><label className="flabel">Phone</label><input type="tel" className="finp" value={form.customerPhone} onChange={e=>sf('customerPhone',e.target.value)} placeholder="Optional"/></div>
              </div>
            </>
          )}
          {cfg.fields.includes('laborHours')&&(
            <div className="frow" style={{marginBottom:14}}>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Labor Hours</label><input type="number" step="0.5" className="finp" value={form.laborHours} onChange={e=>sf('laborHours',e.target.value)} placeholder="1.0"/></div>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Parts Cost ($)</label><input type="number" min="0" className="finp" value={form.partsCost} onChange={e=>sf('partsCost',e.target.value)} placeholder="0"/></div>
            </div>
          )}
          {cfg.fields.includes('packageType')&&(
            <div className="frow" style={{marginBottom:14}}>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Package</label><select className="finp" value={form.packageType} onChange={e=>sf('packageType',e.target.value)}><option value="">Select…</option>{['Exterior Only','Interior Only','Full Detail','Paint Correction','Ceramic Coating'].map(x=><option key={x}>{x}</option>)}</select></div>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Vehicle</label><select className="finp" value={form.vehicleSize} onChange={e=>sf('vehicleSize',e.target.value)}><option value="">Select…</option>{['Sedan','SUV / Crossover','Truck','Van','Sports Car'].map(x=><option key={x}>{x}</option>)}</select></div>
            </div>
          )}
          {cfg.fields.includes('serviceCategory')&&(
            <div className="frow" style={{marginBottom:14}}>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Category</label><select className="finp" value={form.serviceCategory} onChange={e=>sf('serviceCategory',e.target.value)}><option value="">Select…</option>{['Jump Start','Lockout','Fuel Delivery','Spare Tire','Battery Boost','Winch / Pull Out'].map(x=><option key={x}>{x}</option>)}</select></div>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Misc Cost ($)</label><input type="number" min="0" className="finp" value={form.miscCost} onChange={e=>sf('miscCost',e.target.value)} placeholder="0"/></div>
            </div>
          )}
          {!cfg.fields.includes('tireSize')&&(
            <div className="frow" style={{marginBottom:14}}>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Customer Phone</label><input type="tel" className="finp" value={form.customerPhone} onChange={e=>sf('customerPhone',e.target.value)} placeholder="Optional"/></div>
              <div className="field" style={{marginBottom:0}}><label className="flabel">Misc Cost ($)</label><input type="number" min="0" className="finp" value={form.miscCost} onChange={e=>sf('miscCost',e.target.value)} placeholder="0"/></div>
            </div>
          )}
          <div className="field"><label className="flabel">Customer Name</label><input className="finp" value={form.customerName} onChange={e=>sf('customerName',e.target.value)} placeholder="Optional"/></div>

          {/* Conditions */}
          <div className="field">
            <label className="flabel">Conditions <span style={{color:'#ccc',textTransform:'none',fontWeight:500}}>— add to suggested price</span></label>
            <div className="chips">
              {FLAGS.map(([key,ico,lbl,amt])=>(
                <button key={key} type="button" className={`chip ${form[key]?'on':''}`} onClick={()=>sf(key,!form[key])}>
                  {ico} {lbl}{form[key]?` +$${amt}`:''}
                </button>
              ))}
            </div>
          </div>

          <div className="field"><label className="flabel">Notes</label><textarea className="finp" value={form.note} onChange={e=>sf('note',e.target.value)} placeholder="Any details about this job…"/></div>
        </>
      )}

      {/* ── Profit detail row ── */}
      <div style={{background:'#f8f8f8',borderRadius:12,padding:'12px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <div style={{fontSize:12,color:'#aaa'}}><span style={{color:'#555',fontWeight:600}}>Cost</span> {money(dc)}</div>
        <div style={{fontSize:12,color:'#aaa'}}><span style={{color:'#555',fontWeight:600}}>Profit</span> <span style={{color:profitColor,fontWeight:700}}>{money(gp)}</span></div>
        <div style={{fontSize:12,color:'#aaa'}}><span style={{color:'#555',fontWeight:600}}>Margin</span> <span style={{color:profitColor,fontWeight:700}}>{marg}%</span></div>
        <div style={{fontSize:10,color:'#ddd',letterSpacing:'.3px'}}>decision applies at payout</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>

      </div>
      {form.status==='Completed'&&(
        <button className="btn b-secondary b-full" style={{color:'#2563eb',borderColor:'#bfdbfe'}} onClick={requestReview}>⭐ Request Google Review</button>
      )}
    </div></div>
  );
}
function History({jobs,profile,setJobs,onRepeat}){
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [view,  setView  ]=useState('weeks');
  const cfg=BIZ[profile.businessType]||BIZ.general;
  const areas=useMemo(()=>Array.from(new Set(jobs.map(j=>j.area).filter(Boolean))),[jobs]);
  const filtered=useMemo(()=>{
    let j=jobs;
    if(filter==='Completed') j=j.filter(x=>x.status==='Completed');
    else if(filter==='Pending') j=j.filter(x=>x.status==='Pending');
    else if(!['All'].includes(filter)) j=j.filter(x=>x.area===filter);
    if(search.trim()){const q=search.toLowerCase();j=j.filter(x=>(x.customerName||'').toLowerCase().includes(q)||(x.customerPhone||'').includes(q)||(x.tireSize||'').toLowerCase().includes(q)||(x.area||'').toLowerCase().includes(q)||(x.serviceName||'').toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));}
    return [...j].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[jobs,filter,search]);
  const weeks=useMemo(()=>groupWeeks(filtered),[filtered]);
  const wGross=useMemo(()=>{const tw=wkStart(TODAY());return jobs.filter(j=>wkStart(j.date)===tw).reduce((s,j)=>s+jGross(j,profile),0);},[jobs,profile]);
  const rm=id=>{if(!window.confirm('Delete this job?'))return;setJobs(prev=>prev.filter(j=>j.id!==id));};
  const sendReview=job=>{const url=(profile.googleReviewUrl||'').trim();if(!url){alert('Add your Google Review URL in Settings.');return;}const msg=encodeURIComponent('Hi'+(job.customerName?' '+job.customerName:'')+'! Thanks for choosing '+(profile.businessName||'us')+'! We\'d love a quick Google review! '+url);window.open(job.customerPhone?'sms:'+job.customerPhone+'?body='+msg:'sms:?body='+msg);};

  const JRow=({j})=>{const gp=jGross(j,profile),dec=decision(j,profile,[],wGross);return(
    <div className="jrow">
      <div className="jicon">{cfg.jobIcon}</div>
      <div className="jmain">
        <div className="jtitle">{j.serviceName||'Service'} · {j.area}</div>
        <div className="jmeta">{j.date} · {j.payment}{j.tireSize?' · '+j.tireSize:''}{j.source?' · '+j.source:''}</div>
        <div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap'}}>
          <span className={`pill p-${dec.c}`}>{dec.label}</span>
          {j.source&&<span className="pill p-blue">{j.source}</span>}
          {j.emergency&&<span className="pill p-orange">Emergency</span>}
          {j.lateNight&&<span className="pill p-gray">Late Night</span>}
        </div>
      </div>
      <div className="jright">
        <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:14,fontWeight:700}}>{money(j.revenue)}</div>
        <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,fontWeight:700,color:gp>=0?'#16a34a':'#dc2626',marginTop:2}}>{money(gp)}</div>
        <div style={{display:'flex',gap:5,marginTop:8,justifyContent:'flex-end'}}>
          <button className="btn b-success b-xs" onClick={()=>onRepeat(j)}>🔁</button>
          <button className="btn b-secondary b-xs" onClick={()=>sendReview(j)}>⭐</button>
          <button className="btn b-danger b-xs" onClick={()=>rm(j.id)}>×</button>
        </div>
      </div>
    </div>
  );};

  return(
    <div className="screen"><div className="page">
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search jobs…" className="finp" style={{marginBottom:12}}/>
      <div className="chips" style={{marginBottom:10}}>
        {['All','Completed','Pending',...areas].slice(0,7).map(f=><button key={f} className={`chip chip-sm ${filter===f?'on':''}`} onClick={()=>setFilter(f)}>{f}</button>)}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
        <button className={`chip chip-sm ${view==='weeks'?'on':''}`} onClick={()=>setView('weeks')}>By Week</button>
        <button className={`chip chip-sm ${view==='list'?'on':''}`} onClick={()=>setView('list')}>All Jobs</button>
        <span style={{marginLeft:'auto',fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:'#aaa'}}>{filtered.length} job{filtered.length!==1?'s':''}</span>
      </div>
      {filtered.length===0?<Empty icon="📋" title="No jobs found" sub={search?`No results for "${search}"`:filter!=='All'?`No ${filter} jobs.`:'Start logging jobs.'}/>
        :view==='weeks'?weeks.map(([wk,wj])=>{const t=weekSum(wj,profile);return(
          <div key={wk} style={{marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0 8px'}}>
              <div><div style={{fontWeight:700,fontSize:13}}>{wkLabel(wk)}</div><div style={{fontSize:11,color:'#aaa',marginTop:2}}>{wj.length} jobs · {money(t.revenue)} rev</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:15,fontWeight:700,color:t.net>=0?'#16a34a':'#dc2626'}}>{money(t.net)}</div><div style={{fontSize:11,color:'#aaa'}}>net</div></div>
            </div>
            <div style={{display:'grid',gap:8}}>{wj.map(j=><JRow key={j.id} j={j}/>)}</div>
          </div>
        )}):(<div style={{display:'grid',gap:8}}>{filtered.map(j=><JRow key={j.id} j={j}/>)}</div>)
      }
    </div></div>
  );
}

// ─── Payouts ──────────────────────────────────────────────────────────────────
function Payouts({jobs,profile}){
  const weeks=useMemo(()=>groupWeeks(jobs),[jobs]);
  const thisWk=wkStart(TODAY());
  const curWk=useMemo(()=>jobs.filter(j=>wkStart(j.date)===thisWk),[jobs,thisWk]);
  const curTot=useMemo(()=>weekSum(curWk,profile),[curWk,profile]);
  const ao1=profile.owner1Active!==false,ao2=profile.owner2Active===true;
  const st=(ao1?Number(profile.profitSplit1||100):0)+(ao2?Number(profile.profitSplit2||0):0)||100;
  const curO1=curTot.net>0&&ao1?r2(curTot.net*(Number(profile.profitSplit1||100)/st)):0;
  const curO2=curTot.net>0&&ao2?r2(curTot.net*(Number(profile.profitSplit2||0)/st)):0;

  return(
    <div className="screen"><div className="page">
      {/* Current week summary */}
      <div className="sec" style={{marginTop:0}}>Current Week — {wkLabel(thisWk)}</div>
      <div className="dk" style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'#555',marginBottom:14}}>Distributable This Week</div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <span style={{color:'#777',fontSize:14}}>Revenue</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,color:'#ddd'}}>{money(curTot.revenue)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <span style={{color:'#777',fontSize:14}}>Direct Costs</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,color:'#ef4444'}}>−{money(curTot.costs)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <span style={{color:'#777',fontSize:14}}>Fixed Expenses</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,color:'#ef4444'}}>−{money(curTot.fixed)}</span>
        </div>
        <div style={{borderTop:'1px solid #1a1a1a',paddingTop:12,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'#aaa',fontSize:14,fontWeight:700}}>Net Profit</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:700,color:curTot.net>=0?'#4ade80':'#ef4444'}}>{money(curTot.net)}</span>
        </div>
        {[{n:profile.owner1Name||'Owner 1',a:curO1,ok:ao1},{n:profile.owner2Name||'Owner 2',a:curO2,ok:ao2}].filter(o=>o.ok).map((o,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'rgba(255,255,255,.05)',borderRadius:10,marginBottom:8}}>
            <span style={{color:'#888',fontSize:14,fontWeight:600}}>{o.n}</span>
            <strong style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,color:o.a>0?'#4ade80':'#555'}}>{money(o.a)}</strong>
          </div>
        ))}
        <div style={{fontSize:11,color:'#333',marginTop:8,lineHeight:1.7}}>
          Gross profit − weekly fixed expenses = net profit. Net profit is split by ownership percentage. Fixed expenses are based on your monthly overhead divided across 52 weeks.
        </div>
      </div>

      {/* History */}
      <div className="sec">Payout History</div>
      {weeks.length===0?(
        <Empty icon="💰" title="No payout history yet" sub="Log jobs to see weekly payout breakdowns here. Each week calculates revenue minus direct job costs minus weekly fixed overhead."/>
      ):weeks.map(([wk,wj])=>{
        const t=weekSum(wj,profile);
        const o1=t.net>0&&ao1?r2(t.net*(Number(profile.profitSplit1||100)/st)):0;
        const o2=t.net>0&&ao2?r2(t.net*(Number(profile.profitSplit2||0)/st)):0;
        const tax=t.net>0&&profile.taxRate>0?r2(t.net*(Number(profile.taxRate)/100)):0;
        return(
          <div className="card" key={wk} style={{marginBottom:14}}>
            <div className="cpad" style={{borderBottom:'1px solid #f5f5f5'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

// ─── Services ─────────────────────────────────────────────────────────────────
function Services({services,setServices,profile}){
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState('');
  const cfg=BIZ[profile.businessType]||BIZ.general;

  // Always display deduped, searchable list
  const deduped=useMemo(()=>dedupeServices(services),[services]);
  const filtered=useMemo(()=>search.trim()?deduped.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())):deduped,[deduped,search]);

  const upd=(id,patch)=>setServices(prev=>dedupeServices(prev.map(s=>s.id===id?{...s,...patch,updatedAt:new Date().toISOString()}:s)));
  const rm =id=>{if(!window.confirm('Remove this service?'))return;setServices(prev=>prev.filter(s=>s.id!==id));setEditId(null);};

  const add=()=>{
    const id='svc-'+uid();
    const now=new Date().toISOString();
    setServices(prev=>mergeServices(prev,[{id,name:'New Service',slug:id,basePrice:0,minPrice:0,maxPrice:0,dur:60,active:true,source:'manual',workspaceId:profile.workspaceId||profile.uid||'',businessType:profile.businessType,createdAt:now,updatedAt:now}]));
    setEditId(id);
  };

  const duplicate=svc=>{
    const id='svc-'+uid();
    const now=new Date().toISOString();
    setServices(prev=>mergeServices(prev,[{...svc,id,name:svc.name+' (copy)',slug:id,source:'manual',createdAt:now,updatedAt:now}]));
    setEditId(id);
  };

  // Reset to defaults for current business type
  const resetDefaults=()=>{
    if(!window.confirm(`Reset services to ${cfg.label} defaults? Your custom services will be removed.`)) return;
    const fresh=makeStarterServices(profile.businessType);
    setServices(fresh);
    setEditId(null);
  };

  // Move service up/down
  const move=(id,dir)=>{
    setServices(prev=>{
      const arr=[...dedupeServices(prev)];
      const idx=arr.findIndex(s=>s.id===id);
      if(idx<0) return prev;
      const newIdx=clamp(idx+dir,0,arr.length-1);
      if(newIdx===idx) return prev;
      const item=arr.splice(idx,1)[0];
      arr.splice(newIdx,0,item);
      return arr;
    });
  };

  const ei={border:'1.5px solid #e8e8e8',borderRadius:10,padding:'10px 12px',fontSize:14,outline:'none',width:'100%',fontFamily:'inherit',background:'#fff'};
  const em={...ei,fontFamily:'"JetBrains Mono",monospace',fontWeight:700};

  const activeCount=deduped.filter(s=>s.active!==false).length;

  return(
    <div className="screen"><div className="page">
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div>
          <div className="sec" style={{margin:0}}>{cfg.icon} {cfg.label} Services</div>
          <div style={{fontSize:11,color:'#bbb',marginTop:3}}>{activeCount} active · {deduped.length} total</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn b-secondary b-sm" onClick={resetDefaults} title="Reset to defaults">↺ Reset</button>
          <button className="btn b-primary b-sm" onClick={add}>+ Add</button>
        </div>
      </div>

      {/* Search (shows when > 5 services) */}
      {deduped.length>5&&(
        <input className="finp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search services…" style={{marginBottom:12}}/>
      )}

      <div style={{fontSize:11,color:'#bbb',marginBottom:12,lineHeight:1.6,padding:'10px 14px',background:'#f9f9f9',borderRadius:10,border:'1px solid #f0f0f0'}}>
        Tap a service to edit. Active services appear in <strong>New Job</strong>. Use ↑↓ to reorder.
      </div>

      {filtered.length===0&&<Empty icon={cfg.icon} title="No services" sub={`Add your first ${cfg.label.toLowerCase()} service.`} action={<button className="btn b-primary" onClick={add}>Add First Service</button>}/>}

      {filtered.map((svc,idx)=>{
        const isE=editId===svc.id;
        return(
          <div className="svcard" key={svc.id}>
            {/* Main row */}
            <div className="svhdr" onClick={()=>setEditId(isE?null:svc.id)}>
              {/* Reorder buttons */}
              <div style={{display:'flex',flexDirection:'column',gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>move(svc.id,-1)} style={{background:'none',border:'none',padding:'2px 4px',fontSize:10,color:'#ccc',cursor:'pointer',lineHeight:1}}>▲</button>
                <button onClick={()=>move(svc.id,1)}  style={{background:'none',border:'none',padding:'2px 4px',fontSize:10,color:'#ccc',cursor:'pointer',lineHeight:1}}>▼</button>
              </div>
              <div className="svicon" style={{background:svc.active!==false?cfg.color+'18':'#f5f5f7',fontSize:15}}>{svc.active!==false?cfg.icon:'—'}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:svc.active!==false?'#111':'#bbb',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{svc.name}</div>
                <div style={{fontSize:11,color:'#aaa',marginTop:2,fontFamily:'"JetBrains Mono",monospace'}}>
                  {svc.basePrice>0?money(svc.basePrice)+' base':'No price set'}{svc.dur?' · '+svc.dur+'min':''}
                </div>
              </div>
              <Tog on={svc.active!==false} set={v=>{upd(svc.id,{active:v});}}/>
              <span style={{color:'#ddd',fontSize:10,marginLeft:4}}>{isE?'▲':'▼'}</span>
            </div>

            {/* Edit panel */}
            {isE&&(
              <div className="svedit">
                <div style={{marginBottom:10}}>
                  <div className="flabel">Service Name</div>
                  <input style={ei} value={svc.name} onChange={e=>upd(svc.id,{name:e.target.value})} placeholder="Service name" autoFocus/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                  {[['Base Price','basePrice'],['Min Price','minPrice'],['Max Price','maxPrice']].map(([l,k])=>(
                    <div key={k}><div className="flabel">{l} $</div><input type="number" style={em} value={svc[k]||''} onChange={e=>upd(svc.id,{[k]:Number(e.target.value||0)})} placeholder="0"/></div>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                  <div><div className="flabel">Duration (min)</div><input type="number" style={ei} value={svc.dur||''} onChange={e=>upd(svc.id,{dur:Number(e.target.value||0)})} placeholder="60"/></div>
                  <div><div className="flabel">Notes</div><input style={ei} value={svc.notes||''} onChange={e=>upd(svc.id,{notes:e.target.value})} placeholder="Optional"/></div>
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <button className="btn b-secondary b-sm" style={{flex:1}} onClick={()=>setEditId(null)}>Done ✓</button>
                  <button className="btn b-secondary b-sm" onClick={()=>duplicate(svc)} title="Duplicate">⧉ Copy</button>
                  <button className="btn b-danger b-sm" onClick={()=>rm(svc.id)}>Remove</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div></div>
  );
}

        <div style={{display:'grid',gap:8}}>

            <div className="sec" style={{marginTop:0}}>Mileage</div>
            <div className="card">
              <InlineRow label="Your cost per mile ($)" hint="Fuel + wear (IRS: $0.67/mi)"><input type="number" step="0.01" style={{...si,width:100}} value={profile.costPerMile||0} onChange={e=>up('costPerMile',Number(e.target.value||0))}/></InlineRow>
              <InlineRow label="Charge customer per mile ($)" hint="What you bill for distance"><input type="number" step="0.01" style={{...si,width:100}} value={profile.chargePerMile||0} onChange={e=>up('chargePerMile',Number(e.target.value||0))}/></InlineRow>
              <InlineRow label="Free radius (miles)" hint="No charge within this distance"><input type="number" style={{...si,width:100}} value={profile.freeRadiusMiles||0} onChange={e=>up('freeRadiusMiles',Number(e.target.value||0))}/></InlineRow>
            </div>
            <div className="sec">Condition Fees</div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:12,lineHeight:1.6}}>Added to the suggested price when you flag a job with these conditions.</div>
            <div className="card">
              {[['🚨 Emergency fee ($)','emergencyFee'],['🌙 Late-night fee ($)','lateNightFee'],['🛣 Highway fee ($)','highwayFee'],['📅 Weekend fee ($)','weekendFee']].map(([l,k])=>(
                <InlineRow key={k} label={l}><input type="number" style={{...si,width:90}} value={profile[k]||0} onChange={e=>up(k,Number(e.target.value||0))}/></InlineRow>
              ))}
            </div>
          </>
        )}

        {/* ── FIXED EXPENSES ── */}
        {sec==='expenses'&&(
          <>
            <div className="sec" style={{marginTop:0}}>Monthly Fixed Expenses</div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:12,lineHeight:1.6}}>These are deducted from gross profit at payout (not per job). Enter your recurring monthly costs.</div>
            <div className="card">
              {(profile.expenses||[]).map(e=>(
                <div key={e.id} style={{display:'grid',gridTemplateColumns:'1fr 90px auto auto',gap:8,alignItems:'center',padding:'10px 16px',borderBottom:'1px solid #f5f5f5'}}>
                  <input value={e.name} onChange={x=>upE(e.id,{name:x.target.value})} style={si_w} placeholder="Expense name"/>
                  <input type="number" value={e.amount||''} onChange={x=>upE(e.id,{amount:Number(x.target.value||0)})} style={si} placeholder="0"/>
                  <Tog on={e.active} set={v=>upE(e.id,{active:v})}/>
                  <button className="btn b-danger b-xs" onClick={()=>delE(e.id)}>×</button>
                </div>
              ))}
              <div className="crow">
                <button className="btn b-secondary b-sm" onClick={addE}>+ Add Expense</button>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:14,fontWeight:700}}>{money(mFixed(profile))}/mo</div>
                  <div style={{fontSize:11,color:'#aaa'}}>{money(wFixed(profile))}/wk</div>
                </div>
              </div>
            </div>
          </>
        )}

        {/* ── DATA ── */}
        {sec==='data'&&(
          <>
            <div className="sec" style={{marginTop:0}}>Export & Backup</div>
            <div className="card">
              <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Export CSV</div><div style={{fontSize:11,color:'#aaa'}}>Jobs for QuickBooks / Excel</div></div><button className="btn b-secondary b-sm" onClick={exportCSVClick}>CSV</button></div>
              <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Full Backup</div><div style={{fontSize:11,color:'#aaa'}}>Jobs, services, settings</div></div><button className="btn b-secondary b-sm" onClick={exportJSON}>JSON</button></div>
              <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Import Backup</div><div style={{fontSize:11,color:'#aaa'}}>Restore from .json file</div></div><button className="btn b-secondary b-sm" onClick={importJSON}>Import</button></div>
              <div className="crow"><div><div style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>Reset App</div><div style={{fontSize:11,color:'#dc2626'}}>Clears all local data</div></div><button className="btn b-danger b-sm" onClick={clearAll}>Reset</button></div>
            </div>
            <div className="sec">Workspace Info</div>
            <div className="card">
              <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Workspace ID</div><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,color:'#ccc',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}}>{profile.uid||'—'}</div></div>
              <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Business Type</div><div style={{fontSize:12,fontWeight:700,color:'#555'}}>{BIZ[profile.businessType]?.icon} {BIZ[profile.businessType]?.label||'—'}</div></div>
              <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Data structure</div><div style={{fontSize:11,color:'#bbb',fontFamily:'monospace'}}>workspaces/{'{uid}'}/…</div></div>
            </div>
            <div style={{textAlign:'center',padding:'10px 0',fontSize:11,color:'#ddd',lineHeight:1.7}}>Mobile Service OS · v3<br/>All data synced via Firebase Firestore</div>
          </>
        )}
      </div>
    </div>
  );
}
function App(){
  const [stage,   setStage]   = useState('init');
  const [user,    setUser]    = useState(null);
  const [profile, setProfile] = useState(DEF_PROFILE());
  const [jobs,    setJobs]    = useState([]);
  const [services,setServices]= useState([]);
  const [expenses,setExpenses]= useState([]);
  const [prefill, setPrefill] = useState(null);
  const [tab,     setTab]     = useState('dashboard');
  const [sync,    setSync]    = useState('local');

  // Guard: prevents Firebase service listener from re-merging right after seeding
  const justSeeded      = useRef(false);
  const authInitialized = useRef(false); // prevents onboarding loop from token refreshes

  // Dedicated onboarding flag (never stale, never overwritten by profile sync)
  const obKey   = uid => `msos3-ob-${uid}`;
  const isObDone= uid => localStorage.getItem(obKey(uid)) === 'done';
  const markObDone = uid => { try{ localStorage.setItem(obKey(uid),'done'); }catch{} };

  // ── AUTH LISTENER ─────────────────────────────────────────────────────────
  // Firebase onAuthStateChanged can fire multiple times: initial load, token
  // refresh, session confirmation. The authInitialized ref ensures we only run
  // the full boot check ONCE. After that, subsequent fires only handle sign-out.
  useEffect(()=>{
    // Poll until Firebase auth is ready (scripts load async on mobile)
    let unsub=null;
    const tryAuth=()=>{
      if(!_auth){ setTimeout(tryAuth,150); return; }
      unsub=_auth.onAuthStateChanged(u=>{
      if(!u){
        // Explicit sign-out — always go to welcome, reset flag
        setUser(null);
        setStage('welcome');
        authInitialized.current=false;
        return;
      }

      // ── KEY FIX: skip re-running boot check on token refresh / repeat fires ──
      if(authInitialized.current) return;
      authInitialized.current=true;

      setUser(u);
      const K=lk(u.uid);

      // GATE 1: dedicated localStorage flag (fastest, most reliable)
      if(isObDone(u.uid)){
        setProfile(ls(K.profile,DEF_PROFILE()));
        setJobs(ls(K.jobs,[]));
        setServices(dedupeServices(ls(K.services,[])));
        setExpenses(ls(K.expenses,[]));
        setStage('app');
        return;
      }
      // GATE 2: profile cache has onboardingDone (migrates old users)
      const cached=ls(K.profile,null);
      if(cached?.onboardingDone===true){
        markObDone(u.uid);
        setProfile(cached);
        setJobs(ls(K.jobs,[]));
        setServices(dedupeServices(ls(K.services,[])));
        setExpenses(ls(K.expenses,[]));
        setStage('app');
        return;
      }
      // Fresh user — go to onboarding
      setStage('onboarding');
      });
    }; // end tryAuth
    tryAuth();
    return ()=>{ if(unsub) unsub(); authInitialized.current=false; };
  },[]);

  // ── FIREBASE LISTENERS — only when in app ─────────────────────────────────
  useEffect(()=>{
    if(stage!=='app'||!user||!_db) return;
    const uid=user.uid, K=lk(uid);
    setSync('syncing');

    // Profile — use functional updater to avoid stale closure
    const uP=fbListenDoc(ws(uid)?.collection('profile')?.doc('main'),doc=>{
      if(doc?.onboardingDone===true){
        setProfile(prev=>{
          const merged={...prev,...doc};
          lss(K.profile, merged); // uses merged, not stale closure
          return merged;
        });
        markObDone(uid); // ensure flag is set cross-device
      }
    });

    // Jobs — merge, never overwrite with empty
    const uJ=fbListen(wc(uid,'jobs'),docs=>{
      if(docs.length>0){
        const local=ls(K.jobs,[]);
        const fbIds=new Set(docs.map(d=>String(d.id)));
        const localOnly=local.filter(j=>!fbIds.has(String(j.id)));
        const merged=[...docs,...localOnly];
        setJobs(merged); lss(K.jobs,merged);
        if(localOnly.length) fbBatch(wc(uid,'jobs'),localOnly);
      } else {
        const local=ls(K.jobs,[]);
        if(local.length){ fbBatch(wc(uid,'jobs'),local); }
      }
      setSync('connected');
    });

    // Services — skip merge if we just seeded (prevents instant doubling)
    const uS=fbListen(wc(uid,'services'),docs=>{
      if(docs.length>0){
        if(justSeeded.current){
          // We just wrote these — Firebase is just confirming. Don't re-merge.
          justSeeded.current=false;
          const clean=dedupeServices(docs);
          lss(K.services,clean);
          if(clean.length<docs.length) fbBatch(wc(uid,'services'),clean);
          return;
        }
        // Normal sync: dedupe Firestore result, merge with any local-only adds
        const fbClean=dedupeServices(docs);
        setServices(prev=>{
          const prevIds=new Set(prev.map(s=>s.id));
          const fbOnly=fbClean.filter(s=>!prevIds.has(s.id));
          if(!fbOnly.length){ lss(K.services,fbClean); return fbClean; } // FB is authoritative
          const merged=mergeServices(prev,fbClean);
          lss(K.services,merged);
          return merged;
        });
        if(fbClean.length<docs.length) fbBatch(wc(uid,'services'),fbClean);
      } else {
        const local=dedupeServices(ls(K.services,[]));
        if(local.length){ fbBatch(wc(uid,'services'),local); }
      }
    });

    // Expenses
    const uE=fbListen(wc(uid,'expenses'),docs=>{
      if(docs.length>0){ setExpenses(docs); lss(K.expenses,docs); }
      else { const l=ls(K.expenses,[]); if(l.length){ fbBatch(wc(uid,'expenses'),l); } }
    });

    return ()=>{ uP&&uP(); uJ(); uS(); uE(); };
  },[stage,user]);

  // ── Persist profile locally ────────────────────────────────────────────────
  useEffect(()=>{
    if(user&&profile.onboardingDone) lss(lk(user.uid).profile,profile);
  },[profile,user]);

  // ── Sync profile to Firebase (only after onboarding) ──────────────────────
  useEffect(()=>{
    if(!user||!_db||!profile.onboardingDone) return;
    fbSetDoc(ws(user.uid)?.collection('profile')?.doc('main'),
      {...profile,uid:user.uid,updatedAt:new Date().toISOString()});
  },[profile,user]);

  // ── Sync services (always dedupe before write) ─────────────────────────────
  useEffect(()=>{
    if(!user||!_db||stage!=='app') return;
    const d=dedupeServices(services);
    lss(lk(user.uid).services,d);
    if(d.length) fbBatch(wc(user.uid,'services'),d);
  },[services,user,stage]);

  // ── Save job ───────────────────────────────────────────────────────────────
  const saveJob=useCallback((job,andAdd)=>{
    const e={...job,id:job.id||uid()};
    setJobs(prev=>{const next=[e,...prev.filter(j=>j.id!==e.id)]; lss(lk(user.uid).jobs,next); return next;});
    if(user&&_db) fbSet(wc(user.uid,'jobs'),e.id,e);
    if(!andAdd) setTab('dashboard');
  },[user]);

  const updateServices=useCallback(svcs=>{
    const d=dedupeServices(svcs);
    setServices(d);
    if(user&&_db) fbBatch(wc(user.uid,'services'),d);
  },[user]);

  const updateExpenses=useCallback(exps=>{
    setExpenses(exps); lss(lk(user.uid).expenses,exps);
    if(user&&_db) fbBatch(wc(user.uid,'expenses'),exps);
  },[user]);

  const handleRepeat=useCallback(job=>{ setPrefill(job); setTab('add'); },[]);

  const signOut=async()=>{
    try{ await _auth.signOut(); }catch{}
    setUser(null); setStage('welcome');
    setProfile(DEF_PROFILE()); setJobs([]); setServices([]); setExpenses([]);
  };

  // ── Onboarding complete ─────────────────────────────────────────────────────
  const finishOnboarding=useCallback((newProfile,newServices)=>{
    const p={...newProfile,onboardingDone:true,servicesSeeded:true};
    const d=dedupeServices(newServices);

    // ── CRITICAL ORDER ──────────────────────────────────────────────────────
    // markObDone MUST be first. If auth listener fires during any async gap
    // below, it will see isObDone()===true and NOT reset to onboarding.
    if(user) markObDone(user.uid);

    // Write localStorage before state — so if re-render triggers auth check
    // it reads consistent data
    if(user){
      const K=lk(user.uid);
      lss(K.profile,p);
      lss(K.services,d);
    }

    // Now safe to update React state
    setProfile(p);
    setServices(d);

    // Set stage — auth listener is now protected by authInitialized ref
    setStage('app');

    // Firebase writes happen AFTER stage change (listeners will use justSeeded guard)
    if(user&&_db){
      justSeeded.current=true; // tell services listener to skip re-merge
      fbSetDoc(ws(user.uid)?.collection('profile')?.doc('main'),
        {...p,uid:user.uid,updatedAt:new Date().toISOString()});
      fbBatch(wc(user.uid,'services'),d);
    }
  },[user]);

  // ── Render ─────────────────────────────────────────────────────────────────
  if(stage==='init') return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a',flexDirection:'column',gap:16}}>
      <img src={MSOS_LOGO} alt="" style={{width:56,height:56,borderRadius:15,opacity:.5}}/>
      <div style={{color:'#2a2a2a',fontSize:13}}>Loading…</div>
    </div>
  );

  if(stage==='welcome') return <Welcome onContinue={()=>setStage('auth')}/>;

  if(stage==='auth') return (
    <AuthScreen onAuth={u=>{
      setUser(u);
      authInitialized.current=true; // ← mark initialized so auth listener skips on re-fire
      if(isObDone(u.uid)){
        const K=lk(u.uid);
        setProfile(ls(K.profile,DEF_PROFILE()));
        setJobs(ls(K.jobs,[]));
        setServices(dedupeServices(ls(K.services,[])));
        setExpenses(ls(K.expenses,[]));
        setStage('app');
      } else {
        const cached=ls(lk(u.uid).profile,null);
        if(cached?.onboardingDone===true){
          markObDone(u.uid);
          setProfile(cached);
          setStage('app');
        } else {
          setStage('onboarding');
        }
      }
    }}/>
  );

  if(stage==='onboarding') return <Onboarding user={user} onComplete={finishOnboarding}/>;

  const NAV=[
    {id:'dashboard',ico:'📊',l:'Home'},
    {id:'add',      ico:'＋',l:'Add'},
    {id:'history',  ico:'📋',l:'History'},
    {id:'payouts',  ico:'💰',l:'Payouts'},
    {id:'expenses', ico:'🧾',l:'Expenses'},
    {id:'services', ico:'🛠',l:'Services'},
    {id:'settings', ico:'⚙️',l:'Settings'},
  ];

  return(
    <div className="app">
      <Header profile={profile} sync={sync} onSignOut={signOut}/>
      {tab==='dashboard'&&<Dashboard jobs={jobs} services={services} profile={profile} setTab={setTab} onRepeat={handleRepeat}/>}
      {tab==='add'      &&<AddJob onSave={saveJob} profile={profile} services={services} jobs={jobs} prefill={prefill} onClear={()=>setPrefill(null)}/>}
      {tab==='history'  &&<History jobs={jobs} profile={profile} setJobs={jbs=>{setJobs(jbs);lss(lk(user.uid).jobs,jbs);if(user&&_db)jbs.forEach(j=>fbSet(wc(user.uid,'jobs'),j.id,j));}} onRepeat={handleRepeat}/>}
      {tab==='payouts'  &&<Payouts jobs={jobs} profile={profile}/>}
      {tab==='expenses' &&<Expenses expenses={expenses} setExpenses={updateExpenses}/>}
      {tab==='services' &&<Services services={services} setServices={updateServices} profile={profile}/>}
      {tab==='settings' &&<Settings profile={profile} setProfile={setProfile} jobs={jobs} setJobs={setJobs} expenses={expenses} services={services}/>}
      <nav className="nav">
        {NAV.map(({id,ico,l})=>(
          <button key={id} className={`nbtn ${tab===id?'on':''}`} onClick={()=>setTab(id)}>
            <span className="ico">{ico}</span>{l}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
