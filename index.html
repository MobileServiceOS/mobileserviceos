function QuickQuote({ form, settings, bizTypeId, onApply, onFormChange, priceMode, setPriceMode }) {
  const customRef = useRef(null);
  const hasInputs = Number(form.miles || 0) > 0 || Number(form.tireCost || 0) > 0 || Number(form.miscCost || 0) > 0;
  const calc = calculatePricing(form, settings, bizTypeId);
  const { directCost, suggestedPrice: suggested, premiumPrice, decisionLabel, decisionType } = calc;
  const skip = Number(settings.skipThreshold || 70);
  const dispPrice = priceMode === "custom" ? Number(form.revenue || 0) : priceMode === "premium" ? premiumPrice : suggested;
  const profit = r2(dispPrice - directCost);
  const liveDec = priceMode === "custom" && Number(form.revenue || 0) > 0
    ? (profit < skip ? { label: "Low margin", type: "low" } : profit >= skip + 40 ? { label: "Strong profit", type: "strong" } : { label: "Take it", type: "take" })
    : { label: decisionLabel, type: decisionType };
  const handleMode = (mode, price) => {
    if (setPriceMode) setPriceMode(mode);
    onApply(price === "" ? "" : String(price));
    if (mode === "custom") setTimeout(() => customRef.current && customRef.current.focus(), 80);
  };
  const inpSt = { background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.18)", borderRadius: 8, padding: "8px 10px", color: "#fff", fontSize: 15, outline: "none", width: "100%", fontFamily: '"IBM Plex Mono",monospace', fontWeight: 600, textAlign: "center" };
  const lbl = { fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".6px", color: "var(--t2)", marginBottom: 5, textAlign: "center" };
  return html`<div style=${{ background: "linear-gradient(135deg,var(--s2) 0%,#181824 100%)", borderRadius: "var(--r1)", padding: 18, marginBottom: 14, border: "1px solid var(--brand-dim)", boxShadow: "0 0 0 1px var(--brand-dim),var(--sh-card)" }}>
    <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
      <div><div style=${lbl}>Miles</div><input type="number" min="0" inputMode="decimal" placeholder="0" value=${form.miles || ""} onChange=${e => onFormChange("miles", e.target.value)} style=${inpSt}/></div>
      <div><div style=${lbl}>Mat $</div><input type="number" min="0" inputMode="decimal" placeholder="0" value=${form.tireCost || ""} onChange=${e => onFormChange("tireCost", e.target.value)} style=${inpSt}/></div>
      <div><div style=${lbl}>Misc $</div><input type="number" min="0" inputMode="decimal" placeholder="0" value=${form.miscCost || ""} onChange=${e => onFormChange("miscCost", e.target.value)} style=${inpSt}/></div>
      <div><div style=${lbl}>Qty</div><input type="number" min="1" inputMode="numeric" placeholder="1" value=${form.qty || ""} onChange=${e => onFormChange("qty", e.target.value)} style=${inpSt}/></div>
    </div>
    ${!hasInputs ? html`<div style=${{ textAlign: "center", padding: "8px 0" }}>
      <div style=${{ fontSize: 13, color: "var(--t2)", fontWeight: 600 }}>Enter job details above</div>
      <div style=${{ fontSize: 11, color: "var(--t3)", marginTop: 4 }}>Auto-calculates suggested price</div>
    </div>` : html`<div>
      <div style=${{ textAlign: "center", padding: "10px 0" }}>
        <div style=${{ fontSize: 9, fontWeight: 800, textTransform: "uppercase", letterSpacing: "1.4px", color: "var(--t3)", marginBottom: 6 }}>
          ${priceMode === "custom" ? "Custom" : priceMode === "premium" ? "Premium" : "Suggested"} Price
        </div>
        <div style=${{ fontFamily: '"IBM Plex Mono",monospace', fontSize: 44, fontWeight: 800, lineHeight: .95, letterSpacing: "-2px", color: "var(--t1)", background: "linear-gradient(180deg,#fff,#cfd9ff 90%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>${money(dispPrice)}</div>
        <div style=${{ display: "flex", justifyContent: "center", gap: 16, marginTop: 8 }}>
          <div style=${{ textAlign: "center" }}><div style=${{ fontSize: 10, color: "var(--t3)", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Cost</div><div style=${{ fontFamily: '"IBM Plex Mono",monospace', fontWeight: 700, color: "var(--t2)" }}>${money(directCost)}</div></div>
          <div style=${{ width: 1, background: "var(--border)" }}/>
          <div style=${{ textAlign: "center" }}><div style=${{ fontSize: 10, color: "var(--t3)", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Profit</div><div style=${{ fontFamily: '"IBM Plex Mono",monospace', fontWeight: 700, color: profit >= skip ? "var(--green)" : "var(--red)" }}>${money(profit)}</div></div>
        </div>
        <div style=${{ marginTop: 8, fontSize: 11, fontWeight: 800, color: liveDec.type === "low" ? "var(--red)" : "var(--green)", padding: "4px 12px", display: "inline-block", borderRadius: 999, background: liveDec.type === "low" ? "var(--red-dim)" : "var(--green-dim)" }}>${liveDec.label}</div>
      </div>
      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, padding: 8 }}>
        <button class="press-scale" onClick=${() => handleMode("suggested", suggested)}
          style=${{ background: priceMode === "suggested" ? "var(--green-dim)" : "var(--s3)", color: priceMode === "suggested" ? "var(--green)" : "var(--t2)", border: "1px solid " + (priceMode === "suggested" ? "rgba(34,197,94,.3)" : "var(--border)"), borderRadius: 10, padding: "10px 4px", fontSize: 11, fontWeight: 800, lineHeight: 1.3, cursor: "pointer" }}>${money(suggested)}<br/><span style=${{ fontSize: 10, opacity: .8 }}>Suggest</span></button>
        <button class="press-scale" onClick=${() => handleMode("premium", premiumPrice)}
          style=${{ background: priceMode === "premium" ? "var(--orange-dim)" : "var(--s3)", color: priceMode === "premium" ? "var(--orange)" : "var(--t2)", border: "1px solid " + (priceMode === "premium" ? "rgba(255,125,59,.3)" : "var(--border)"), borderRadius: 10, padding: "10px 4px", fontSize: 11, fontWeight: 800, lineHeight: 1.3, cursor: "pointer" }}>${money(premiumPrice)}<br/><span style=${{ fontSize: 10, opacity: .8 }}>Premium</span></button>
        <button class="press-scale" onClick=${() => handleMode("custom", "")}
          style=${{ background: priceMode === "custom" ? "var(--brand-dim)" : "var(--s3)", color: priceMode === "custom" ? "var(--brand)" : "var(--t2)", border: "1px solid " + (priceMode === "custom" ? "var(--brand-dim)" : "var(--border)"), borderRadius: 10, padding: "10px 4px", fontSize: 11, fontWeight: 800, lineHeight: 1.3, cursor: "pointer" }}>Custom<br/><span style=${{ fontSize: 10, opacity: .8 }}>Enter →</span></button>
      </div>
      ${priceMode === "custom" && html`<div style=${{ padding: "10px 10px 4px" }}>
        <input ref=${customRef} type="number" min="0" inputMode="decimal" placeholder="0.00" value=${form.revenue || ""} onChange=${e => onFormChange("revenue", e.target.value)}
          style=${{ background: "rgba(255,255,255,.12)", border: "2px solid rgba(255,255,255,.3)", borderRadius: 10, padding: 12, color: "#fff", fontSize: 22, outline: "none", width: "100%", fontFamily: '"IBM Plex Mono",monospace', fontWeight: 700, textAlign: "center" }}/>
      </div>`}
    </div>`}
  </div>`;
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function Dashboard({ jobs, settings, profile, setTab, onRepeat, onStartJob, onUpgrade }) {
  const bt = getBizType(settings.bizTypeId);
  const safeJobs = Array.isArray(jobs) ? jobs : [];
  const today = TODAY(), thisWeek = getWeekStart(today);
  const weekJobs  = useMemo(() => safeJobs.filter(j => getWeekStart(j.date) === thisWeek), [safeJobs, thisWeek]);
  const todayJobs = useMemo(() => safeJobs.filter(j => j.date === today), [safeJobs, today]);
  const totals = useMemo(() => weekSummary(weekJobs, settings), [weekJobs, settings]);
  const goalPct = clamp((totals.grossProfit / (settings.weeklyGoal || 1)) * 100, 0, 100);
  const ringColor = goalPct >= 100 ? "var(--green)" : goalPct >= 60 ? "var(--brand)" : "var(--amber)";

  const [qq, setQq] = useState(EMPTY_JOB(bt.id));
  const [qqMode, setQqMode] = useState("suggested");
  const qqChange = (k, v) => setQq(p => ({ ...p, [k]: v }));
  const qqApply  = price => setQq(p => ({ ...p, revenue: price }));

  // Plan limit check: starter capped at 50 jobs/month
  const monthKey = getMonthKey(today);
  const monthJobsCount = safeJobs.filter(j => getMonthKey(j.date) === monthKey).length;
  const jobsLimit = planLimit(profile, "jobsPerMonth");
  const overLimit = monthJobsCount >= (Number.isFinite(jobsLimit) ? jobsLimit : Infinity);

  const recent = useMemo(() => [...safeJobs].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0, 5), [safeJobs]);

  return html`<div class="screen"><div class="page page-enter">
    <div class="pro-hero card-anim premium-grain">
      <div style=${{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 22, gap: 16 }}>
        <div style=${{ flex: 1, minWidth: 0 }}>
          <div class="t-label" style=${{ color: "var(--brand)", marginBottom: 14 }}>This Week</div>
          <div class="hero-amount">
            <span class="currency">$</span>${Math.floor(totals.grossProfit).toLocaleString()}
          </div>
          <div class="t-meta" style=${{ marginTop: 10, color: "var(--t3)" }}>
            gross profit · ${weekJobs.length} job${weekJobs.length !== 1 ? "s" : ""} · ${money(totals.revenue)} rev
          </div>
        </div>
        <${ProgressRing} size=${88} stroke=${6} pct=${goalPct} color=${ringColor}>
          <div class="num" style=${{ fontSize: 18, fontWeight: 700, color: "var(--t1)", letterSpacing: "-1px", lineHeight: 1 }}>${Math.round(goalPct)}%</div>
          <div class="t-label" style=${{ fontSize: 8, letterSpacing: ".5px", marginTop: 2 }}>Goal</div>
        <//>
      </div>
      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, padding: "16px 0 4px", borderTop: "1px solid var(--border)" }}>
        <div style=${{ textAlign: "center" }}>
          <div class="num" style=${{ fontSize: 18, fontWeight: 700, color: "var(--t1)", letterSpacing: "-1px" }}>${money(totals.revenue)}</div>
          <div class="t-label" style=${{ marginTop: 4 }}>Revenue</div>
        </div>
        <div style=${{ textAlign: "center", borderLeft: "1px solid var(--border)", borderRight: "1px solid var(--border)" }}>
          <div class="num" style=${{ fontSize: 18, fontWeight: 700, color: "var(--red)", letterSpacing: "-1px" }}>${money(totals.directCosts)}</div>
          <div class="t-label" style=${{ marginTop: 4 }}>Costs</div>
        </div>
        <div style=${{ textAlign: "center" }}>
          <div class="num" style=${{ fontSize: 18, fontWeight: 700, color: "var(--brand)", letterSpacing: "-1px" }}>${todayJobs.length}</div>
          <div class="t-label" style=${{ marginTop: 4 }}>Today</div>
        </div>
      </div>
    </div>

    ${overLimit && html`<div class="card-anim" style=${{ background: "var(--amber-dim)", border: "1px solid rgba(245,158,11,.3)", borderRadius: "var(--r2)", padding: "14px 16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
      <div>
        <div style=${{ fontSize: 13, fontWeight: 800, color: "var(--amber)" }}>Monthly limit reached</div>
        <div style=${{ fontSize: 11, color: "rgba(245,158,11,.7)", marginTop: 3 }}>Starter is capped at ${jobsLimit} jobs/month.</div>
      </div>
      <button class="btn primary press-scale" style=${{ padding: "8px 14px", fontSize: 12 }} onClick=${onUpgrade}>Upgrade</button>
    </div>`}

    <div class="card-anim" style=${{ marginBottom: 16 }}>
      <button class="cta-btn press-scale" onClick=${() => setTab("add")} disabled=${overLimit}>
        <span style=${{ fontSize: 18 }}>＋</span><span>New ${bt.name.replace("Mobile ", "")} Job</span>
      </button>
    </div>

    <div class="card-anim">
      <div class="section-label" style=${{ marginTop: 0, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span>Quick Quote</span>
        ${Number(qq.revenue || 0) > 0 && html`<button class="btn primary sm press-scale" style=${{ fontSize: 11, padding: "4px 12px" }}
          onClick=${() => { onStartJob && onStartJob(qq); setQq(EMPTY_JOB(bt.id)); setQqMode("suggested"); }}>Start Job →</button>`}
      </div>
      <div style=${{ marginBottom: 4 }}>
        <div style=${{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
          ${bt.services.filter(s => s !== "Other").slice(0, 5).map(s => html`<button key=${s} type="button" class=${"chip press-scale" + (qq.service === s ? " active" : "")} onClick=${() => qqChange("service", s)} style=${{ fontSize: 11 }}>${s}</button>`)}
        </div>
        ${bt.vehicleTypes.length > 0 && html`<div style=${{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          ${bt.vehicleTypes.map(v => html`<button key=${v} type="button" class=${"chip press-scale" + (qq.vehicleType === v ? " active" : "")} onClick=${() => qqChange("vehicleType", v)} style=${{ fontSize: 11 }}>${v}</button>`)}
        </div>`}
        <div style=${{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
          ${flagsForBizType(bt.id).map(([k, label]) => html`<button key=${k} type="button" class=${"chip press-scale" + (qq[k] ? " active" : "")} onClick=${() => qqChange(k, !qq[k])} style=${{ fontSize: 10, padding: "4px 8px" }}>${label}</button>`)}
        </div>
      </div>
      <${QuickQuote} form=${qq} settings=${settings} bizTypeId=${bt.id} onApply=${qqApply} onFormChange=${qqChange} priceMode=${qqMode} setPriceMode=${setQqMode}/>
    </div>

    ${todayJobs.length > 0 && html`<div class="card-anim">
      <div class="section-label">Today</div>
      <div class="mini-grid">
        <div class="mini-box"><strong>${todayJobs.length}</strong><span>Jobs</span></div>
        <div class="mini-box"><strong>${money(todayJobs.reduce((s, j) => s + Number(j.revenue || 0), 0))}</strong><span>Revenue</span></div>
        <div class="mini-box"><strong style=${{ color: "var(--green)" }}>${money(todayJobs.reduce((s, j) => s + jobGrossProfit(j, settings), 0))}</strong><span>Profit</span></div>
        <div class="mini-box"><strong>${todayJobs.filter(j => j.status === "Completed").length}</strong><span>Done</span></div>
      </div>
    </div>`}

    <div class="section-label card-anim">Recent Jobs</div>
    ${recent.length > 0
      ? html`<div class="stack">${recent.map((job, idx) => {
          const profit = jobGrossProfit(job, settings);
          const cls = profit >= 70 ? "green" : profit >= 40 ? "orange" : "red";
          return html`<div class="job-row card-anim press-scale" key=${job.id || idx}
            style=${{ cursor: "pointer", animationDelay: (0.05 * idx) + "s" }} onClick=${() => onRepeat(job)}>
            <div class="job-icon">${bt.icon}</div>
            <div class="job-main">
              <div class="job-title">${job.service || "Job"}</div>
              <div class="job-meta">${job.area || ""} · ${job.date || ""}${job.tireSize ? " · " + job.tireSize : ""}</div>
              <div style=${{ marginTop: 7, display: "flex", gap: 6 }}>
                <span class=${"pill " + cls}>${money(profit)}</span>
                ${job.status === "Pending" && html`<span class="pill gold">Pending</span>`}
              </div>
            </div>
            <div class="job-right">
              <div style=${{ fontFamily: '"IBM Plex Mono",monospace', fontSize: 18, fontWeight: 700, color: "var(--t1)", letterSpacing: "-1px" }}>${money(job.revenue || 0)}</div>
              <div style=${{ fontSize: 10, color: "var(--t3)", marginTop: 3 }}>${job.payment || ""}</div>
            </div>
          </div>`;
        })}</div>`
      : html`<${EmptyState} icon=${bt.icon} title="Your first job awaits" sub=${"Log your first " + bt.name.toLowerCase() + " job."}
          action=${html`<button class="btn primary press-scale" onClick=${() => setTab("add")}>Log First Job</button>`}/>`}
  </div></div>`;
}

  "Arlington, VA":    ["Arlington","Crystal City","Rosslyn","Ballston","Clarendon","Pentagon City"],
};

// Build reverse index: city (lower-case) → county. O(1) lookups.
const _CITY_TO_COUNTY = (() => {
  const map = {};
  Object.keys(US_COUNTY_CITIES).forEach(county => {
    US_COUNTY_CITIES[county].forEach(city => {
      const k = city.toLowerCase();
      if (!map[k]) map[k] = county;  // first match wins for ambiguous names
    });
  });
  return map;
})();

function findCountyForCity(city) {
  if (!city) return null;
  return _CITY_TO_COUNTY[String(city).toLowerCase().trim()] || null;
}

// Given a list of cities the user has worked in, find the dominant county
// (the county containing the most of their cities) and return the FULL list
// of cities in that county. Used to expand autocomplete coverage from
// "cities I've worked in" to "cities in my service area."
function inferServiceAreaCities(workedCities) {
  if (!Array.isArray(workedCities) || !workedCities.length) return [];
  const countyVotes = {};
  workedCities.forEach(c => {
    const cty = findCountyForCity(c);
    if (cty) countyVotes[cty] = (countyVotes[cty] || 0) + 1;
  });
  const top = Object.entries(countyVotes).sort((a, b) => b[1] - a[1])[0];
  if (!top) return [];
  return US_COUNTY_CITIES[top[0]] || [];
}


// ── CityAutocomplete ───────────────────────────────────────────────────────
// Typeahead input for the City/Area field. Two-tier suggestions:
//
//   Tier 1: cities the user has worked in (from job history), ranked by
//           frequency. These carry a count badge ("12×").
//   Tier 2: other cities in the same county/metro as their worked cities.
//           Inferred from history — if the user has worked in Sunrise and
//           Hollywood (both Broward, FL), they probably also serve Fort
//           Lauderdale, Pembroke Pines, etc., so we surface those too.
//
// Both tiers are filtered by the current input and shown together, with
// tier 1 (history) above tier 2 (county-mates).
function CityAutocomplete({ value, onChange, jobs, serviceAreas, placeholder }) {
  const [focused, setFocused] = useState(false);
  const [highlightIdx, setHighlightIdx] = useState(0);
  const blurTimeoutRef = useRef(null);

  // Tier 1: cities the user has explicitly declared as their service area
  // (set in onboarding or Settings → Service Areas). These are the user's
  // declared territories — highest priority in suggestions.
  const declaredAreas = useMemo(() => {
    const arr = Array.isArray(serviceAreas) ? serviceAreas : [];
    return arr
      .map(c => String(c || "").trim())
      .filter(Boolean)
      .map(city => ({ city, count: 0, source: "declared" }));
  }, [serviceAreas]);

  // Tier 2: cities the user has worked in, ranked by frequency.
  const recentCities = useMemo(() => {
    const counts = {};
    (Array.isArray(jobs) ? jobs : []).forEach(j => {
      const c = (j.area || "").trim();
      if (!c) return;
      counts[c] = (counts[c] || 0) + 1;
    });
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
      .slice(0, 30)
      .map(([city, count]) => ({ city, count, source: "history" }));
  }, [jobs]);

  // Tier 3: other cities in the same county as declared/worked cities.
  // Pulls from US_COUNTY_CITIES based on a majority-vote inference.
  const countyMateCities = useMemo(() => {
    const seed = [...declaredAreas, ...recentCities].map(r => r.city);
    const all = inferServiceAreaCities(seed);
    if (!all.length) return [];
    const seen = new Set(seed.map(c => c.toLowerCase()));
    return all.filter(c => !seen.has(c.toLowerCase()))
              .map(city => ({ city, count: 0, source: "county-mate" }));
  }, [declaredAreas, recentCities]);

  // Combined list, filtered by input. Dedupe on lowercase city name —
  // a city that's both "declared" and "history" appears once with its
  // higher-priority source (declared > history > county-mate).
  const filtered = useMemo(() => {
    const q = (value || "").trim().toLowerCase();
    const seen = new Set();
    const merged = [];
    [...declaredAreas, ...recentCities, ...countyMateCities].forEach(r => {
      const key = r.city.toLowerCase();
      if (seen.has(key)) return;
      seen.add(key);
      merged.push(r);
    });
    if (!q) return merged.slice(0, 25);
    const exactMatch = merged.find(r => r.city.toLowerCase() === q);
    if (exactMatch && q === exactMatch.city.toLowerCase()) return [];
    return merged.filter(r => r.city.toLowerCase().includes(q)).slice(0, 25);
  }, [value, declaredAreas, recentCities, countyMateCities]);

  const showDropdown = focused && filtered.length > 0;

  const pick = (city) => {
    onChange(city);
    setFocused(false);
    setHighlightIdx(0);
  };

  const onKeyDown = (e) => {
    if (!showDropdown) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setHighlightIdx(i => Math.min(filtered.length - 1, i + 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setHighlightIdx(i => Math.max(0, i - 1));
    } else if (e.key === "Enter" && filtered[highlightIdx]) {
      e.preventDefault();
      pick(filtered[highlightIdx].city);
    } else if (e.key === "Escape") {
      setFocused(false);
    }
  };

  return html`<div style=${{ position: "relative" }}>
    <input
      value=${value || ""}
      onChange=${e => { onChange(e.target.value); setHighlightIdx(0); }}
      onFocus=${() => { if (blurTimeoutRef.current) clearTimeout(blurTimeoutRef.current); setFocused(true); }}
      onBlur=${() => { blurTimeoutRef.current = setTimeout(() => setFocused(false), 150); }}
      onKeyDown=${onKeyDown}
      placeholder=${placeholder || "Type a city…"}
      autoComplete="off"
      autoCapitalize="words"
    />
    ${showDropdown && html`<div style=${{
      position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0,
      background: "var(--s2)", border: "1px solid var(--border)", borderRadius: 10,
      boxShadow: "0 8px 32px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3)",
      maxHeight: 280, overflowY: "auto", zIndex: 100,
    }}>
      ${filtered.map((row, idx) => html`<div key=${row.city + ":" + row.source}
        onMouseDown=${(e) => { e.preventDefault(); pick(row.city); }}
        onMouseEnter=${() => setHighlightIdx(idx)}
        style=${{
          padding: "10px 14px", cursor: "pointer", fontSize: 14,
          background: idx === highlightIdx ? "var(--brand-dim)" : "transparent",
          color: idx === highlightIdx ? "var(--brand)" : "var(--t1)",
          display: "flex", justifyContent: "space-between", alignItems: "center",
          borderBottom: idx < filtered.length - 1 ? "1px solid var(--border2)" : "none",
        }}>
        <span>${row.city}</span>
        <span style=${{ fontSize: 11, color: "var(--t3)", fontFamily: '"IBM Plex Mono",monospace' }}>
          ${row.source === "declared" ? "📍 service area"
            : row.source === "history" ? row.count + "×"
            : "near you"}
        </span>
      </div>`)}
    </div>`}
  </div>`;
}

    if (editJob && editJob.id) {
      setForm({ ...EMPTY_JOB(bt.id), ...editJob, revenue: String(editJob.revenue || ""), tireCost: String(editJob.tireCost || ""), miscCost: String(editJob.miscCost || ""), miles: String(editJob.miles || "") });
      setEditingId(editJob.id);
      setError(""); setPriceMode("suggested");
      if (onClearEdit) onClearEdit();
      return;
    }
    if (prefill) {
      setForm({ ...EMPTY_JOB(bt.id), ...prefill });
      setPriceMode("suggested");
      if (onClearPrefill) onClearPrefill();

    setForm(p => {

        const item = (Array.isArray(inventory) ? inventory : []).find(i => i.id === next.inventoryItemId);

        ${bt.vehicleTypes.length > 0 && html`<div class="field"><label>Vehicle</label>

              return html`<button key=${v} type="button" class=${"chip" + (form.vehicleType === v ? " active" : "")} onClick=${() => setF("vehicleType", v)}>${v}${addOn > 0 ? " +$" + addOn : ""}</button>`;

          <div class="field"><label>Miles (travel)</label>

      <div class="form-group card-anim">

           html`<button key="save" class="btn primary press-scale" onClick=${() => doSave(false)} disabled=${saving}>${saving ? "Saving…" : "Save Job →"}</button>`]}

// ── ReviewRequestModal ──────────────────────────────────────────────────────
// Generates a personalized review-request message after job completion.
// Provides three send paths:
//   1. Copy to clipboard (always works)
//   2. Web Share API (mobile native share sheet — opens WhatsApp, iMessage, etc.)
//   3. SMS link (sms: URI populated with the message + customer phone)
//
// The message is editable so the user can tweak tone before sending.
function ReviewRequestModal({ job, settings, onClose }) {
  const customerName  = (job.customerName || "").trim() || "there";
  const businessName  = (settings && settings.businessName || "").trim() || "us";
  const service       = (job.service || "your service").trim();
  const city          = (job.area || "").trim();
  const reviewUrl     = (settings && settings.googleReviewUrl || "").trim();

  // Build initial template. Mentioning service + city helps Google's local
  // search algorithm associate reviews with the business's service area —
  // a real SEO benefit, not just filler.
  const buildMessage = () => {
    const cityPhrase = city ? " in " + city : "";
    let msg = "Hi " + customerName + ", thank you for choosing " + businessName +
              " for " + service + cityPhrase + "! ";
    msg += "If you have a moment, we'd really appreciate a quick Google review — ";
    msg += "it makes a huge difference for our small business.";
    if (city || service) {
      msg += " If you can mention the service and location, that helps even more.";
    }
    if (reviewUrl) {
      msg += "\n\nLeave a review here: " + reviewUrl;
    }
    return msg;
  };

  const [message, setMessage] = useState(buildMessage());
  const [copied, setCopied]   = useState(false);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(message);
      setCopied(true);
      window.toast && window.toast("Message copied to clipboard", "success");
      setTimeout(() => setCopied(false), 2500);
    } catch {
      // Fallback: select the textarea so the user can copy manually
      const ta = document.getElementById("review-msg-ta");
      if (ta) { ta.select(); document.execCommand && document.execCommand("copy"); }
      window.toast && window.toast("Selected — press Cmd/Ctrl+C to copy", "info");
    }
  };

  const share = async () => {
    if (navigator.share) {
      try {
        await navigator.share({ text: message });
      } catch (e) {
        // User cancelled — silent
        if (e && e.name !== "AbortError") {
          window.toast && window.toast("Share failed: " + e.message, "warn");
        }
      }
    } else {
      // No native share → fall through to copy
      copy();
    }
  };

  const sms = () => {
    if (!job.customerPhone) {
      window.toast && window.toast("No phone number on file for this customer", "warn");
      return;
    }
    // SMS URI: works on iOS and Android. Encoding the message in the body
    // pre-fills the SMS app. The customer just hits send.
    const phone = String(job.customerPhone).replace(/[^\d+]/g, "");
    const url = "sms:" + phone + (navigator.userAgent.includes("iPhone") ? "&" : "?") + "body=" + encodeURIComponent(message);
    window.location.href = url;
  };

  const reset = () => setMessage(buildMessage());

  return html`<div class="modal-overlay" onClick=${(e) => { if (e.target === e.currentTarget) onClose(); }}
    style=${{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", backdropFilter: "blur(4px)", zIndex: 1000, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
    <div style=${{ background: "var(--s1)", width: "100%", maxWidth: 540, borderRadius: "20px 20px 0 0", padding: "20px 16px calc(28px + env(safe-area-inset-bottom))", maxHeight: "92vh", overflowY: "auto" }}>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style=${{ fontSize: 18, fontWeight: 800, color: "var(--t1)", display: "flex", alignItems: "center", gap: 8 }}>
          <span style=${{ fontSize: 22 }}>⭐</span>
          Review Request
        </div>
        <button onClick=${onClose} style=${{ background: "none", border: "none", fontSize: 26, color: "var(--t2)", cursor: "pointer", lineHeight: 1 }}>×</button>
      </div>

      ${!reviewUrl && html`<div style=${{
        background: "rgba(245,158,11,.10)", border: "1px solid rgba(245,158,11,.25)",
        borderRadius: 10, padding: "10px 12px", marginBottom: 14,
        fontSize: 12, color: "var(--amber)", lineHeight: 1.5,
      }}>
        ⚠️ No Google Review link saved yet. The message will send without a link — add yours in <strong>Settings → Google Reviews</strong> for one-tap reviews.
      </div>`}

      <div style=${{ fontSize: 12, color: "var(--t3)", marginBottom: 8 }}>
        Customer: <span style=${{ color: "var(--t2)", fontWeight: 600 }}>${customerName === "there" ? "(no name)" : customerName}</span>${job.customerPhone ? html`<span> · ${job.customerPhone}</span>` : ""}
      </div>

      <textarea id="review-msg-ta"
        value=${message}
        onChange=${e => setMessage(e.target.value)}
        rows=${7}
        style=${{
          width: "100%", background: "var(--s2)", border: "1px solid var(--border)",
          borderRadius: 12, padding: "12px 14px", fontSize: 14, color: "var(--t1)",
          fontFamily: "inherit", lineHeight: 1.5, resize: "vertical", minHeight: 130,
          outline: "none", boxSizing: "border-box",
        }}
      />

      <div style=${{ display: "flex", gap: 6, marginTop: 8, justifyContent: "space-between", alignItems: "center" }}>
        <button onClick=${reset} style=${{ background: "none", border: "none", color: "var(--t3)", fontSize: 11, cursor: "pointer", padding: "6px 0" }}>
          ↻ Reset to default
        </button>
        <div style=${{ fontSize: 11, color: "var(--t3)" }}>${message.length} chars</div>
      </div>

      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 14 }}>
        <button class="btn secondary press-scale" onClick=${copy}
          style=${{ padding: "13px 14px", fontSize: 13 }}>
          ${copied ? "✓ Copied!" : "📋 Copy"}
        </button>
        ${navigator.share
          ? html`<button class="btn primary press-scale" onClick=${share}
              style=${{ padding: "13px 14px", fontSize: 13 }}>
              📤 Share
            </button>`
          : html`<button class="btn primary press-scale" onClick=${copy}
              style=${{ padding: "13px 14px", fontSize: 13 }}>
              📋 Copy & Send
            </button>`}
      </div>

      ${job.customerPhone && html`<button class="btn blue press-scale" onClick=${sms}
        style=${{ width: "100%", padding: "13px 14px", fontSize: 13, marginTop: 8 }}>
        💬 Send via SMS to ${job.customerPhone}
      </button>`}

      ${reviewUrl && html`<a href=${reviewUrl} target="_blank" rel="noopener"
        style=${{
          display: "block", textAlign: "center", marginTop: 12,
          fontSize: 11, color: "var(--t3)", textDecoration: "none",
          padding: "8px",
        }}>
        🔗 Preview review page →
      </a>`}
    </div>
  </div>`;
}

function History({ jobs, settings, profile, onRepeat, onDelete, onEdit, onUpgrade }) {

    if (search.trim()) {
      const q = search.toLowerCase();
      j = j.filter(x => (x.customerName || "").toLowerCase().includes(q) || (x.customerPhone || "").includes(q) || (x.tireSize || "").toLowerCase().includes(q) || (x.area || "").toLowerCase().includes(q));
    }
    return [...j].sort((a, b) => b.date.localeCompare(a.date));
  }, [safeJobs, filter, search]);
  const cities = useMemo(() => Array.from(new Set(safeJobs.map(j => j.area).filter(Boolean))).slice(0, 5), [safeJobs]);

  const handleDelete = id => { if (window.confirm("Delete this job?")) onDelete(id); };
  const sendInvoice  = (job) => {
    if (!hasFeature(profile, "pdfInvoices")) {
      showUpgradePrompt("pdfInvoices", onUpgrade);
      return;
    }
    generateBrandedInvoicePDF(job, settings);
  };
  const [reviewJob, setReviewJob] = useState(null);

  return html`<div class="screen"><div class="page page-enter">
    <div style=${{ marginBottom: 12 }}>
      <input value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search jobs, customers…"
        style=${{ width: "100%", background: "var(--s2)", border: "1px solid var(--border)", borderRadius: 14, padding: "14px 18px", outline: "none", fontSize: 15, color: "var(--t1)" }}/>
    </div>
    <div class="chip-row" style=${{ marginBottom: 14 }}>
      ${["All", "Pending"].concat(cities).map(c => html`<button key=${c} class=${"chip" + (filter === c ? " active" : "")} onClick=${() => setFilter(c)}>${c}</button>`)}
    </div>
    ${filtered.length === 0
      ? html`<${EmptyState} icon="📋" title="No jobs found" sub=${search ? "Try a different search." : "Log a job to see history."}/>`
      : html`<div class="stack">${filtered.map(job => {
          const profit = jobGrossProfit(job, settings);
          const cls = profit >= 70 ? "green" : profit >= 40 ? "orange" : "red";
          return html`<div key=${job.id} style=${{ background: "var(--s1)", borderRadius: "var(--r2)", overflow: "hidden", border: "1px solid var(--border)", boxShadow: "var(--sh-card)" }}>
            <div style=${{ padding: "15px 17px", display: "flex", alignItems: "flex-start", gap: 12 }}>
              <div class="job-icon">${bt.icon}</div>
              <div style=${{ flex: 1, minWidth: 0 }}>
                <div class="job-title">${job.service || "Job"}</div>
                <div class="job-meta">${job.area || ""} · ${job.date || ""}${job.tireSize ? " · " + job.tireSize : ""}</div>
                ${(job.customerName || job.customerPhone) && html`<div style=${{ fontSize: 11, color: "var(--t3)", marginTop: 1 }}>👤 ${job.customerName || ""}${job.customerPhone ? " · " + job.customerPhone : ""}</div>`}
                <div style=${{ marginTop: 7, display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <span class=${"pill " + cls}>${money(profit)}</span>
                  ${job.status === "Pending" && html`<span class="pill gold">Pending</span>`}
                </div>
              </div>
              <div style=${{ textAlign: "right", flexShrink: 0 }}>
                <div style=${{ fontFamily: '"IBM Plex Mono",monospace', fontSize: 18, fontWeight: 700, color: "var(--t1)", letterSpacing: "-1px" }}>${money(job.revenue || 0)}</div>
                <div style=${{ fontSize: 10, color: "var(--t3)", marginTop: 2 }}>${job.payment || ""}</div>
              </div>
            </div>
            <div style=${{ padding: "10px 17px 12px", borderTop: "1px solid var(--border2)", display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
              <button class="btn secondary xs press-scale" onClick=${() => onEdit(job)}>✏️</button>
              <button class="btn secondary xs press-scale" onClick=${() => onRepeat(job)}>🔁</button>
              <button class="btn blue xs press-scale" onClick=${() => sendInvoice(job)}>🧾 Invoice</button>
              <button class="btn xs press-scale" style=${{ background: "rgba(245,158,11,.18)", color: "var(--amber)", border: "1px solid rgba(245,158,11,.3)" }}
                onClick=${() => setReviewJob(job)}>⭐ Review</button>
              ${job.customerPhone && html`<button class="btn secondary xs press-scale" onClick=${() => window.open("tel:" + job.customerPhone)}>📞</button>`}
              <button class="btn danger xs press-scale" onClick=${() => handleDelete(job.id)}>×</button>
            </div>
          </div>`;
        })}</div>`}
    ${reviewJob && html`<${ReviewRequestModal} job=${reviewJob} settings=${settings} onClose=${() => setReviewJob(null)}/>`}
  </div></div>`;
}

// ── Inventory ──────────────────────────────────────────────────────────────
function Inventory({ inventory, setInventory, settings }) {
  const bt = getBizType(settings.bizTypeId);
  const [search, setSearch] = useState("");
  const [showNew, setShowNew] = useState(false);
  const [nt, setNt] = useState({ size: "", brand: "", model: "", condition: "New", qty: "1", cost: "", sellPrice: "", notes: "" });
  const inv = Array.isArray(inventory) ? inventory : [];

  const filtered = useMemo(() => {
    if (!search.trim()) return inv;
    const q = search.toLowerCase();
    return inv.filter(i => ((i.size || "") + " " + (i.brand || "") + " " + (i.model || "")).toLowerCase().includes(q));
  }, [inv, search]);

  const totalQty = inv.reduce((s, i) => s + Number(i.qty || 0), 0);
  const totalVal = inv.reduce((s, i) => s + Number(i.qty || 0) * Number(i.cost || 0), 0);

  const saveNew = () => {
    if (!nt.size.trim()) { window.toast && window.toast("Enter a size/name", "warn"); return; }
    const item = sanitizeInvItem({ ...nt, id: uid(), createdAt: Date.now() });
    setInventory(prev => [item, ...(Array.isArray(prev) ? prev : [])]);
    setNt({ size: "", brand: "", model: "", condition: "New", qty: "1", cost: "", sellPrice: "", notes: "" });
    setShowNew(false);
    window.toast && window.toast("Added to stock", "success");
  };

  const step = (id, delta) => {
    setInventory(prev => (Array.isArray(prev) ? prev : []).map(i => i.id === id ? { ...i, qty: Math.max(0, Number(i.qty || 0) + delta) } : i));
  };
  const remove = (id) => {
    if (!window.confirm("Remove this item?")) return;
    setInventory(prev => (Array.isArray(prev) ? prev : []).filter(i => i.id !== id));
  };

  if (!bt.showInventory) {
    return html`<div class="screen"><div class="page page-enter">
      <${EmptyState} icon="📦" title="Inventory not used" sub=${"Inventory tracking isn't set up for " + bt.name + "."}/>
    </div></div>`;
  }

  if (showNew) {
    return html`<div class="screen"><div class="page page-enter">
      <div style=${{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <button class="btn secondary press-scale" onClick=${() => setShowNew(false)}>← Back</button>
        <div style=${{ flex: 1, fontSize: 18, fontWeight: 800 }}>Add ${bt.inventoryLabel || "Item"}</div>
      </div>
      <div class="form-group">
        <div class="field"><label>${bt.showTireFields ? "Tire Size" : "Item Name"} *</label>
          <input value=${nt.size} onChange=${e => setNt({ ...nt, size: e.target.value })} placeholder=${bt.showTireFields ? "225/55R17" : "Oil filter"} autoFocus/></div>
        <div class="field-row">
          <div class="field"><label>Brand</label><input value=${nt.brand} onChange=${e => setNt({ ...nt, brand: e.target.value })}/></div>
          <div class="field"><label>Model</label><input value=${nt.model} onChange=${e => setNt({ ...nt, model: e.target.value })}/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Qty</label><input type="number" inputMode="decimal" value=${nt.qty} onChange=${e => setNt({ ...nt, qty: e.target.value })}/></div>
          <div class="field"><label>Cost ($)</label><input type="number" inputMode="decimal" value=${nt.cost} onChange=${e => setNt({ ...nt, cost: e.target.value })}/></div>
        </div>
        <div class="field"><label>Sell Price ($)</label><input type="number" inputMode="decimal" value=${nt.sellPrice} onChange=${e => setNt({ ...nt, sellPrice: e.target.value })}/></div>
        <div class="field"><label>Notes</label><input value=${nt.notes} onChange=${e => setNt({ ...nt, notes: e.target.value })}/></div>
        <button class="btn primary press-scale" style=${{ width: "100%" }} onClick=${saveNew}>Add Item</button>
      </div>
    </div></div>`;
  }

  return html`<div class="screen"><div class="page page-enter">
    <div class="kpi-grid three card-anim">
      <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value">${totalQty}</div><div class="kpi-sub">${inv.length} items</div></div>
      <div class="kpi"><div class="kpi-label">Value</div><div class="kpi-value" style=${{ fontSize: 16 }}>${money(totalVal)}</div><div class="kpi-sub">at cost</div></div>
      <div class="kpi"><div class="kpi-label">Out</div><div class="kpi-value">${inv.filter(i => Number(i.qty || 0) === 0).length}</div></div>
    </div>
    <div style=${{ display: "flex", gap: 8, marginBottom: 14 }}>
      <input value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search…"
        style=${{ flex: 1, background: "var(--s2)", border: "1px solid var(--border)", borderRadius: 12, padding: "13px 16px", outline: "none", fontSize: 15, color: "var(--t1)" }}/>
      <button class="btn primary press-scale" style=${{ padding: "13px 20px" }} onClick=${() => setShowNew(true)}>+ Add</button>
    </div>
    ${filtered.length === 0
      ? html`<${EmptyState} icon="📦" title="No items yet" sub="Tap + Add to track your stock."/>`
      : html`<div class="stack">${filtered.map(i => {
          const qty = Number(i.qty || 0);
          const isOut = qty === 0, isLow = qty > 0 && qty <= 2;
          const sub = [i.brand, i.model].filter(s => (s || "").trim()).join(" ");
          return html`<div key=${i.id} class="job-row">
            <div style=${{ flex: 1, minWidth: 0 }}>
              <div style=${{ fontSize: 14, fontWeight: 700, color: "var(--t1)", fontFamily: '"IBM Plex Mono",monospace' }}>${i.size}</div>
              ${sub && html`<div style=${{ fontSize: 11, color: "var(--t3)", marginTop: 2 }}>${sub}</div>`}
              <div style=${{ marginTop: 4, fontSize: 11, color: "var(--t3)" }}>
                ${Number(i.cost || 0) > 0 ? money(i.cost) + " ea" : ""}
                ${isLow && html`<span style=${{ marginLeft: 8, color: "var(--amber)", fontWeight: 700 }}>LOW</span>`}
                ${isOut && html`<span style=${{ marginLeft: 8, color: "var(--red)", fontWeight: 700 }}>OUT</span>`}
              </div>
            </div>
            <div style=${{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
              <button onClick=${() => step(i.id, -1)} style=${{ width: 32, height: 32, borderRadius: 8, border: "1px solid var(--border)", background: "var(--s3)", color: "var(--t2)", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>−</button>
              <div style=${{ minWidth: 28, textAlign: "center", fontFamily: '"IBM Plex Mono",monospace', fontWeight: 700 }}>${qty}</div>
              <button onClick=${() => step(i.id, 1)} style=${{ width: 32, height: 32, borderRadius: 8, border: "1px solid var(--brand)", background: "var(--brand)", color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>+</button>
              <button onClick=${() => remove(i.id)} style=${{ marginLeft: 4, padding: "6px 10px", borderRadius: 7, background: "var(--red-dim)", color: "var(--red)", border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>×</button>
            </div>
          </div>`;
        })}</div>`}
  </div></div>`;
}

// ── Expenses ───────────────────────────────────────────────────────────────
function Expenses({ expenses, setExpenses, jobs, settings, profile, onUpgrade }) {
  const safe = Array.isArray(expenses) ? expenses : [];
  const safeJobs = Array.isArray(jobs) ? jobs : [];
  const [form, setForm] = useState({ date: TODAY(), category: "Fuel", amount: "", note: "" });
  const CATS = ["Fuel", "Supplies", "Equipment", "Food", "Tolls", "Other"];
  const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const add = () => {
    const amt = Number(form.amount || 0);
    if (!amt) { window.toast && window.toast("Enter an amount", "warn"); return; }
    setExpenses(prev => [{ ...form, id: uid(), amount: amt }, ...(Array.isArray(prev) ? prev : [])]);
    setForm({ date: TODAY(), category: "Fuel", amount: "", note: "" });
    window.toast && window.toast("Expense logged", "success");
  };
  const remove = id => {
    if (!window.confirm("Delete?")) return;
    setExpenses(prev => (Array.isArray(prev) ? prev : []).filter(e => e.id !== id));
  };
  const total = safe.reduce((s, e) => s + Number(e.amount || 0), 0);
  const monthKey = getMonthKey(TODAY());
  const monthJobs = safeJobs.filter(j => getMonthKey(j.date) === monthKey);
  const monthly = monthSummary(monthJobs, settings);

  // Day-of-week analysis (Premium gated)
  const dowStats = useMemo(() => {
    const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const buckets = days.map(d => ({ day: d, jobs: 0, profit: 0 }));
    const fmt = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", weekday: "short" });
    const dayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
    safeJobs.forEach(j => {
      try {
        const dt = new Date(j.date + "T12:00:00Z");
        const idx = dayMap[fmt.format(dt)];
        if (idx >= 0) { buckets[idx].jobs += 1; buckets[idx].profit += jobGrossProfit(j, settings); }
      } catch (e) {}
    });
    return buckets;
  }, [safeJobs, settings]);
  const dowMax = Math.max(1, ...dowStats.map(d => d.profit));

  return html`<div class="screen"><div class="page page-enter">
    ${monthJobs.length > 0 && html`<div class="card-anim premium-grain" style=${{ position: "relative", background: "linear-gradient(145deg,#12121e 0%,#0d1020 50%,#101828 100%)", border: "1px solid var(--brand-dim)", borderRadius: "var(--r1)", padding: "22px 22px 20px", marginBottom: 18, overflow: "hidden", boxShadow: "0 0 0 1px var(--brand-dim),0 8px 32px rgba(0,0,0,.5)" }}>
      <div style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div class="t-label" style=${{ color: "var(--brand)" }}>Net Profit</div>
        <div class="t-meta" style=${{ fontFamily: '"IBM Plex Mono",monospace', color: "var(--t3)" }}>${monthLabel(monthKey)}</div>
      </div>
      <div class="hero-amount" style=${{ fontSize: 48, letterSpacing: "-2.2px", color: monthly.net >= 0 ? "var(--t1)" : "var(--red)" }}>
        <span class="currency" style=${{ fontSize: 24 }}>$</span>${Math.floor(Math.abs(monthly.net)).toLocaleString()}
      </div>
      <div class="t-meta" style=${{ marginTop: 8, color: "var(--t3)" }}>${money(monthly.revenue)} rev · ${money(monthly.directCosts)} direct · ${money(monthly.fixed)} fixed</div>
    </div>`}

    ${safeJobs.length >= 5 && html`<${FeatureGate} profile=${profile} featureKey="advancedAnalytics" title="Advanced Analytics" sub="Day-of-week profit insights are a Premium feature." onUpgrade=${onUpgrade}>
      <div class="card card-anim" style=${{ marginBottom: 14, padding: "14px 16px" }}>
        <div style=${{ fontSize: 9, fontWeight: 800, textTransform: "uppercase", letterSpacing: "1.4px", color: "var(--t3)", marginBottom: 12 }}>Best Days · Profit</div>
        <div style=${{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, alignItems: "end" }}>
          ${dowStats.map(d => {
            const pct = (d.profit / dowMax) * 100;
            const isBest = d.profit === dowMax && d.profit > 0;
            return html`<div key=${d.day} style=${{ textAlign: "center" }}>
              <div style=${{ fontSize: 10, fontFamily: '"IBM Plex Mono",monospace', fontWeight: 700, color: d.profit > 0 ? "var(--t1)" : "var(--t3)", marginBottom: 4 }}>${d.profit > 0 ? "$" + Math.round(d.profit) : "—"}</div>
              <div style=${{ height: 60, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                <div style=${{ width: "100%", height: Math.max(2, pct) + "%", background: isBest ? "var(--green)" : d.profit > 0 ? "var(--brand)" : "var(--border)", borderRadius: "3px 3px 0 0" }}/>
              </div>
              <div style=${{ fontSize: 10, color: "var(--t3)", fontWeight: 700, marginTop: 4 }}>${d.day}</div>
            </div>`;
          })}
        </div>
      </div>
    <//>`}

    <div class="section-label" style=${{ marginTop: 0 }}>Variable Expenses</div>
    <div class="mini-grid card-anim">
      <div class="mini-box"><strong>${money(total)}</strong><span>All Time</span></div>
      <div class="mini-box"><strong>${safe.length}</strong><span>Receipts</span></div>
      <div class="mini-box"><strong>${money(monthly.tireCosts + monthly.miscCosts)}</strong><span>Materials</span></div>
      <div class="mini-box"><strong>${money(monthly.travelCosts)}</strong><span>Travel</span></div>
    </div>
    <div class="card card-anim" style=${{ marginBottom: 14 }}><div class="card-pad">
      <div class="field-row">
        <div class="field" style=${{ marginBottom: 8 }}><label>Date</label><input type="date" value=${form.date} onChange=${e => setF("date", e.target.value)}/></div>
        <div class="field" style=${{ marginBottom: 8 }}><label>Amount ($)</label><input type="number" inputMode="decimal" value=${form.amount} onChange=${e => setF("amount", e.target.value)} placeholder="0.00"/></div>
      </div>
      <div class="field" style=${{ marginBottom: 8 }}><label>Category</label>
        <select value=${form.category} onChange=${e => setF("category", e.target.value)}>${CATS.map(c => html`<option key=${c}>${c}</option>`)}</select>
      </div>
      <div class="field" style=${{ marginBottom: 10 }}><label>Note</label><input value=${form.note} onChange=${e => setF("note", e.target.value)}/></div>
      <button class="btn primary press-scale" style=${{ width: "100%" }} onClick=${add}>+ Log Expense</button>
    </div></div>
    ${safe.length === 0
      ? html`<${EmptyState} icon="🧾" title="No expenses logged" sub="Track fuel, supplies, repairs."/>`
      : html`<div class="stack">${safe.map(exp => html`<div class="job-row card-anim" key=${exp.id}>
          <div class="job-icon" style=${{ fontSize: 16 }}>🧾</div>
          <div class="job-main"><div class="job-title">${exp.category || "Expense"}</div><div class="job-meta">${exp.date || ""}${exp.note ? " · " + exp.note : ""}</div></div>
          <div class="job-right"><div class="value red">${money(exp.amount || 0)}</div><button class="btn danger sm press-scale" style=${{ marginTop: 8 }} onClick=${() => remove(exp.id)}>×</button></div>
        </div>`)}</div>`}
  </div></div>`;
}

// ── Payouts ────────────────────────────────────────────────────────────────
function Payouts({ jobs, settings }) {
  const safeJobs = Array.isArray(jobs) ? jobs : [];
  const weeks = useMemo(() => groupByWeek(safeJobs), [safeJobs]);
  if (!weeks.length) return html`<div class="screen"><div class="page page-enter"><${EmptyState} icon="💰" title="No payout history" sub="Log jobs to see weekly breakdowns."/></div></div>`;

  const ao1 = settings.owner1Active !== false, ao2 = settings.owner2Active === true;
  const splitBase = (ao1 ? Number(settings.profitSplit1 || 50) : 0) + (ao2 ? Number(settings.profitSplit2 || 50) : 0) || 100;

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{ marginTop: 0 }}>Weekly Payouts</div>
    ${weeks.map(([wk, wkJobs]) => {
      const t = weekSummary(wkJobs, settings);
      const o1 = t.grossProfit > 0 && ao1 ? r2(t.grossProfit * (Number(settings.profitSplit1 || 50) / splitBase)) : 0;
      const o2 = t.grossProfit > 0 && ao2 ? r2(t.grossProfit * (Number(settings.profitSplit2 || 50) / splitBase)) : 0;
      const tax = t.grossProfit > 0 && settings.taxRate > 0 ? r2(t.grossProfit * (Number(settings.taxRate) / 100)) : 0;
      return html`<div class="card card-anim" key=${wk} style=${{ marginBottom: 14 }}>
        <div class="card-pad">
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div><div style=${{ fontWeight: 700, fontSize: 14 }}>${weekLabel(wk)}</div><div class="sub">${wkJobs.length} jobs</div></div>
            <div class=${"value big " + (t.grossProfit >= 0 ? "green" : "red")}>${money(t.grossProfit)}</div>
          </div>
        </div>
        <div class="card-row"><div class="label">Revenue</div><div class="value">${money(t.revenue)}</div></div>
        <div class="card-row"><div class="label">Direct Costs</div><div class="value red">${money(t.directCosts)}</div></div>
        <div class="card-row"><div class="label">Gross Profit</div><div class="value green">${money(t.grossProfit)}</div></div>
        ${[{ name: settings.owner1Name || "Owner 1", pct: settings.profitSplit1, amt: o1, active: ao1 },
           { name: settings.owner2Name || "Owner 2", pct: settings.profitSplit2, amt: o2, active: ao2 }].map((o, i) =>
          html`<div key=${i} class="card-row" style=${{ background: "var(--s2)", opacity: o.active ? 1 : .4 }}>
            <div><div class="label">${o.name}</div><div class="sub">${o.pct}% split</div></div>
            <div class=${"value " + (o.active && o.amt > 0 ? "green" : "")}>${o.active ? money(o.amt) : "—"}</div>
          </div>`)}
        ${tax > 0 && html`<div class="card-pad"><div class="tax-box" style=${{ marginTop: 0 }}>
          <div class="tax-lbl">💰 Tax Reserve (${settings.taxRate}%)</div>
          <div class="tax-amt">${money(tax)}</div>
        </div></div>`}
      </div>`;
    })}
  </div></div>`;
}
</script>
<script>
'use strict';

/* ────────────────────────────────────────────────────────────────────────────
   SETTINGS (continued)
   ──────────────────────────────────────────────────────────────────────────── */
// ── ServiceAreasEditor ──────────────────────────────────────────────────────
// Reusable list editor for the cities a business operates in. Used in:
//   • Onboarding (step asking "What areas do you service?")
//   • Settings → Service Areas
//
// Each entry uses CityAutocomplete so adding "Plantation" still pulls
// county-mates (Sunrise, Hollywood, etc.) without forcing the user to
// type each one. Cities are stored as a flat string array.
function ServiceAreasEditor({ value, onChange, jobs, autoFocus, compact }) {
  const areas = Array.isArray(value) ? value : [];
  const [draft, setDraft] = useState("");

  const add = (city) => {
    const c = String(city || "").trim();
    if (!c) return;
    // Case-insensitive dedupe — "Brooklyn" and "brooklyn" shouldn't both exist
    if (areas.some(a => a.toLowerCase() === c.toLowerCase())) {
      window.toast && window.toast(c + " is already in your service areas", "info");
      setDraft("");
      return;
    }
    onChange([...areas, c]);
    setDraft("");
  };
  const remove = (i) => {
    onChange(areas.filter((_, idx) => idx !== i));
  };

  return html`<div>
    ${areas.length > 0 && html`<div style=${{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
      ${areas.map((city, i) => html`<div key=${city + ":" + i}
        style=${{
          display: "inline-flex", alignItems: "center", gap: 6,
          background: "var(--brand-dim)", color: "var(--brand)",
          border: "1px solid var(--brand)", borderRadius: 8,
          padding: "5px 4px 5px 10px", fontSize: 12, fontWeight: 700,
        }}>
        <span>${city}</span>
        <button type="button" onClick=${() => remove(i)} aria-label=${"Remove " + city}
          style=${{
            background: "none", border: "none", color: "var(--brand)",
            cursor: "pointer", padding: "0 6px", fontSize: 16, lineHeight: 1,
            opacity: .7,
          }}>×</button>
      </div>`)}
    </div>`}
    <div style=${{ display: "flex", gap: 8, alignItems: "stretch" }}>
      <div style=${{ flex: 1, minWidth: 0 }}>
        <${CityAutocomplete}
          value=${draft}
          onChange=${(v) => setDraft(v)}
          jobs=${jobs}
          serviceAreas=${areas}
          placeholder=${areas.length === 0 ? "First city you serve…" : "Add another city…"}
        />
      </div>
      <button type="button" class="btn primary press-scale"
        onClick=${() => add(draft)}
        disabled=${!draft.trim()}
        style=${{ flexShrink: 0, padding: compact ? "10px 14px" : "12px 18px", fontSize: 13 }}>
        Add
      </button>
    </div>
    ${areas.length === 0 && html`<div style=${{ fontSize: 11, color: "var(--t3)", marginTop: 6, lineHeight: 1.5 }}>
      Add the cities you operate in. We'll auto-suggest neighbors (e.g. add "Plantation" → "Davie", "Sunrise", and other Broward cities show up automatically).
    </div>`}
  </div>`;
}

function Settings({ settings, setSettings, jobs, profile, onOpenPlans, onSignOut, onUpgrade }) {
  const bt = getBizType(settings.bizTypeId);
  const [showBizTypePicker, setShowBizTypePicker] = useState(false);
  const upd = (k, v) => setSettings(p => ({ ...p, [k]: v }));
  const exps = Array.isArray(settings.expenses) ? settings.expenses : [];
  const updExp = (id, patch) => setSettings(p => ({ ...p, expenses: (Array.isArray(p.expenses)?p.expenses:[]).map(e => e.id === id ? { ...e, ...patch } : e) }));
  const addExp = () => setSettings(p => ({ ...p, expenses: [...(Array.isArray(p.expenses)?p.expenses:[]), { id: uid(), name: "New Expense", amount: 0, active: true }] }));
  const delExp = id => setSettings(p => ({ ...p, expenses: (Array.isArray(p.expenses)?p.expenses:[]).filter(e => e.id !== id) }));

  const onLogoUpload = (e) => {
    if (!hasFeature(profile, "customBranding")) {
      showUpgradePrompt("customBranding", onUpgrade);
      return;
    }
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    // Validate format up front — image/* covers all supported types
    if (!file.type || !file.type.startsWith("image/")) {
      window.toast && window.toast("Please choose a PNG, JPG, or WEBP image", "warn");
      e.target.value = ""; return;
    }
    if (file.size > 500 * 1024) {
      window.toast && window.toast("Logo too large (" + Math.round(file.size/1024) + "KB). Max is 500KB.", "warn");
      e.target.value = ""; return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result || "");
      // Write to BOTH field names so any reader (Header, PDF, review modal,
      // settings preview) finds the logo regardless of which field name
      // it checks.
      const next = { ...settings, businessLogo: dataUrl, brandLogo: dataUrl };
      setSettings(next);
      applyBranding(next);
      window.toast && window.toast("Logo uploaded", "success");
    };
    reader.onerror = () => {
      window.toast && window.toast("Could not read that file. Try a different image.", "warn");
    };
    reader.readAsDataURL(file);
    // Reset the input so the user can re-upload the same file if they
    // remove and re-add it (otherwise onChange won't fire).
    e.target.value = "";
  };

  const onColorChange = (color) => {
    if (!hasFeature(profile, "customBranding")) {

      const profit = jobGrossProfit(j, settings);

        Number(j.revenue||0).toFixed(2), Number(j.tireCost||0).toFixed(2), Number(j.miscCost||0).toFixed(2),
        Number(j.miles||0).toFixed(1), profit.toFixed(2), j.payment, j.customerName || "", j.customerPhone || "",
        (j.note || "").replace(/,/g, " ")].map(v => '"' + v + '"').join(",");

    const csv = [headers.join(",")].concat(rows).join("\n");
