/* ────────────────────────────────────────────────────────────────────────────
   BRANDED INVOICE PDF — uses user's logo + color
   ──────────────────────────────────────────────────────────────────────────── */
function generateBrandedInvoicePDF(job, settings) {
  const jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!jsPDF) { window.toast && window.toast("PDF library not loaded", "error"); return null; }
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const W = 210, M = 18;
  const bizName = (settings.businessName || "Mobile Service OS").trim();
  const bizColor = settings.brandColor || "#4f8ef7";
  const logo = settings.businessLogo || settings.brandLogo;
  // Hex → [r,g,b] for jsPDF
  const hex = (h) => {
    const m = /^#?([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})$/i.exec(h || "#4f8ef7");
    return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [79,142,247];
  };
  const BRAND   = hex(bizColor);
  const NAVY    = [12, 16, 28];
  const OFFW    = [240, 240, 222];
  const NEAR    = [20, 20, 20];
  const GRAY    = [110, 110, 125];
  const LGRAY   = [215, 215, 222];
  const WHITE   = [255, 255, 255];

  // Header bar
  doc.setFillColor(...NAVY);  doc.rect(0, 0, W, 44, "F");
  doc.setFillColor(...BRAND); doc.rect(0, 44, W, 3, "F");

  // Logo or initial — detect format from data URL prefix so we don't pass a
  // PNG-typed JPEG to jsPDF (which silently produces garbage).
  let logoOk = false;
  if (logo) {
    try {
      // dataURL format: "data:image/<format>;base64,...."
      const m = /^data:image\/([a-z]+);base64,/i.exec(logo);
      const fmt = m ? m[1].toUpperCase() : null;
      // jsPDF supports PNG, JPEG, JPG, WEBP (since 2.x), GIF
      const SUPPORTED = ["PNG", "JPEG", "JPG", "WEBP", "GIF"];
      if (fmt && SUPPORTED.includes(fmt)) {
        doc.addImage(logo, fmt === "JPG" ? "JPEG" : fmt, M, 8, 24, 24);
        logoOk = true;
      }
    } catch (e) {
      console.warn("PDF logo render failed; falling back to initial:", e && e.message);
      logoOk = false;
    }
  }
  if (!logoOk) {
    doc.setFillColor(...BRAND);
    doc.roundedRect(M, 8, 24, 24, 4, 4, "F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(20);
    doc.setTextColor(...WHITE);
    doc.text((bizName.charAt(0) || "M").toUpperCase(), M + 12, 24, { align: "center" });
  }

  // Business name
  doc.setFont("helvetica","bold");
  doc.setFontSize(19);
  doc.setTextColor(...WHITE);
  doc.text(bizName, M + 30, 20);

  // Invoice label
  doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(...BRAND);
  doc.text("INVOICE", W - M, 20, { align: "right" });
  const invNum = "INV-" + (job.date || "").replace(/-/g,"") + "-" + (job.id || "").slice(-4).toUpperCase();
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(175, 200, 225);
  doc.text("#" + invNum, W - M, 28, { align: "right" });

  let y = 54;

  // Bill To
  doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(...BRAND);
  doc.text("BILL TO", M, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.setTextColor(...NEAR);
  doc.text(job.customerName || "Customer", M, y + 8);
  if (job.customerPhone) {
    doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...GRAY);
    doc.text(String(job.customerPhone), M, y + 16);
  }

  // Detail box
  const dbX = 126, dbW = 66;
  const details = [
    ["Date",     job.date || "—"],
    ["Location", job.area || "—"],
    ["Payment",  job.payment || "—"],
    ["Status",   job.status === "Pending" ? "PENDING" : "PAID"],
  ];
  const dbH = details.length * 7.4 + 5;
  doc.setFillColor(...OFFW); doc.roundedRect(dbX, y - 5, dbW, dbH, 3, 3, "F");
  let dy = y + 1;
  details.forEach(([lbl, val]) => {
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(...GRAY);
    doc.text(lbl, dbX + 5, dy);
    doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
    let color = NAVY;
    if (lbl === "Status") color = val === "PAID" ? [0, 110, 55] : [190, 30, 30];
    doc.setTextColor(...color);
    doc.text(String(val), dbX + dbW - 4, dy, { align: "right" });
    dy += 7.4;
  });
  y = Math.max(y + 30, y - 5 + dbH + 4);

  doc.setDrawColor(...LGRAY); doc.setLineWidth(0.25); doc.line(M, y, W - M, y); y += 8;

  // Service row header
  doc.setFillColor(...NAVY); doc.roundedRect(M, y - 4, W - M * 2, 11, 2, 2, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(...WHITE);
  doc.text("SERVICE DESCRIPTION", M + 4, y + 3);
  doc.text("QTY", 150, y + 3, { align: "center" });
  doc.text("AMOUNT", W - M - 2, y + 3, { align: "right" });
  y += 15;

  const svcLabel = (job.service || "Service") + " (Mobile Service)";
  const metas = [
    job.area     ? "Location: " + job.area : null,
    job.tireSize ? "Size: " + job.tireSize : null,
    "Quantity: " + String(Number(job.qty || 1))
  ].filter(Boolean);
  const rowH = 14 + metas.length * 6;
  doc.setFillColor(...OFFW); doc.rect(M, y - 4, W - M * 2, rowH, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...NEAR);
  doc.text(svcLabel, M + 4, y + 3);
  let my = y + 9;
  metas.forEach(line => {
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...GRAY);
    doc.text(line, M + 6, my); my += 6;
  });
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...NAVY);
  doc.text(String(Number(job.qty || 1)), 150, y + 3, { align: "center" });
  doc.text(money(Number(job.revenue || 0)), W - M - 2, y + 3, { align: "right" });
  y += rowH + 4;

  // Total
  doc.setDrawColor(...LGRAY); doc.setLineWidth(0.25); doc.line(M, y, W - M, y); y += 6;
  const tx = W - M - 76, tw = 76;
  doc.setFillColor(...NAVY); doc.roundedRect(tx, y - 3, tw, 22, 3, 3, "F");
  doc.setFillColor(...BRAND); doc.roundedRect(tx, y - 3, 4, 22, 2, 2, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(175, 200, 225);
  doc.text("TOTAL DUE", tx + 10, y + 5);
  doc.setFontSize(17); doc.setTextColor(...WHITE);
  doc.text(money(Number(job.revenue || 0)), W - M - 4, y + 12, { align: "right" });
  y += 28;

  // Footer
  const fy = 269;
  doc.setFillColor(...NAVY);  doc.rect(0, fy, W, 28, "F");
  doc.setFillColor(...BRAND); doc.rect(0, fy, W, 2, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setTextColor(...WHITE);
  doc.text("Thank you for choosing " + bizName, W / 2, fy + 12, { align: "center" });
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(175, 200, 225);
  doc.text("Mobile service. Done right.", W / 2, fy + 20, { align: "center" });

  const fname = (job.customerName || "Job").replace(/\s+/g, "-");
  doc.save("Invoice-" + (job.date || "").replace(/-/g, "") + "-" + fname + ".pdf");
  return doc;
}

/* ════════════════════════════════════════════════════════════════════════════
   TRIAL BANNER — gold strip at top of in-app view when user is trialing.

   Shows days remaining; turns urgent red in last 2 days. Hidden when paid.
   Tap → opens plans modal. Designed to feel like a polite reminder, not
   alarmist — a single thin strip with a clear CTA.
   ════════════════════════════════════════════════════════════════════════════ */
function TrialBanner({ profile, onUpgrade }) {
  if (!profile || profile.subscriptionStatus !== "trialing") return null;
  if (!profile.trialEndsAt) return null;
  const msLeft = profile.trialEndsAt - Date.now();
  if (msLeft <= 0) return null; // SubscriptionRequired handles expiry; don't double-display
  const daysLeft = Math.ceil(msLeft / (24 * 60 * 60 * 1000));
  const urgent = daysLeft <= 2;
  const bg     = urgent ? "linear-gradient(90deg,rgba(239,68,68,.18) 0%,rgba(239,68,68,.06) 100%)" : "linear-gradient(90deg,var(--gold-dim) 0%,rgba(212,175,106,.04) 100%)";
  const color  = urgent ? "var(--red)" : "var(--gold)";
  const border = urgent ? "rgba(239,68,68,.25)" : "rgba(212,175,106,.25)";
  return html`<button onClick=${onUpgrade} style=${{
    width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
    background:bg, border:"none", borderBottom:"1px solid "+border,
    padding:"9px 16px", fontSize:11, fontWeight:700, color:color,
    letterSpacing:".06em", cursor:"pointer", textTransform:"uppercase",
    fontFamily:'"Geist","IBM Plex Sans",system-ui,sans-serif',
    transition:"background .15s",
  }}>
    <span style=${{fontSize:13}}>${urgent ? "⏱" : "✦"}</span>
    <span>${daysLeft} ${daysLeft === 1 ? "day" : "days"} left in Pro trial</span>
    <span style=${{opacity:.6, fontWeight:500}}>·</span>
    <span style=${{opacity:.85}}>Tap to subscribe →</span>
  </button>`;
}


/* ════════════════════════════════════════════════════════════════════════════
   APP SHELL — auth gate, onboarding gate, subscription gate, tenant Firestore
   ════════════════════════════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [profileReady, setProfileReady] = useState(false);
  const [syncStatus, setSyncStatus] = useState("local");

  // Initial state hydration is tenant-aware: only load cached data for the
  // last-known UID. If nobody has been signed in, or we can't determine the
  // last UID, start empty. Auth listener will populate after sign-in.
  const _initialUid = lastUid();
  const [jobs, setJobs] = useState(() => {
    if (!_initialUid) return [];
    const r = loadTenant(KEYS.jobs, _initialUid, []);
    return Array.isArray(r) ? r : [];
  });
  const [settings, setSettings] = useState(() => {
    if (!_initialUid) return null;
    const raw = loadTenant(KEYS.settings, _initialUid, null);
    return raw && raw.bizTypeId ? raw : null;
  });
  const [inventory, setInventory] = useState(() => {
    if (!_initialUid) return [];
    const r = loadTenant(KEYS.inventory, _initialUid, []);
    return Array.isArray(r) ? r : [];
  });
  const [expenses, setExpenses] = useState(() => {
    if (!_initialUid) return [];
    const r = loadTenant(KEYS.expenses, _initialUid, []);
    return Array.isArray(r) ? r : [];
  });
  const [tab, setTab] = useState("dashboard");
  const [saving, setSaving] = useState(false);
  const [prefill, setPrefill] = useState(null);
  const [editJob, setEditJob] = useState(null);
  const [showPlans, setShowPlans] = useState(false);

  // Apply branding when settings change
  useEffect(() => { if (settings) applyBranding(settings); }, [settings]);

  // ── Auth listener ──────────────────────────────────────────────────────
  // SECURITY-CRITICAL: we must wipe local tenant data when the active user
  // changes. Without this, User B signs in on a device previously used by
  // User A and sees A's cached jobs/inventory/expenses/customer records.
  // The Firestore listener will repopulate B's data within seconds, but
  // there's a window where A's data is visible to B — unacceptable.
  //
  // Defense in depth: in addition to wiping on auth-change, all localStorage
  // keys are tenant-scoped (mso-jobs-v1::UID rather than mso-jobs-v1).
  // Even if a wipe somehow misses, User B's state hydrates from B's
  // namespace, never from A's.
  const wipeTenantLocalState = useCallback((uidToWipe) => {
    // Clear current React state
    setJobs([]); setInventory([]); setExpenses([]); setSettings(null);
    // Clear A's tenant cache from localStorage
    if (uidToWipe) clearTenantData(uidToWipe);
    // Also clear any legacy unscoped keys (pre-tenant-scope migration)
    [KEYS.jobs, KEYS.inventory, KEYS.expenses, KEYS.settings].forEach(k => {
      try { localStorage.removeItem(k); } catch {}
    });
  }, []);

  // Track the previous UID so we can detect actual user changes (not just
  // the same user's token refreshing).
  const prevUidRef = useRef(null);

  // Track origin of the last settings update — "local" (user typed in UI)
  // vs "server" (Firestore snapshot). Used by the persist effect to avoid
  // the write loop where every server snapshot triggers a re-write.
  const settingsOriginRef = useRef("local");

  useEffect(() => {
    if (!_auth) {
      // Local-only fallback so dev still works without Firebase
      setUser(null); setAuthReady(true); setSyncStatus("local"); return;
    }
    const unsub = _auth.onAuthStateChanged(u => {
      const prevUid = prevUidRef.current;
      const newUid  = u ? u.uid : null;

      // User CHANGED (A → B) or signed out (A → null). Wipe A's cache.
      if (prevUid && prevUid !== newUid) {
        wipeTenantLocalState(prevUid);
      }
      prevUidRef.current = newUid;

      // Persist last-known UID so the NEXT app boot knows whose tenant cache
      // to hydrate from. Without this, a fresh boot loads from "anon" key
      // (empty) until Firestore syncs — a brief blank-screen flicker, which
      // is what we want from a privacy standpoint anyway.
      if (newUid) setLastUid(newUid);
      else        try { localStorage.removeItem(KEYS.lastUid); } catch {}

      setUser(u || null);
      setAuthReady(true);
      if (!u) {
        setProfile(null);
        setProfileReady(true);
      }
    });
    return () => unsub();
  }, [wipeTenantLocalState]);

  // ── Migrate legacy + load profile on first login ───────────────────────
  useEffect(() => {
    if (!user || isLocalUser(user) || !_db) {
      if (user && isLocalUser(user)) {
        // Local mode — no real profile, just allow access
        setProfile({ plan: "starter", subscriptionStatus: "trialing", trialEndsAt: Date.now() + 7*86400000, onboarded: !!settings });
        setProfileReady(true);
      }
      return;
    }
    (async () => {
      setProfileReady(false);
      // Run legacy migration once per user (no-op on subsequent logins)
      const mig = await migrateLegacyDataIfNeeded(user.uid);
      if (mig.migrated) window.toast && window.toast("Welcome — your existing data was imported", "success");
      // Listen to user profile doc for plan/subscription updates
      const unsubProfile = userDoc(user.uid).onSnapshot(snap => {
        if (snap && snap.exists) {
          setProfile(snap.data());
          setProfileReady(true);
        } else {
          // Doc doesn't exist — the onUserCreate Cloud Function should have
          // created it on signup, but it hasn't run yet (or failed). We do
          // NOT write billing fields from the client (rules block it, and
          // we want to keep billing server-authoritative). Instead we wait
          // briefly and retry the read; the trigger usually completes in
          // <2 seconds.
          //
          // If after several seconds we still don't see a doc, we surface
          // an error rather than silently spinning forever.
          let retries = 0;
          const retry = () => {
            retries++;
            if (retries > 10) {
              console.error("Profile doc still missing after retries — onUserCreate trigger may have failed");
              window.toast && window.toast("Account setup incomplete. Refresh to retry.", "error", 6000);
              setProfileReady(true);
              return;
            }
            // The onSnapshot will fire again automatically when the doc is
            // created — this retry is just a safety net to surface errors.
            setTimeout(() => {
              userDoc(user.uid).get().then(s => {
                if (!s.exists) retry();
              }).catch(retry);
            }, 1500);
          };
          retry();
        }
      }, e => {
        console.warn(e);
        setProfileReady(true);
      });
      return () => unsubProfile();
    })();
  }, [user]);

  // ── Tenant-scoped Firestore listeners ──────────────────────────────────
  useEffect(() => {
    if (!user || isLocalUser(user) || !_db || !profile || !profile.onboarded) return;
    const uid = user.uid;
    setSyncStatus("syncing");
    const u1 = fbListen(tJobsCol(uid), docs => {
      const arr = Array.isArray(docs) ? docs : [];
      setJobs(arr); persistTenant(KEYS.jobs, uid, arr); setSyncStatus("connected");
    });
    const u2 = fbListen(tInvCol(uid), docs => {
      const arr = Array.isArray(docs) ? docs.map(sanitizeInvItem) : [];
      setInventory(arr); persistTenant(KEYS.inventory, uid, arr);
    });
    const u3 = fbListen(tExpCol(uid), docs => {
      const arr = Array.isArray(docs) ? docs : [];
      setExpenses(arr); persistTenant(KEYS.expenses, uid, arr);
    });
    let u4 = () => {};
    if (tSettingDoc(user.uid)) {
      u4 = tSettingDoc(user.uid).onSnapshot(snap => {
        if (snap && snap.exists) {
          const d = snap.data();
          // Re-hydrate stringified fields
          Object.keys(d).forEach(k => {
            if (typeof d[k] === "string" && (d[k].startsWith("{") || d[k].startsWith("["))) {
              try { const p = JSON.parse(d[k]); if (p && typeof p === "object") d[k] = p; } catch {}
            }
          });
          // Mark this update as server-origin so the persist effect skips it.
          // Without this flag, the server snapshot causes a setSettings, which
          // triggers the persist effect, which writes back to the server, which
          // fires another snapshot — write loop at ~1 write/sec until something
          // breaks.
          settingsOriginRef.current = "server";
          setSettings(prev => {
            // Merge strategy:
            // - First load (prev is null): use server data as-is.
            // - Subsequent loads: only let prev override server values for
            //   fields where prev has a NON-EMPTY value (in-flight edits the
            //   user is actively typing). For empty/missing fields in prev,
            //   server data wins — this is what makes brandLogo and other
            //   one-time-set fields actually show up after sign-in.
            let merged;
            if (!prev) {
              merged = { ...defaultSettings(d.bizTypeId || "tire"), ...d };
            } else {
              // Filter prev to only fields that have meaningful values
              const prevWithValues = {};
              Object.keys(prev).forEach(k => {
                const v = prev[k];
                if (v == null) return;          // null / undefined: skip
                if (v === "") return;            // empty string: skip
                if (Array.isArray(v) && v.length === 0) return; // empty array: skip
                prevWithValues[k] = v;
              });
              merged = { ...defaultSettings(d.bizTypeId || "tire"), ...d, ...prevWithValues };
            }
            persistTenant(KEYS.settings, uid, merged);
            // Branding may have changed — re-apply CSS variables so the
            // logo + color show up immediately on the dashboard without a
            // page reload.
            try { applyBranding(merged); } catch {}
            return merged;
          });
        }
      }, () => {});
    }
    return () => { u1(); u2(); u3(); u4(); };
  }, [user, profile && profile.onboarded]);

  // ── Persist settings (debounced) ──────────────────────────────────────
  // Only writes back to Firestore when settings changed due to a LOCAL
  // user action (UI typing, etc.). Server-origin updates flip the ref to
  // "server", and we skip the write to break the loop.
  useEffect(() => {
    if (!settings) return;
    const uid = (user && user.uid) || null;
    if (uid) persistTenant(KEYS.settings, uid, settings);
    // Server-origin update — already in cloud, don't write back.
    if (settingsOriginRef.current === "server") {
      settingsOriginRef.current = "local"; // reset for next change
      return;
    }

    if (user && !isLocalUser(user) && tSettingDoc(user.uid)) {
      const t = setTimeout(() => {
        const flat = {};
        Object.keys(settings).forEach(k => {
          const v = settings[k];
          if (v == null) return;
          flat[k] = typeof v === "object" ? JSON.stringify(v) : v;
        });
        tSettingDoc(user.uid).set(flat).catch(() => {});
      }, 1000);
      return () => clearTimeout(t);
    }
  }, [settings, user]);

  // ── Handlers ──────────────────────────────────────────────────────────
  const saveJob = useCallback(async (job, andAdd) => {
    setSaving(true);
    try {
      const id = job.id || uid();
      const safeJobs = Array.isArray(jobs) ? jobs : [];
      const isNew = !safeJobs.some(j => j.id === id);
      const full = { ...job, id };

      // ── Plan limit enforcement ────────────────────────────────────
      // CLIENT CHECK is a UX hint — opens upgrade modal early so the user
      // doesn't fill out a whole form before being told no. This is NOT the
      // security boundary. The server (createJob endpoint) is the actual
      // enforcement; it uses a Firestore transaction that can't be raced
      // across devices.
      if (isNew) {
        const monthKey = getMonthKey(full.date || TODAY());
        const monthCount = safeJobs.filter(j => getMonthKey(j.date) === monthKey).length;
        const limit = planLimit(profile, "jobsPerMonth");
        if (Number.isFinite(limit) && monthCount >= limit) {
          showUpgradePrompt("jobsPerMonth", () => setShowPlans(true));
          setSaving(false);
          return;
        }
      }

      // Inventory deduction
      const bt = getBizType(settings.bizTypeId);
      const isMaterial = isMaterialService(full.service, bt.id);

      // BUG FIX: when EDITING an existing job, restore its prior inventory
      // deductions before applying the new ones. Without this restoration,
      // editing a job (e.g., changing qty from 4 to 2) deducts inventory
      // again on top of the original 4-unit deduction, drifting stock down
      // by 6 instead of leaving it at -2 from baseline. Over enough edits,
      // inventory goes negative or wildly wrong.
      //
      // Tricky bit: we need planInventoryDeduction to see post-restoration
      // counts, but React state updates are async. We compute the post-
      // restoration inventory locally and use that for planning, then issue
      // both restore and apply mutations.
      let workingInventory = Array.isArray(inventory) ? inventory : [];

      if (!isNew) {
        const existing = safeJobs.find(j => j.id === id);
        if (existing && existing.inventoryDeducted) {
          let priorDeds = existing.inventoryDeductions;
          if (typeof priorDeds === "string") {
            try { priorDeds = JSON.parse(priorDeds); } catch { priorDeds = null; }
          }
          if (Array.isArray(priorDeds) && priorDeds.length) {
            // Apply restoration to our local working copy
            const addMap = {};
            priorDeds.forEach(d => { addMap[d.id] = (addMap[d.id] || 0) + (Number(d.deducted) || 0); });
            workingInventory = workingInventory.map(i =>
              addMap[i.id] ? { ...i, qty: (Number(i.qty) || 0) + addMap[i.id] } : i
            );
            // And queue the restoration in React state too
            restoreInventoryDeduction(priorDeds, setInventory, user);
          }
        }
        // Clear stale deduction metadata. If the new version no longer needs
        // inventory (e.g., user changed tireSource from Inventory to Bought),
        // we don't want stale flags lingering.
        full.inventoryDeducted = false;
        full.inventoryDeductions = [];
        full.inventoryShortfall = 0;
      }

      if (isMaterial && full.tireSize && Number(full.qty || 0) > 0 && full.tireSource === "Inventory") {
        const plan = planInventoryDeduction(workingInventory, full.tireSize, Number(full.qty || 0), full.inventoryItemId);
        if (plan && plan.plan.length) {
          applyInventoryDeduction(plan, setInventory, user);
          full.inventoryDeducted = true;
          full.inventoryDeductions = plan.plan;
          full.inventoryShortfall = plan.shortfall;
        }
      }

      setJobs(prev => {
        const arr = Array.isArray(prev) ? prev : [];
        const next = arr.find(j => j.id === id) ? arr.map(j => j.id === id ? full : j) : [full, ...arr];
        const _uid = user && user.uid;
        if (_uid) persistTenant(KEYS.jobs, _uid, next);
        else      persist(KEYS.jobs, next);
        return next;
      });

      // ── Persist to Firestore ────────────────────────────────────────
      // Strategy:
      //   • NEW jobs go through the createJob Cloud Function. The function
      //     uses a Firestore transaction to atomically check the plan cap
      //     and increment the per-month counter. This is the SECURITY
      //     BOUNDARY for plan enforcement — clients can't bypass via
      //     direct Firestore writes because the rules require the counter
      //     update which clients can't perform.
      //   • EDITS go directly to Firestore. They don't increment the
      //     counter, and we don't want to fail an edit if the function
      //     is briefly unavailable.
      //   • If the server endpoint isn't reachable (offline, function down),
      //     we fall back to a direct write. The cap won't be enforced for
      //     that one create, but the cap-bypass-via-multi-device window is
      //     small in practice (single-user offline usage).
      if (user && !isLocalUser(user) && tJobsCol(user.uid)) {
        const jobPayload = {
          ...full,
          inventoryDeductions: Array.isArray(full.inventoryDeductions) ? JSON.stringify(full.inventoryDeductions) : "",
        };

        if (isNew && _auth && _auth.currentUser && CFG.stripe.createJobEndpoint) {
          try {
            const token = await _auth.currentUser.getIdToken();
            const res = await fetch(CFG.stripe.createJobEndpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({ job: jobPayload }),
            });
            if (res.status === 403) {
              const err = await res.json().catch(() => ({}));
              if (err.code === "plan_limit_reached") {
                // Server says cap hit. Roll back local state, show paywall.
                setJobs(prev => (Array.isArray(prev) ? prev : []).filter(j => j.id !== id));
                window.toast && window.toast(
                  "Monthly limit reached (" + (err.limit || 50) + " jobs on Starter). Upgrade for unlimited.",
                  "warn", 6000
                );
                setShowPlans(true);
                setSaving(false);
                return;
              }
            }
            if (res.status === 402) {
              const err = await res.json().catch(() => ({}));
              setJobs(prev => (Array.isArray(prev) ? prev : []).filter(j => j.id !== id));
              window.toast && window.toast(
                err.code === "trial_expired" ? "Trial expired. Pick a plan to continue." : "Subscription required.",
                "warn", 6000
              );
              setShowPlans(true);
              setSaving(false);
              return;
            }
            if (!res.ok) throw new Error("createJob: " + res.status);
            // Success — server wrote the job and incremented the counter.
            // Our optimistic local state is already correct.
          } catch (e) {
            // Network/server error — fall back to direct write so the user's
            // job isn't lost. Cap won't be checked for this one, but losing
            // a saved job is worse UX than a one-job overshoot.
            console.warn("createJob endpoint failed, falling back to direct write:", e);
            await fbSet(tJobsCol(user.uid), id, jobPayload);
          }
        } else {
          // Edit, or no endpoint configured — direct write
          await fbSet(tJobsCol(user.uid), id, jobPayload);
        }
      }

      haptic(15);
      window.toast && window.toast(isNew ? "Job saved" : "Job updated", "success");
      if (!andAdd) { setTab("dashboard"); setEditJob(null); }
    } catch (e) {
      console.warn("saveJob:", e);
      window.toast && window.toast("Save failed", "error");
    } finally { setSaving(false); }
  }, [jobs, inventory, user, profile, settings]);

  const deleteJob = useCallback(async id => {
    const target = (Array.isArray(jobs) ? jobs : []).find(j => j.id === id);
    // Restore inventory if needed
    if (target && target.inventoryDeducted) {
      let deds = target.inventoryDeductions;
      if (typeof deds === "string") { try { deds = JSON.parse(deds); } catch { deds = null; } }
      if (Array.isArray(deds) && deds.length) restoreInventoryDeduction(deds, setInventory, user);
    }
    setJobs(prev => {
      const next = (Array.isArray(prev) ? prev : []).filter(j => j.id !== id);
      const _uid = user && user.uid;
      if (_uid) persistTenant(KEYS.jobs, _uid, next);
      else      persist(KEYS.jobs, next);
      return next;
    });
    if (user && !isLocalUser(user) && tJobsCol(user.uid)) await fbDel(tJobsCol(user.uid), id);
    window.toast && window.toast("Job deleted", "info");
  }, [jobs, user]);

  const setInventoryAction = useCallback(updater => {
    setInventory(prev => {
      const prevArr = Array.isArray(prev) ? prev : [];
      const next = typeof updater === "function" ? updater(prevArr) : updater;
      const _uid = user && user.uid;
      if (_uid) persistTenant(KEYS.inventory, _uid, next);
      else      persist(KEYS.inventory, next);
      if (user && !isLocalUser(user) && tInvCol(user.uid)) {
        next.filter(x => (x.size || "").trim()).forEach(x => fbSet(tInvCol(user.uid), x.id, sanitizeInvItem(x)));
        const nextIds = new Set(next.map(x => String(x.id)));
        prevArr.forEach(x => { if (!nextIds.has(String(x.id))) fbDel(tInvCol(user.uid), x.id); });
      }
      return next;
    });
  }, [user]);

  const setExpensesAction = useCallback(updater => {
    setExpenses(prev => {
      const prevArr = Array.isArray(prev) ? prev : [];
      const next = typeof updater === "function" ? updater(prevArr) : updater;
      const _uid = user && user.uid;
      if (_uid) persistTenant(KEYS.expenses, _uid, next);
      else      persist(KEYS.expenses, next);
      if (user && !isLocalUser(user) && tExpCol(user.uid)) {
        const nextIds = new Set(next.map(x => x.id));
        prevArr.forEach(x => { if (!nextIds.has(x.id)) fbDel(tExpCol(user.uid), x.id); });
        next.forEach(x => fbSet(tExpCol(user.uid), x.id, x));
      }
      return next;
    });
  }, [user]);

  const handleRepeat   = useCallback(job => { setPrefill(job); setTab("add"); }, []);
  const handleEdit     = useCallback(job => { setEditJob(job); setTab("add"); }, []);
  const handleStartJob = useCallback(qq => { setPrefill({ ...EMPTY_JOB((settings||{}).bizTypeId), ...qq }); setTab("add"); }, [settings]);
  const signOut = useCallback(() => { if (_auth) _auth.signOut().catch(() => {}); }, []);

  // ── Loading ──────────────────────────────────────────────────────────
  if (!authReady) {
    return html`<div style=${{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#050505" }}>
      <div class="logo-pulse"><${BrandMark} size=${100} glow=${true}/></div>
    </div>`;
  }

  // ── Not signed in ────────────────────────────────────────────────────
  if (!user) return html`<${AuthScreen} onAuth=${u => setUser(u)}/>`;

  // ── Wait for profile ─────────────────────────────────────────────────
  if (!profileReady) {
    return html`<div style=${{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#050505" }}>
      <div class="logo-pulse"><${BrandMark} size=${100} glow=${true}/></div>
    </div>`;
  }

  // ── Not onboarded ─────────────────────────────────────────────────────
  if (!profile || !profile.onboarded) {
    return html`<${OnboardingFlow} user=${user} onComplete=${(s) => { setSettings(s); setProfile(p => ({ ...(p||{}), onboarded: true })); }}/>`;
  }

  // ── Settings still loading from cloud ────────────────────────────────
  if (!settings) {
    return html`<div style=${{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#050505" }}>
      <div class="logo-pulse"><${BrandMark} size=${100} glow=${true}/></div>
    </div>`;
  }

  // ── Subscription check ────────────────────────────────────────────────
  const status = profile.subscriptionStatus || "trialing";
  const isActive = status === "active" || (status === "trialing" && (!profile.trialEndsAt || Date.now() < profile.trialEndsAt));
  if (!isActive) {
    return html`<${SubscriptionRequired} profile=${profile}
      onChoosePlan=${() => setShowPlans(true)}
      onSignOut=${signOut}/>${showPlans && html`<div style=${{position:"fixed",inset:0,zIndex:1000,background:"var(--bg)",overflow:"auto"}}>
        <${PlansScreen} user=${user} profile=${profile} onClose=${() => setShowPlans(false)}/>
      </div>`}`;
  }

  // ── Plans modal ───────────────────────────────────────────────────────
  if (showPlans) {
    return html`<div style=${{position:"fixed",inset:0,zIndex:1000,background:"var(--bg)",overflow:"auto",height:"100vh"}}>
      <${PlansScreen} user=${user} profile=${profile} onClose=${() => setShowPlans(false)}/>
      <${ToastHost}/>
    </div>`;
  }

  // ── Main app ──────────────────────────────────────────────────────────
  const bt = getBizType(settings.bizTypeId);
  const TABS = [
    { id: "dashboard", icon: "⚡", label: "Home" },
    { id: "add",       icon: "＋", label: "Add" },
    { id: "history",   icon: "📋", label: "Jobs" },
    { id: "payouts",   icon: "💰", label: "Pay" },
    { id: "expenses",  icon: "📊", label: "Costs" },
    ...(bt.showInventory ? [{ id: "inventory", icon: bt.icon, label: bt.inventoryLabel || "Stock" }] : []),
    { id: "settings",  icon: "⚙️", label: "Setup" },
  ];

  const onUpgrade = () => setShowPlans(true);
  const onOpenPlans = () => setShowPlans(true);

  let content = null;
  switch (tab) {
    case "dashboard":
      content = html`<${Dashboard} jobs=${jobs} settings=${settings} profile=${profile} setTab=${setTab} onRepeat=${handleRepeat} onStartJob=${handleStartJob} onUpgrade=${onUpgrade}/>`;
      break;
    case "add":
      content = html`<${AddJob} onSave=${saveJob} settings=${settings} jobs=${jobs} inventory=${inventory}
        prefill=${prefill} onClearPrefill=${() => setPrefill(null)}
        editJob=${editJob} onClearEdit=${() => setEditJob(null)} saving=${saving}/>`;
      break;
    case "history":
      content = html`<${History} jobs=${jobs} settings=${settings} profile=${profile} onEdit=${handleEdit} onDelete=${deleteJob} onRepeat=${handleRepeat} onUpgrade=${onUpgrade}/>`;
      break;
    case "payouts":
      content = html`<${Payouts} jobs=${jobs} settings=${settings}/>`;
      break;
    case "expenses":
      content = html`<${Expenses} expenses=${expenses} setExpenses=${setExpensesAction} jobs=${jobs} settings=${settings} profile=${profile} onUpgrade=${onUpgrade}/>`;
      break;
    case "inventory":
      content = html`<${Inventory} inventory=${inventory} setInventory=${setInventoryAction} settings=${settings}/>`;
      break;
    case "settings":
      content = html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} profile=${profile}
        onOpenPlans=${onOpenPlans} onSignOut=${signOut} onUpgrade=${onUpgrade}/>`;
      break;
  }

  return html`<div class="app">
    <${Header} syncStatus=${syncStatus} settings=${settings} profile=${profile} onSignOut=${signOut} onOpenPlans=${onOpenPlans}/>
    <${TrialBanner} profile=${profile} onUpgrade=${onOpenPlans}/>
    <div style=${{ flex: 1, overflow: "auto", WebkitOverflowScrolling: "touch" }}>${content}</div>
    <nav class="bottom-nav">
      ${TABS.map(t => html`<button key=${t.id} class=${"nav-btn" + (tab === t.id ? " active" : "")} onClick=${() => setTab(t.id)}>
        <span class="ico">${t.icon}</span>
        <span>${t.label}</span>
      </button>`)}
    </nav>
    <${ToastHost}/>
  </div>`;
}

// ── Mount ─────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary, null, html`<${App}/>`));
</script>
</body>
</html>
