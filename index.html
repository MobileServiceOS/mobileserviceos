<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mobile Service OS" />
  <meta name="theme-color" content="#050505" />
  <meta name="description" content="The operating system for mobile businesses. Track jobs, manage inventory, and run profitable mobile service operations from your phone." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>Mobile Service OS — The Operating System for Mobile Businesses</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Geist:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Platform tokens (Mobile Service OS) ── */
    --bg:          #0a0a0f;
    --s1:          #13131a;
    --s2:          #1c1c26;
    --s3:          #242432;
    --s4:          #2e2e40;
    --border:      rgba(255,255,255,.06);
    --border2:     rgba(255,255,255,.03);
    --t1: #f0f0fa;
    --t2: #8888a8;
    --t3: #44445a;

    /* ── Brand color (DYNAMIC — replaced by user branding at runtime) ── */
    --brand:       #4f8ef7;
    --brand-dim:   rgba(79,142,247,.12);
    --brand-glow:  rgba(79,142,247,.25);

    /* ── Platform brand (Mobile Service OS — never overridden) ── */
    --platform-blue:   #4f8ef7;
    --platform-orange: #ff7d3b;

    --blue:        #4f8ef7;
    --blue-dim:    rgba(79,142,247,.12);
    --blue-glow:   rgba(79,142,247,.25);
    --orange:      #ff7d3b;
    --orange-dim:  rgba(255,125,59,.12);
    --orange-glow: rgba(255,125,59,.3);
    --green:       #22c55e;
    --green-dim:   rgba(34,197,94,.12);
    --red:         #ef4444;
    --red-dim:     rgba(239,68,68,.10);
    --amber:       #f59e0b;
    --amber-dim:   rgba(245,158,11,.10);
    --gold:        #d4af6a;
    --gold-bright: #e8c585;
    --gold-deep:   #a08543;
    --gold-dim:    rgba(212,175,106,.14);
    --gold-glow:   rgba(212,175,106,.28);

    --r1:   22px;
    --r2:   16px;
    --r3:   12px;
    --r4:   8px;

    --sh-card:  0 1px 0 rgba(255,255,255,.04) inset, 0 4px 24px rgba(0,0,0,.5);
    --sh-hero:  0 0 0 1px rgba(79,142,247,.2), 0 8px 40px rgba(79,142,247,.15);
    --sh-cta:   0 0 0 1px rgba(255,125,59,.25), 0 8px 32px rgba(255,125,59,.2);
    --sh-float: 0 12px 48px rgba(0,0,0,.7);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body,#root { height:100%; font-family:"IBM Plex Sans",sans-serif; background:var(--bg); overflow:hidden; color:var(--t1); }
  input,select,textarea,button { font-family:"IBM Plex Sans",sans-serif; }
  input,select,textarea { font-size:16px !important; color:var(--t1); }
  button { cursor:pointer; }
  .app { height:100%; display:flex; flex-direction:column; }
  .screen { background:var(--bg); min-height:100%; }
  .page { padding:20px 16px calc(120px + env(safe-area-inset-bottom)); }

  /* Editorial display font for marketing/auth screens */
  /* Display headline — bold geometric sans matching the wordmark.
     Used on auth/onboarding/marketing surfaces. Renamed conceptually
     from "display-serif" but class name preserved to avoid churn. */
  .display-serif { font-family: "Geist","IBM Plex Sans",system-ui,sans-serif; font-weight:700; letter-spacing:-.025em; }
  .display-serif em { font-style:normal; font-weight:800; color:var(--platform-blue); }

  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeSlideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  @keyframes scaleIn    { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
  @keyframes shimmer    { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes countUp    { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes logoPulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.94)} }
  @keyframes glowPulse  { 0%,100%{box-shadow:0 0 24px var(--brand-glow)} 50%{box-shadow:0 0 48px var(--brand-glow)} }
  .syncing    { animation:pulse 1.4s infinite; }
  .logo-pulse { animation:logoPulse 2s ease-in-out infinite; }
  .page-enter { animation:fadeSlideUp .25s cubic-bezier(.4,0,.2,1) both; }
  .card-anim  { animation:fadeSlideUp .28s cubic-bezier(.4,0,.2,1) both; }
  .card-anim:nth-child(1){animation-delay:.02s}
  .card-anim:nth-child(2){animation-delay:.05s}
  .card-anim:nth-child(3){animation-delay:.08s}
  .card-anim:nth-child(4){animation-delay:.10s}
  .card-anim:nth-child(5){animation-delay:.12s}
  .card-anim:nth-child(6){animation-delay:.14s}
  .card-anim:nth-child(n+7){animation:none !important; opacity:1}
  @media (prefers-reduced-motion: reduce) {
    .card-anim, .page-enter { animation:none !important; opacity:1 !important; transform:none !important; }
  }
  .press-scale { transition:transform .1s,opacity .1s; }
  .press-scale:active { transform:scale(.96); opacity:.85; }
  .shimmer-text {
    background:linear-gradient(90deg,var(--t1) 25%,var(--brand) 50%,var(--t1) 75%);
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
  }

  /* ── Header ── */
  .header-compact {
    background:linear-gradient(180deg,#16161f 0%,#0f0f17 100%);
    padding:12px 18px; padding-top:calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-shrink:0; border-bottom:1px solid var(--border);
    box-shadow:0 1px 0 var(--brand-dim);
  }
  .header-compact h1 { font-size:16px; font-weight:700; letter-spacing:-.4px; color:var(--t1); }
  .header-compact p  { font-size:10px; color:var(--t3); margin-top:2px; }
  .brand-mark {
    width:32px;height:32px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 60%,#000));
    color:#fff;font-weight:800;font-size:14px;letter-spacing:-.5px;
    box-shadow:0 2px 10px rgba(0,0,0,.5),0 0 0 1px var(--brand-dim);
    overflow:hidden;
  }
  .brand-mark img { width:100%; height:100%; object-fit:cover; }

  /* ── Hero ── */
  .pro-hero {
    background:linear-gradient(145deg,#12121e 0%,#0d1020 40%,#101828 100%);
    border:1px solid var(--brand-dim); border-radius:var(--r1); padding:24px 22px;
    position:relative; overflow:hidden;
    box-shadow:0 0 0 1px var(--brand-dim),0 8px 32px rgba(0,0,0,.5);
    margin-bottom:16px;
  }
  .pro-hero::before {
    content:''; position:absolute; top:-60px; right:-40px; width:220px; height:220px;
    background:radial-gradient(circle,var(--brand-dim) 0%,transparent 65%);
    pointer-events:none;
  }
  .pro-hero::after {
    content:''; position:absolute; bottom:-40px; left:-30px; width:160px; height:160px;
    background:radial-gradient(circle,rgba(34,197,94,.06) 0%,transparent 65%);
    pointer-events:none;
  }
  .progress-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .progress-ring svg { transform:rotate(-90deg); }
  .progress-ring-bg   { fill:none; stroke:var(--s4); }
  .progress-ring-fill { fill:none; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); filter:drop-shadow(0 0 6px currentColor); }
  .progress-ring-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .section-label {
    font-size:11px; font-weight:800; text-transform:uppercase;
    letter-spacing:1.8px; color:var(--t3); margin:32px 0 12px;
  }
  .section-label:first-child { margin-top:0; }

  .card { background:var(--s1); border-radius:var(--r1); overflow:hidden; box-shadow:var(--sh-card); border:1px solid var(--border); margin-bottom:12px; }
  .card-pad { padding:18px 20px; }
  .card-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 20px; border-bottom:1px solid var(--border2); }
  .card-row:last-child { border-bottom:none; }

  .cta-btn { background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 70%,#000)); color:#fff; border:none; border-radius:var(--r3); padding:15px 22px; font-size:15px; font-weight:800; letter-spacing:-.2px; box-shadow:0 0 0 1px var(--brand-dim),0 8px 32px var(--brand-glow); transition:opacity .15s,transform .15s; display:flex; align-items:center; gap:8px; justify-content:center; width:100%; }
  .cta-btn:active { opacity:.85; transform:scale(.97); }

  .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-radius:var(--r1); overflow:hidden; margin-bottom:12px; box-shadow:var(--sh-card); }
  .kpi-grid.three { grid-template-columns:1fr 1fr 1fr; }
  .kpi { background:var(--s1); padding:17px 16px 15px; }
  .kpi-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--t3); margin-bottom:8px; }
  .kpi-value { font-family:"IBM Plex Mono",monospace; font-size:20px; font-weight:700; line-height:1; letter-spacing:-.8px; color:var(--t1); }
  .kpi-value.green { color:var(--green); }
  .kpi-value.red   { color:var(--red); }
  .kpi-value.blue  { color:var(--brand); }
  .kpi-sub { font-size:10px; color:var(--t3); margin-top:6px; font-weight:500; }

  .mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border-radius:var(--r1); overflow:hidden; margin-bottom:12px; box-shadow:var(--sh-card); }
  .mini-box { background:var(--s1); padding:15px 8px; text-align:center; }
  .mini-box strong { display:block; font-family:"IBM Plex Mono",monospace; font-size:15px; font-weight:700; color:var(--t1); letter-spacing:-.3px; }
  .mini-box span   { display:block; font-size:8px; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-top:5px; font-weight:700; }

  .goal-track { height:3px; background:var(--s4); border-radius:999px; overflow:hidden; margin:14px 0 8px; }
  .goal-fill  { height:100%; border-radius:999px; transition:width .7s cubic-bezier(.4,0,.2,1); }
  .goal-fill.full { background:var(--green); box-shadow:0 0 8px var(--green); }
  .goal-fill.mid  { background:var(--brand);  box-shadow:0 0 8px var(--brand-glow); }
  .goal-fill.low  { background:var(--amber); }

  .stack { display:grid; gap:10px; }
  .job-row { background:var(--s1); border-radius:var(--r2); padding:15px 17px; display:flex; align-items:flex-start; gap:13px; box-shadow:var(--sh-card); border:1px solid var(--border); transition:transform .15s; }
  .job-row:active { transform:scale(.985); }
  .job-icon  { width:42px; height:42px; border-radius:12px; background:var(--s3); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  .job-main  { flex:1; min-width:0; }
  .job-title { font-size:14px; font-weight:700; color:var(--t1); letter-spacing:-.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-meta  { font-size:11px; color:var(--t3); margin-top:3px; line-height:1.6; }
  .job-right { text-align:right; flex-shrink:0; }

  .label { font-size:11px; color:var(--t2); font-weight:500; }
  .sub   { font-size:11px; color:var(--t3); font-weight:500; }
  .mono  { font-family:"IBM Plex Mono",monospace; }
  .value { font-family:"IBM Plex Mono",monospace; font-size:14px; font-weight:700; color:var(--t1); }
  .value.big    { font-size:22px; }
  .value.green  { color:var(--green); }
  .value.red    { color:var(--red); }
  .value.orange { color:var(--orange); }

  .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:800; line-height:1.5; letter-spacing:.2px; }
  .pill.green  { background:var(--green-dim); color:var(--green); }
  .pill.red    { background:var(--red-dim);   color:var(--red); }
  .pill.orange { background:var(--orange-dim);color:var(--orange); }
  .pill.gray   { background:var(--s3);        color:var(--t2); }
  .pill.blue   { background:var(--brand-dim); color:var(--brand); }
  .pill.gold   { background:var(--gold-dim);  color:var(--gold); }

  .field { margin-bottom:14px; }
  .field label { display:block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--t2); margin-bottom:8px; }
  .field input,.field select,.field textarea { width:100%; border:1px solid var(--border); background:var(--s3); border-radius:var(--r3); padding:13px 15px; outline:none; transition:border-color .15s,box-shadow .15s; color:var(--t1); }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-dim); }
  .field select option { background:var(--s2); color:var(--t1); }
  .field textarea { min-height:72px; resize:vertical; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .chip-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }
  .chip { border:1px solid var(--border); background:var(--s3); border-radius:999px; padding:8px 14px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; }
  .chip.active { background:var(--brand-dim); color:var(--brand); border-color:var(--brand-dim); }
  .chip.sm { padding:6px 12px; font-size:11px; }

  .src-grid { display:flex; flex-wrap:wrap; gap:7px; margin-top:4px; }
  .src-btn  { border:1px solid var(--border); background:var(--s3); border-radius:var(--r3); padding:9px 12px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; display:flex; align-items:center; gap:5px; }
  .src-btn.active { background:var(--brand-dim); color:var(--brand); border-color:var(--brand-dim); }
  .pay-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }
  .pay-btn  { border:1px solid var(--border); border-radius:var(--r2); padding:11px 4px; background:var(--s3); display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700; color:var(--t2); transition:all .15s; }
  .pay-btn.active { background:var(--brand-dim); color:var(--brand); border-color:var(--brand-dim); }
  .pay-btn .pay-icon { font-size:18px; }

  .sticky-save {
    position:sticky; bottom:0; left:0; right:0;
    background:var(--bg); border-top:1px solid var(--border);
    padding:13px 16px; padding-bottom:calc(13px + env(safe-area-inset-bottom));
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    z-index:50; box-shadow:0 -8px 32px rgba(0,0,0,.6);
  }

  .btn { border:none; border-radius:var(--r3); padding:15px 18px; font-weight:700; font-size:14px; transition:all .15s; letter-spacing:-.1px; }
  .btn:active { opacity:.8; transform:scale(.97); }
  .btn.primary   { background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 70%,#000)); color:#fff; box-shadow:0 4px 16px var(--brand-glow); }
  .btn.secondary { background:var(--s3); color:var(--t2); border:1px solid var(--border); }
  .btn.sm  { padding:9px 14px; font-size:12px; border-radius:var(--r4); }
  .btn.xs  { padding:6px 10px; font-size:11px; border-radius:7px; font-weight:700; }
  .btn.danger  { background:var(--red-dim);    color:var(--red); }
  .btn.success { background:var(--green-dim);  color:var(--green); }
  .btn.blue    { background:var(--brand-dim);  color:var(--brand); }
  .btn.orange  { background:var(--orange-dim); color:var(--orange); }
  .btn.gold    { background:var(--gold-dim);   color:var(--gold); }

  .form-group { background:var(--s1); border-radius:var(--r1); padding:16px 18px; margin-bottom:10px; box-shadow:var(--sh-card); border:1px solid var(--border); }
  .form-group-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--t2); margin-bottom:14px; }

  .success-strip { background:var(--green-dim); border:1px solid rgba(34,197,94,.2); border-radius:var(--r2); padding:14px 16px; margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; animation:scaleIn .3s ease; }
  .success-strip-title { font-size:12px; font-weight:700; color:var(--green); width:100%; margin-bottom:4px; }

  .bottom-nav { display:flex; background:linear-gradient(180deg,#0f0f17 0%,#0a0a0f 100%); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); flex-shrink:0; box-shadow:0 -4px 20px rgba(0,0,0,.5),0 -1px 0 var(--brand-dim); }
  .nav-btn { flex:1; border:none; background:none; padding:10px 2px 9px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--t3); font-size:7.5px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; position:relative; transition:color .15s; }
  .nav-btn.active { color:var(--brand); }
  .nav-btn.active::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:24px; height:2px; background:linear-gradient(90deg,var(--brand),color-mix(in srgb,var(--brand) 60%,#fff)); border-radius:0 0 4px 4px; box-shadow:0 0 8px var(--brand-glow); }
  .nav-btn .ico { font-size:19px; line-height:1; transition:transform .15s; }
  .nav-btn.active .ico { transform:scale(1.1); filter:drop-shadow(0 0 4px var(--brand-glow)); }

  .settings-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border2); }
  .settings-row:last-child { border-bottom:none; }
  .settings-inp { border:1px solid var(--border); border-radius:var(--r4); padding:10px 13px; font-size:15px; outline:none; background:var(--s3); color:var(--t1); transition:border-color .15s; }
  .settings-inp:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-dim); }
  .expense-row { display:grid; grid-template-columns:1fr 90px auto auto; gap:8px; align-items:center; padding:11px 20px; border-bottom:1px solid var(--border2); }
  .expense-row:last-child { border-bottom:none; }
  .expense-row input { border:1px solid var(--border); border-radius:var(--r4); padding:9px 12px; font-size:15px; outline:none; background:var(--s3); color:var(--t1); width:100%; }

  .empty { padding:60px 20px; text-align:center; }
  .empty-icon  { font-size:40px; margin-bottom:14px; opacity:.7; }
  .empty-title { font-size:15px; font-weight:700; margin-bottom:6px; color:var(--t1); }
  .empty-sub   { font-size:13px; color:var(--t3); line-height:1.6; }

  .tax-box { background:var(--gold-dim); border:1px solid rgba(200,164,74,.2); border-radius:var(--r3); padding:13px 16px; margin-top:12px; }
  .tax-box .tax-lbl  { color:var(--gold); font-weight:800; font-size:9px; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .tax-box .tax-amt  { font-family:"IBM Plex Mono",monospace; font-size:18px; font-weight:700; color:var(--gold); }
  .tax-box .tax-hint { font-size:11px; color:rgba(200,164,74,.6); margin-top:4px; }
  .inline-note { font-size:11px; color:var(--t3); line-height:1.6; margin-bottom:14px; }

  /* ── Auth & marketing screens (use platform brand, never user brand) ── */
  /* Auth/onboarding/marketing surfaces — gold-luxury treatment.
     Pure black backdrop with subtle warm vignette so the gold logo glows.
     This is the brand's "front door" aesthetic. */
  .auth-shell {
    height:100%; display:flex; flex-direction:column;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(212,175,106,.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(212,175,106,.04) 0%, transparent 60%),
      #050505;
    padding:0 24px; padding-top:env(safe-area-inset-top);
    position:relative;
  }
  .auth-shell::before {
    /* Film grain on auth surfaces only — adds the "premium print" feel */
    content:""; position:absolute; inset:0; pointer-events:none;
    opacity:.03; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .auth-shell > * { position:relative; z-index:1; }
  .auth-field { margin-bottom:14px; }
  .auth-label {
    display:block; font-size:9px; font-weight:600; text-transform:uppercase;
    letter-spacing:.18em; color:var(--gold); margin-bottom:8px; opacity:.75;
  }
  .auth-inp {

// ── Firebase init ───────────────────────────────────────────────────────────
let _app, _db, _auth;
(function initFB() {
  try {
    if (typeof firebase === "undefined") return;
    _app  = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(CFG.firebase);
    _db   = firebase.firestore();
    _auth = firebase.auth();
    if (_auth) _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
  } catch (e) { console.warn("Firebase init:", e); }
})();

/* ────────────────────────────────────────────────────────────────────────────
   MULTI-TENANT FIRESTORE LAYER

   Every read/write is scoped to users/{uid}/... — never to a global collection.
   This is the single biggest architectural change vs. the original app.
   ──────────────────────────────────────────────────────────────────────────── */
const userDoc     = (uid) => (_db && uid) ? _db.collection("users").doc(uid) : null;
const tJobsCol    = (uid) => (_db && uid) ? _db.collection("users").doc(uid).collection("jobs") : null;
const tInvCol     = (uid) => (_db && uid) ? _db.collection("users").doc(uid).collection("inventory") : null;
const tExpCol     = (uid) => (_db && uid) ? _db.collection("users").doc(uid).collection("expenses") : null;
const tSettingDoc = (uid) => (_db && uid) ? _db.collection("users").doc(uid).collection("settings").doc("main") : null;

async function fbSet(col, id, data) {
  if (!col) return;
  const clean = {};
  Object.keys(data || {}).forEach(k => {
    const v = data[k];
    if (v === undefined) return;
    if (v === null)            { clean[k] = null; return; }
    if (typeof v === "object") { clean[k] = JSON.stringify(v); return; }
    clean[k] = v;
  });
  clean.id = String(id);
  try { await col.doc(String(id)).set(clean); } catch (e) { console.warn("fbSet:", e); }
}
async function fbDel(col, id) {
  if (!col) return;
  try { await col.doc(String(id)).delete(); } catch (e) {}
}
function fbListen(col, cb) {
  if (!col) { cb([]); return () => {}; }
  return col.onSnapshot(
    s => cb(s.docs.map(d => ({ ...d.data(), id: d.id }))),
    e => console.warn("fbListen error (keeping local state):", e)
  );
}
const isLocalUser = u => !u || u.uid === "local";

/* ────────────────────────────────────────────────────────────────────────────
   ONE-TIME LEGACY MIGRATION

   On first login, copy any existing wr2_* documents into the user's tenant
   and tag the user doc as migrated so we never run it twice.
   ──────────────────────────────────────────────────────────────────────────── */
// ── Legacy data migration ─────────────────────────────────────────────────
// SECURITY-CRITICAL: this function delegates to a Cloud Function (runMigration)
// which is the only path that can legitimately set migrationComplete (a
// server-only field per Firestore rules).
//
// Set LEGACY_OWNER_UID to the original Wheel Rush owner's UID to enable
// migration for that single account. All other users get a no-op skip.
const LEGACY_OWNER_UID = ""; // ← set this to the original owner's UID, or leave "" to disable

async function migrateLegacyDataIfNeeded(uid) {
  if (!_db || !uid) return { migrated: false };
  if (!LEGACY_OWNER_UID || uid !== LEGACY_OWNER_UID) {
    return { migrated: false, skipped: true, reason: "not_legacy_owner" };
  }
  if (!_auth || !_auth.currentUser) {
    return { migrated: false, skipped: true, reason: "not_authenticated" };
  }
  // Quick local check first to avoid an unnecessary network call.
  try {
    const snap = await userDoc(uid).get();
    const existing = snap.exists ? snap.data() : null;
    if (existing && (existing.migrationComplete || existing.legacyMigrated)) {
      return { migrated: false, skipped: true, reason: "already_complete" };
    }
  } catch {}

  // Delegate to server. The server-side migration is the only path that can
  // both READ wr2_* (which only the legacy owner is allowed to read) AND
  // WRITE migrationComplete (a server-only field).
  const endpoint = (CFG.stripe && CFG.stripe.functionsBase)
    ? CFG.stripe.functionsBase + "/runMigration"
    : null;
  if (!endpoint) {
    console.warn("[migration] No functionsBase configured; skipping migration");
    return { migrated: false, skipped: true, reason: "no_endpoint" };
  }
  try {
    const token = await _auth.currentUser.getIdToken();
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({}),
    });
    if (!res.ok) {
      console.warn("[migration] Server returned", res.status);
      return { migrated: false, error: "http_" + res.status };
    }
    const data = await res.json();
    return data;
  } catch (e) {
    console.warn("[migration] Network error:", e);
    return { migrated: false, error: String(e) };
  }
}

// User has access to feature X if their plan's limit allows it AND subscription is active.
//
// TRIAL POLICY: during the 7-day trial (status === "trialing"), users get
// PRO-tier feature access regardless of what plan they nominally have.
// This is the standard SaaS trial pattern — let users experience the
// product's value, then ask them to pick a plan when the trial ends.
//
// The trial does NOT unlock Premium-only features (advanced analytics,
// team seats) — those are reserved as upgrade reasons after trial ends.
function effectivePlanForFeatures(userProfile) {
  if (!userProfile) return "starter";
  const status = userProfile.subscriptionStatus || "trialing";
  const trialActive = status === "trialing"
    && (!userProfile.trialEndsAt || Date.now() < userProfile.trialEndsAt);
  // Trial users get PRO features. After trial ends, fall through to actual plan.
  if (trialActive) return "pro";
  return userProfile.plan || "starter";
}

function hasFeature(userProfile, featureKey) {
  if (!userProfile) return false;
  const status = userProfile.subscriptionStatus || "trialing";
  const trialActive = status === "trialing"
    && (!userProfile.trialEndsAt || Date.now() < userProfile.trialEndsAt);
  // Active subscription OR active trial — both grant access.
  const isActive = status === "active" || trialActive;
  if (!isActive) return false;
  const planId = effectivePlanForFeatures(userProfile);
  const limits = (PLANS[planId] || PLANS.starter).limits;
  const v = limits[featureKey];
  if (typeof v === "boolean") return v;
  return v != null;
}

function planLimit(userProfile, key) {
  // For limits (jobsPerMonth), trial users also get Pro's "unlimited".
  // After trial ends → actual plan limit kicks in.
  const planId = effectivePlanForFeatures(userProfile);
  return (PLANS[planId] || PLANS.starter).limits[key];
}

/* ────────────────────────────────────────────────────────────────────────────
   STORAGE KEYS — local cache; cloud is the source of truth when logged in
   ──────────────────────────────────────────────────────────────────────────── */
const KEYS = {
  jobs:       "mso-jobs-v1",
  settings:   "mso-settings-v1",
  inventory:  "mso-inventory-v1",
  expenses:   "mso-expenses-v1",
  sizes:      "mso-recent-sizes-v1",
  cities:     "mso-recent-cities-v1",
  calls:      "mso-calls-v1",
  profile:    "mso-profile-v1",
  lastUid:    "mso-last-uid-v1",   // persisted last-known UID, used to detect cross-user opens
};
const load    = (k, fb) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } };
const persist = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── Tenant-aware load/persist ──────────────────────────────────────────────
// Cached data must be scoped to the user it belongs to. Without this,
// User A's cached jobs would show up briefly when User B signs in on the
// same device — even after we wipe on auth-change, the *initial state hydration*
// happens before auth resolves, so the wrong data is briefly painted.
//
// Strategy: namespace the localStorage key by the last-known UID. On boot,
// if the last-known UID is missing, we hydrate from empty (the user must
// authenticate before seeing data). After auth resolves, if the auth UID
// matches the last-known UID, we keep the cache. Otherwise we clear and
// re-sync from Firestore.
function lastUid() { return load(KEYS.lastUid, null); }
function setLastUid(uid) { persist(KEYS.lastUid, uid); }
function tenantKey(baseKey, uid) { return baseKey + "::" + (uid || "anon"); }
function loadTenant(baseKey, uid, fb) { return load(tenantKey(baseKey, uid), fb); }
function persistTenant(baseKey, uid, v) { persist(tenantKey(baseKey, uid), v); }
// Clear all known tenant-scoped keys for a given UID (used on sign-out / user-change)
function clearTenantData(uid) {
  if (!uid) return;
  [KEYS.jobs, KEYS.settings, KEYS.inventory, KEYS.expenses].forEach(k => {
    try { localStorage.removeItem(tenantKey(k, uid)); } catch {}
  });
}

// ── Highway condition gate — single source of truth ───────────────────────
// User's explicit spec: Highway condition shows ONLY for mobile tire and
// roadside assistance. Centralized here so any new render site can call
// this one helper and get correct behavior automatically.
//
// Accepts BOTH the spec's snake_case IDs (mobile_tire, roadside_assistance)
// AND the short IDs actually used by BUSINESS_TYPES (tire, roadside). This
// way it doesn't matter which form a future caller uses — both work.
function shouldShowHighwayCondition(businessType) {
  if (!businessType) return false;
  const id = String(businessType).toLowerCase();
  // Both ID forms produce the same answer:
  //   tire / mobile_tire           → true
  //   roadside / roadside_assistance → true
  //   anything else                → false
  return id === "tire"
      || id === "mobile_tire"
      || id === "roadside"
      || id === "roadside_assistance";
}

// FLAGS = [key, label, premiumAmount, allowedBizTypes (omit = all)]
// "Highway" is only relevant for tire/roadside services — nobody does an
// oil change or pressure-wash on the shoulder of I-95. Hiding the toggle
// for those biz types prevents nonsensical line items on invoices.
const FLAGS = [
  ["emergency", "🚨 Emergency", 20],
  ["lateNight", "🌙 Late Night", 20],
  ["highway",   "🛣 Highway",    15, ["tire", "roadside"]],
  ["weekend",   "📅 Weekend",    10]
];

// Helper: filter flags to those allowed for the current biz type.
// Highway specifically routes through shouldShowHighwayCondition() so the
// centralized rule is the single source of truth — the FLAGS allowedBizTypes
// data is just the inputs to it. If a future caller skips this filter and
// renders Highway directly, shouldShowHighwayCondition() should still gate
// the render at the call site.
function flagsForBizType(bizTypeId) {
  return FLAGS.filter(([key, _label, _amt, allowed]) => {
    // Highway: route through the explicit named gate (defense in depth)
    if (key === "highway") return shouldShowHighwayCondition(bizTypeId);
    // Other flags: simple allowedBizTypes check
    if (!allowed) return true;
    return allowed.includes(bizTypeId);
  });
}

const jobDirectCost  = (j, s) => r2(Number(j.miles || 0) * Number(s.costPerMile || 0.65) + Number(j.tireCost || 0) + Number(j.miscCost || 0));
const jobGrossProfit = (j, s) => r2(Number(j.revenue || 0) - jobDirectCost(j, s));
const monthlyFixed   = s => { const e = Array.isArray(s.expenses) ? s.expenses : []; return e.filter(x => x.active).reduce((t, x) => t + Number(x.amount || 0), 0); };

function distancePremium(miles) {
  const m = Number(miles || 0);
  if (m <= 10) return 0;
  if (m <= 25) return 15;
  return 35;
}
function premiums(j, bizTypeId) {
  if (!j) return 0;
  let p = 0;
  if (j.emergency) p += 20;
  if (j.lateNight) p += 20;
  // Highway premium only applies for biz types where the gate allows it.
  // If bizTypeId is omitted (legacy callers), allow Highway as a back-compat
  // default — but those callers should pass bizTypeId.
  if (j.highway) {
    if (!bizTypeId || shouldShowHighwayCondition(bizTypeId)) p += 15;
  }
  if (j.weekend)   p += 10;
  return p;
}
function getServicePricing(service, settings, bizTypeId) {
  const bt = getBizType(bizTypeId);
  const sp = (settings && settings.servicePricing) || bt.defaultServicePricing;
  return sp[service] || bt.defaultServicePricing[service] || { enabled: true, basePrice: 90, minProfit: 60 };
}
function getVehicleAddOn(vehicleType, settings) {
  const vp = (settings && settings.vehiclePricing) || DEFAULT_VEHICLE_PRICING;
  const v  = vp[vehicleType] || DEFAULT_VEHICLE_PRICING[vehicleType] || { addOnProfit: 0 };
  return Number(v.addOnProfit || 0);
}

function calculatePricing(job, settings, bizTypeId) {
  const j = job || {};
  const s = settings || {};
  const costPerMile = Math.max(0, Number(s.costPerMile || 0.65));
  const miles      = Math.max(0, Number(j.miles || 0));
  const tireCost   = Math.max(0, Number(j.tireCost || 0));
  const miscCost   = Math.max(0, Number(j.miscCost || 0));
  const travelCost = r2(miles * costPerMile);
  const directCost = r2(tireCost + miscCost + travelCost);
  const revenue    = Math.max(0, Number(j.revenue || 0));
  const actualProfit = r2(revenue - directCost);

  const svcRule    = getServicePricing(j.service, s, bizTypeId);
  const vehicleAdd = Math.max(0, getVehicleAddOn(j.vehicleType, s));
  const baseTarget = (svcRule && svcRule.minProfit != null && !isNaN(Number(svcRule.minProfit)))
    ? Number(svcRule.minProfit)
    : Number(s.defaultTargetProfit || 100);
  const targetProfit  = baseTarget + vehicleAdd;
  const distanceAdj   = distancePremium(miles);
  const urgencyPremium= premiums(j, bizTypeId) + distanceAdj;

  const raw = directCost + targetProfit + urgencyPremium;
  const suggestedPrice = Math.ceil(raw / 5) * 5;
  const premiumPrice   = Math.ceil((suggestedPrice + 20) / 5) * 5;

  const skip = Number(s.skipThreshold || 70);
  let decisionLabel = "Take it", decisionType = "take";
  if (revenue > 0 && actualProfit < skip) {
    decisionLabel = "Low margin — increase price"; decisionType = "low";
  } else if (distanceAdj >= 35) {
    decisionLabel = "High distance — premium applied"; decisionType = "distance";
  } else if (revenue > 0 && actualProfit >= skip + 40) {
    decisionLabel = "Strong profit"; decisionType = "strong";
  } else if (revenue === 0) {
    decisionLabel = "Estimated price"; decisionType = "estimate";
  }

  return {
    revenue, tireCost, miscCost, travelCost, directCost,
    targetProfit, urgencyPremium, distanceAdj, baseTarget, vehicleAdd,
    suggestedPrice, premiumPrice, actualProfit,
    decisionLabel, decisionType
  };
}

function getWeekStart(d) {
  const dt = new Date(d + "T12:00:00"), day = dt.getDay();
  // Friday-aligned week (preserved from Wheel Rush convention; can be changed in settings later)
  dt.setDate(dt.getDate() - (day >= 5 ? day - 5 : day + 2));
  return dt.toLocaleDateString("en-CA", { timeZone: "America/New_York" });
}
function weekLabel(s) {
  const d = new Date(s + "T12:00:00"), e = new Date(d);
  e.setDate(e.getDate() + 6);
  const f = dt => dt.toLocaleDateString("en-US", { timeZone: "America/New_York", month: "short", day: "numeric" });
  return f(d) + " – " + f(e);
}
const getMonthKey = d => String(d || "").slice(0, 7);
function monthLabel(key) {
  const [y, m] = String(key || "").split("-");
  if (!y || !m) return key || "";
  const dt = new Date(Number(y), Number(m) - 1, 1);
  return dt.toLocaleDateString("en-US", { timeZone: "America/New_York", month: "long", year: "numeric" });
}
function groupByWeek(jobs) {
  const map = {};
  [...(jobs || [])].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id))
    .forEach(j => { const k = getWeekStart(j.date); if (!map[k]) map[k] = []; map[k].push(j); });
  return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
}
function weekSummary(weekJobs, s) {
  const jobs = Array.isArray(weekJobs) ? weekJobs : [];
  const revenue     = r2(jobs.reduce((t, j) => t + Number(j.revenue || 0), 0));
  const directCosts = r2(jobs.reduce((t, j) => t + jobDirectCost(j, s), 0));
  const grossProfit = r2(revenue - directCosts);
  return { revenue, directCosts, grossProfit, net: grossProfit, fixed: 0 };
}
function monthSummary(monthJobs, s) {
  const jobs = Array.isArray(monthJobs) ? monthJobs : [];
  const revenue     = r2(jobs.reduce((t, j) => t + Number(j.revenue || 0), 0));
  const tireCosts   = r2(jobs.reduce((t, j) => t + Number(j.tireCost || 0), 0));
  const miscCosts   = r2(jobs.reduce((t, j) => t + Number(j.miscCost || 0), 0));
  const travelCosts = r2(jobs.reduce((t, j) => t + Number(j.miles || 0) * Number(s.costPerMile || 0.65), 0));
  const directCosts = r2(tireCosts + miscCosts + travelCosts);
  const grossProfit = r2(revenue - directCosts);
  const fixed       = monthlyFixed(s);
  const net         = r2(grossProfit - fixed);
  return { revenue, tireCosts, miscCosts, travelCosts, directCosts, grossProfit, fixed, net };
}

// ── Inventory utilities (preserved & cleaned) ─────────────────────────────
function normalizeTireSize(s) {
  if (!s) return "";
  const m = String(s).match(/(\d{3})\s*[\/\-\s]+\s*(\d{2,3})\s*[\/\-\s]*\s*R?\s*(\d{2})/i);
  if (!m) return "";
  return m[1] + "/" + m[2] + "R" + m[3];
}
function planInventoryDeduction(inventory, sizeOrName, qtyNeeded, preferredId) {
  if (!sizeOrName || !qtyNeeded || qtyNeeded <= 0) return null;
  const target = normalizeTireSize(sizeOrName) || String(sizeOrName).trim().toLowerCase();
  const candidates = (inventory || []).filter(i => {
    const sz = normalizeTireSize(i.size) || String(i.size || "").trim().toLowerCase();
    return sz === target && (Number(i.qty) || 0) > 0;
  });
  if (!candidates.length) return null;
  const sorted = candidates.slice().sort((a, b) => {
    const ac = (String(a.condition || "new").toLowerCase() === "new") ? 0 : 1;
    const bc = (String(b.condition || "new").toLowerCase() === "new") ? 0 : 1;
    if (ac !== bc) return ac - bc;
    return (Number(b.qty) || 0) - (Number(a.qty) || 0);
  });
  const ordered = preferredId
    ? [...sorted.filter(r => String(r.id) === String(preferredId)), ...sorted.filter(r => String(r.id) !== String(preferredId))]
    : sorted;
  const plan = [];
  let remaining = qtyNeeded;
  for (const row of ordered) {
    if (remaining <= 0) break;
    const have = Number(row.qty) || 0;
    const take = Math.min(have, remaining);
    plan.push({ id: String(row.id), size: String(row.size || ""), condition: String(row.condition || "New"),
                before: have, deducted: take, after: have - take });
    remaining -= take;
  }
  return { plan, totalDeducted: qtyNeeded - remaining, shortfall: remaining };
}
function applyInventoryDeduction(plan, setInventory, user, settingsCol) {
  if (!plan || !Array.isArray(plan.plan) || !plan.plan.length) return;
  const byId = {};
  plan.plan.forEach(s => { byId[s.id] = s.after; });
  setInventory(prev => {
    const arr  = Array.isArray(prev) ? prev : [];
    const next = arr.map(i => byId[i.id] !== undefined ? { ...i, qty: byId[i.id] } : i);
    // Tenant-scoped local cache: keyed by uid so cross-user reads can never leak
    const uid = user && user.uid;
    if (uid) persistTenant(KEYS.inventory, uid, next);
    else     persist(KEYS.inventory, next); // local-only mode
    if (user && !isLocalUser(user) && tInvCol(user.uid)) {
      next.filter(x => byId[x.id] !== undefined).forEach(x => fbSet(tInvCol(user.uid), x.id, sanitizeInvItem(x)));
    }
    return next;
  });
}
function restoreInventoryDeduction(deductions, setInventory, user) {
  if (!Array.isArray(deductions) || !deductions.length) return;
  const addMap = {};
  deductions.forEach(d => { addMap[d.id] = (addMap[d.id] || 0) + (Number(d.deducted) || 0); });
  setInventory(prev => {
    const arr  = Array.isArray(prev) ? prev : [];
    const next = arr.map(i => addMap[i.id] ? { ...i, qty: (Number(i.qty) || 0) + addMap[i.id] } : i);
    const uid = user && user.uid;
    if (uid) persistTenant(KEYS.inventory, uid, next);
    else     persist(KEYS.inventory, next);
    if (user && !isLocalUser(user) && tInvCol(user.uid)) {
      next.filter(x => addMap[x.id]).forEach(x => fbSet(tInvCol(user.uid), x.id, sanitizeInvItem(x)));
    }
    return next;
  });
}

function sanitizeJob(j) {
  if (!j || typeof j !== "object") j = {};
  return {
    id: String(j.id || uid()),
    date: String(j.date || TODAY()),
    service: String(j.service || ""),
    vehicleType: String(j.vehicleType || ""),
    area: String(j.area || ""),
    payment: String(j.payment || "Cash"),
    status: String(j.status || "Completed"),
    source: String(j.source || ""),
    customerName: String(j.customerName || ""),
    customerPhone: String(j.customerPhone || ""),
    tireSize: String(j.tireSize || ""),
    qty: Number(j.qty || 1),
    revenue: Number(j.revenue || 0),
    tireCost: Number(j.tireCost || 0),
    miscCost: Number(j.miscCost || 0),
    miles: Number(j.miles || 0),
    note: String(j.note || ""),
    emergency: !!j.emergency, lateNight: !!j.lateNight, highway: !!j.highway, weekend: !!j.weekend,
    tireSource: String(j.tireSource || "Inventory"),
    tireBrand: String(j.tireBrand || ""),
    tireModel: String(j.tireModel || ""),
    tireVendor: String(j.tireVendor || ""),
    saveToInventory: !!j.saveToInventory,
    inventoryItemId: String(j.inventoryItemId || ""),
  };
}
function sanitizeInvItem(i) {
  if (!i || typeof i !== "object") i = {};
  const cond = String(i.condition || "").toLowerCase() === "used" ? "Used" : "New";
  return {
    id: String(i.id || uid()),
    size: String(i.size || ""),
    brand: String(i.brand || ""),
    model: String(i.model || ""),
    condition: cond,
    qty: Math.max(0, Number(i.qty || 0)),
    cost: Number(i.cost || 0),
    sellPrice: Number(i.sellPrice || 0),
    notes: String(i.notes || ""),
    treadDepth: String(i.treadDepth || ""),
    dotCode: String(i.dotCode || ""),
    createdAt: Number(i.createdAt || Date.now()),
  };
}

// Apply user brand color to CSS variables (with fallback to platform color).
function applyBranding(settings) {
  const root = document.documentElement;
  const color = (settings && settings.brandColor) || CFG.platform.color;
  root.style.setProperty("--brand", color);
  // Compute alpha variants
  const hexToRgb = (h) => {
    const m = /^#?([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})$/i.exec(h || "");
    if (!m) return [79, 142, 247];
    return [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)];
  };
  const [r, g, b] = hexToRgb(color);
  root.style.setProperty("--brand-dim",  `rgba(${r},${g},${b},.12)`);
  root.style.setProperty("--brand-glow", `rgba(${r},${g},${b},.25)`);
}
</script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   AUTH / ONBOARDING / BILLING SCREENS

   These screens use PLATFORM branding (Mobile Service OS), never user branding.
   Once a user is logged in, onboarded, AND has an active subscription,
   user branding takes over for the in-app experience.
   ════════════════════════════════════════════════════════════════════════════ */

// Platform logo — pure inline SVG so it works offline & is themable.
// ── Brand marks — two-tier identity ────────────────────────────────────────
// BrandMark (gold MS monogram)  → auth screens, onboarding, marketing surfaces
//                                   the "front door" of the product
// PlatformMark (blue grid)       → in-app utility surfaces, plan badges, system
//                                   indicators — the "workshop" of the product
// Gold accents tie them together via --gold token in CSS.

// Gold mark — uses inlined PNG so it works fully offline. The wrench-in-M
// monogram says "mobile service" in a single glyph; the polished gold says
// "premium SaaS, not a hobby app." Used wherever the user is meeting the
// brand for the first time.
function BrandMark({ size = 84, glow = false }) {
  return html`<div style=${{
    width: size, height: size,
    display: "inline-flex", alignItems: "center", justifyContent: "center",
    flexShrink: 0,
    filter: glow ? "drop-shadow(0 8px 32px rgba(200,164,74,.3))" : "none",
  }}>
    <img src=${LOGO_MARK_GOLD} alt="Mobile Service OS"
      style=${{ width: "100%", height: "100%", objectFit: "contain", display: "block" }}/>
  </div>`;
}

// Platform mark — 4-cell modular grid, accent diamond bottom-right.
// Reads as: system + activity. Linear/Stripe-adjacent. Two flat colors,
// no gradients, no glow. Scales to 16px favicon and 200px hero.
// Used in-app (header, nav badges) where the gold mark would be too heavy.
function PlatformMark({ size = 84, accent }) {
  const ac = accent || CFG.platform.color;
  return html`<svg width=${size} height=${size} viewBox="0 0 64 64" fill="none" style=${{display:"block",color:"#f5f5f7"}}>
    <rect x="4"  y="4"  width="24" height="24" rx="4" fill="currentColor"/>
    <rect x="36" y="4"  width="24" height="24" rx="4" fill="currentColor" fill-opacity=".55"/>
    <rect x="4"  y="36" width="24" height="24" rx="4" fill="currentColor" fill-opacity=".55"/>
    <rect x="36" y="36" width="24" height="24" rx="4" transform="rotate(45 48 48)" fill=${ac}/>
  </svg>`;
}

// Wordmark — used beside PlatformMark for in-app lockups. On marketing
// surfaces, the gold BrandMark already includes its own wordmark (in the PNG)
// so this isn't needed there.
function PlatformWordmark({ size = 26, accent }) {
  const ac = accent || CFG.platform.color;
  return html`<span style=${{
    fontFamily:'"Geist","IBM Plex Sans",system-ui,sans-serif',
    fontWeight:700, letterSpacing:"-.025em", lineHeight:1,
    fontSize: size, color: "#f5f5f7", whiteSpace:"nowrap"
  }}>Mobile Service<span style=${{ color: ac, fontWeight: 800, marginLeft: ".16em" }}>OS</span></span>`;
}

// Compact lockup — mark + wordmark on one row. Used in-app only. For
// marketing/auth, use BrandMark which already contains the wordmark.
function PlatformLockup({ markSize = 36, wordSize = 22, accent }) {
  return html`<div style=${{display:"inline-flex",alignItems:"center",gap:12}}>
    <${PlatformMark} size=${markSize} accent=${accent}/>
    <${PlatformWordmark} size=${wordSize} accent=${accent}/>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────────────────
   AUTH SCREEN
   ──────────────────────────────────────────────────────────────────────────── */
function AuthScreen({ onAuth }) {
  const [email, setEmail] = useState("");
  const [pass,  setPass]  = useState("");
  const [mode,  setMode]  = useState("login");
  const [err,   setErr]   = useState("");
  const [busy,  setBusy]  = useState(false);

  const submit = async () => {
    if (!email || !pass) { setErr("Enter your email and password."); return; }
    if (mode === "signup" && pass.length < 6) { setErr("Password must be at least 6 characters."); return; }
    setBusy(true); setErr("");
    try {
      if (!_auth) {
        // Local-only fallback so dev still works without Firebase
        onAuth({ uid: "local", email, displayName: email.split("@")[0] });
        return;
      }
      const c = mode === "login"
        ? await _auth.signInWithEmailAndPassword(email, pass)
        : await _auth.createUserWithEmailAndPassword(email, pass);
      onAuth(c.user);
    } catch (e) {
      setErr(e.message || "Auth failed.");
    } finally {
      setBusy(false);
    }
  };

  const google = async () => {
    if (!_auth) { setErr("Google sign-in unavailable in offline mode."); return; }
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      // Always show the account chooser. Without this, Google auto-uses
      // the last-used account on shared devices — surprising UX.
      provider.setCustomParameters({ prompt: "select_account" });

      // Popup-only sign-in (per spec). Note: iOS Safari blocks popups in
      // standalone PWA mode, so PWA users on iPhone may need to sign in
      // through the browser tab rather than the installed PWA. Email/password
      // still works in standalone PWA without limitations.
      const c = await _auth.signInWithPopup(provider);
      onAuth(c.user);
    } catch (e) {
      // Helpful message for the most common dev-time blocker: localhost (or
      // whatever domain the dev is testing on) isn't in Firebase's authorized
      // domains list. Tell them exactly where to fix it.
      const code = (e && e.code) || "";
      if (code === "auth/unauthorized-domain") {
        setErr("This domain isn't authorized for sign-in. Add '" +
               window.location.hostname + "' under Firebase Console → " +
               "Authentication → Settings → Authorized domains.");
      } else if (code === "auth/popup-blocked") {
        setErr("Popup was blocked. Allow popups for this site, or use email sign-in instead.");
      } else if (code === "auth/popup-closed-by-user" || code === "auth/cancelled-popup-request") {
        // User closed the popup — silent, don't show an error
      } else {
        setErr(e.message || "Sign-in failed.");
      }
    }
  };

  return html`<div class="auth-shell">
    <div style=${{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", paddingBottom: 16 }}>
      <${BrandMark} size=${140} glow=${true}/>
      <div style=${{marginTop:28, marginBottom:8, textAlign:"center"}}>
        <div style=${{
          fontFamily:'"Cormorant Garamond","Playfair Display",Georgia,serif',
          fontWeight:500, letterSpacing:".25em", color:"#f5f5f7",
          fontSize: 22, textTransform:"uppercase",
        }}>Mobile Service<span style=${{color:"var(--gold)",marginLeft:".5em",fontWeight:600}}>OS</span></div>
      </div>
      <div style=${{
        color: "var(--gold)", fontSize: 10, fontWeight: 600,
        textAlign: "center", maxWidth: 320, lineHeight: 1.6,
        fontFamily:'"Geist","IBM Plex Sans",system-ui,sans-serif',
        letterSpacing:".18em", textTransform:"uppercase", opacity:.7,
        marginTop: 4,
      }}>
        ${CFG.platform.tagline}
      </div>
    </div>
    <div style=${{ paddingBottom: "calc(32px + env(safe-area-inset-bottom))" }}>
      ${err && html`<div style=${{ background: "var(--red-dim)", border: "1px solid rgba(239,68,68,.3)", color: "#f87171", padding: "12px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>${err}</div>`}
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-inp" type="email" placeholder="you@business.com" value=${email} onChange=${e => setEmail(e.target.value)} autoCapitalize="off"/>
      </div>
      <div class="auth-field" style=${{ marginBottom: 20 }}>
        <label class="auth-label">Password</label>
        <input class="auth-inp" type="password" placeholder="••••••••" value=${pass} onChange=${e => setPass(e.target.value)} onKeyDown=${e => e.key === "Enter" && submit()}/>
      </div>
      <button class="auth-btn-main press-scale" onClick=${submit} disabled=${busy}>
        ${busy ? "Working…" : mode === "login" ? "Sign In" : "Create Account"}
      </button>
      <button class="auth-btn-google press-scale" onClick=${google}>
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
      <div style=${{ textAlign: "center" }}>
        <button style=${{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", padding: "8px" }}
          onClick=${() => { setMode(m => m === "login" ? "signup" : "login"); setErr(""); }}>
          ${mode === "login" ? "New here? Create account" : "Have an account? Sign in"}
        </button>
      </div>
    </div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────────────────
   ONBOARDING — 4 steps: name → type → logo/color → goals
   ──────────────────────────────────────────────────────────────────────────── */
function OnboardingFlow({ user, onComplete }) {
  const [step, setStep] = useState(0);
  const [busy, setBusy] = useState(false);
  const [data, setData] = useState({
    businessName: "",
    bizTypeId:    "",
    brandColor:   "#4f8ef7",
    brandLogo:    "",
    serviceAreas: [],
    weeklyGoal:   1200,
    targetProfit: 100,
  });

  const setF = (k, v) => setData(p => ({ ...p, [k]: v }));

  const next = () => {
    if (step === 0 && !data.businessName.trim()) { window.toast && window.toast("Enter a business name", "warn"); return; }
    if (step === 1 && !data.bizTypeId) { window.toast && window.toast("Pick a business type", "warn"); return; }
    if (step === 3 && (!Array.isArray(data.serviceAreas) || data.serviceAreas.length === 0)) {
      window.toast && window.toast("Add at least one city you service", "warn");
      return;
    }
    setStep(s => Math.min(4, s + 1));
  };
  const back = () => setStep(s => Math.max(0, s - 1));

  const finish = async () => {
    setBusy(true);
    try {
      const settings = {
        ...defaultSettings(data.bizTypeId),
        businessName: data.businessName.trim(),
        bizTypeId:    data.bizTypeId,
        brandColor:   data.brandColor,
        // Dual-write logo to both field names so any reader works
        brandLogo:    data.brandLogo,
        businessLogo: data.brandLogo,
        serviceAreas: Array.isArray(data.serviceAreas) ? data.serviceAreas : [],
        weeklyGoal:   Number(data.weeklyGoal) || 1200,
        defaultTargetProfit: Number(data.targetProfit) || 100,
      };
      // Persist locally so app doesn't bounce back to onboarding while we
      // wait for the server-side completion. The local write is also our
      // offline fallback if the user finishes onboarding without network.
      const _uid = user && user.uid;
      if (_uid) persistTenant(KEYS.settings, _uid, settings);
      else      persist(KEYS.settings, settings); // local-only mode

      if (!isLocalUser(user) && _auth && _auth.currentUser) {
        // Call the server endpoint that flips `onboarded: true` and writes
        // settings with admin SDK. This is preferred over a direct Firestore
        // write because:
        //   1. The new strict rules forbid the client from setting billing
        //      fields. The completeOnboarding function ONLY touches non-
        //      billing fields, so it would work without admin SDK — but
        //      having it server-side gives us a single audit point and lets
        //      us add validation (e.g., business-name uniqueness) later
        //      without a client release.
        //   2. The settings sub-doc gets written atomically with the
        //      profile flag flip. No half-onboarded state.
        try {
          const token = await _auth.currentUser.getIdToken();
          const endpoint = (CFG.stripe && CFG.stripe.checkoutEndpoint || "")
            .replace(/createCheckoutSession\/?$/, "completeOnboarding");
          if (endpoint && endpoint !== CFG.stripe.checkoutEndpoint) {
            const res = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({
                businessName: settings.businessName,
                bizTypeId:    settings.bizTypeId,
                brandColor:   settings.brandColor,
                brandLogo:    settings.brandLogo,
                businessLogo: settings.brandLogo,
                serviceAreas: settings.serviceAreas,
                weeklyGoal:   settings.weeklyGoal,
                defaultTargetProfit: settings.defaultTargetProfit,
              }),
            });
            if (!res.ok) throw new Error("completeOnboarding failed: " + res.status);
          } else {
            // No completeOnboarding endpoint configured — fall back to
            // direct write of non-billing fields only. Billing fields are
            // server-managed by onUserCreate.
            await userDoc(user.uid).set({
              businessName: settings.businessName,
              bizTypeId:    settings.bizTypeId,
              onboarded:    true,
              onboardedAt:  Date.now(),
            }, { merge: true });
            if (tSettingDoc(user.uid)) {
              const flat = {};
              Object.keys(settings).forEach(k => {
                const v = settings[k];
                if (v == null) return;
                flat[k] = typeof v === "object" ? JSON.stringify(v) : v;
              });
              await tSettingDoc(user.uid).set(flat).catch(() => {});
            }
          }
        } catch (e) {
          console.warn("Server onboarding completion failed; using direct write fallback:", e);
          // Last-resort fallback: direct client write of non-billing fields
          await userDoc(user.uid).set({
            businessName: settings.businessName,
            bizTypeId:    settings.bizTypeId,
            onboarded:    true,
            onboardedAt:  Date.now(),
          }, { merge: true }).catch(() => {});
          if (tSettingDoc(user.uid)) {
            const flat = {};
            Object.keys(settings).forEach(k => {
              const v = settings[k];
              if (v == null) return;
              flat[k] = typeof v === "object" ? JSON.stringify(v) : v;
            });
            await tSettingDoc(user.uid).set(flat).catch(() => {});
          }
        }
      }
      applyBranding(settings);
      onComplete(settings);
    } finally { setBusy(false); }
  };

  const onLogoUpload = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type || !file.type.startsWith("image/")) {
      window.toast && window.toast("Please choose a PNG, JPG, or WEBP image", "warn");
      e.target.value = ""; return;
    }
    if (file.size > 500 * 1024) {
      window.toast && window.toast("Logo too large (" + Math.round(file.size/1024) + "KB). Max is 500KB.", "warn");
      e.target.value = ""; return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result || "");
      // Onboarding state uses brandLogo (existing). The finish() handler
      // writes both businessLogo + brandLogo to settings.
      setF("brandLogo", dataUrl);
    };
    reader.onerror = () => {
      window.toast && window.toast("Could not read that file. Try a different image.", "warn");
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  return html`<div class="auth-shell" style=${{ overflowY: "auto", paddingTop: "calc(env(safe-area-inset-top) + 24px)", paddingBottom: 32 }}>
    <div style=${{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
      <${BrandMark} size=${42}/>
      <div style=${{
        fontSize: 11, color: "var(--gold)", fontWeight: 600,

/* ────────────────────────────────────────────────────────────────────────────
   PLANS / BILLING SCREEN

   Calls a Cloud Function (createCheckoutSession) which creates a Stripe
   Checkout session and returns a URL. The function code lives in /functions
   (provided separately in the deploy guide). Webhook updates Firestore on
   successful payment.
   ──────────────────────────────────────────────────────────────────────────── */
function PlansScreen({ user, profile, onClose }) {
  const [busy, setBusy] = useState("");
  const currentPlan = (profile && profile.plan) || "starter";

  const goCheckout = async (planId) => {
    setBusy(planId);
    try {
      const priceId = PLANS[planId].priceId();
      if (!priceId || priceId.indexOf("REPLACE") >= 0) {
        window.toast && window.toast("Stripe price IDs not configured yet", "error");
        setBusy("");
        return;
      }
      // Get a fresh ID token to authenticate the request
      const token = _auth && _auth.currentUser ? await _auth.currentUser.getIdToken() : "";
      const res = await fetch(CFG.stripe.checkoutEndpoint, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + token },
        body: JSON.stringify({ priceId, uid: user.uid, returnUrl: location.href })
      });
      if (!res.ok) throw new Error("Checkout creation failed");
      const json = await res.json();
      if (json.url) window.location.href = json.url;
      else throw new Error("No checkout URL returned");
    } catch (e) {
      console.warn(e);
      window.toast && window.toast("Could not start checkout. Try again.", "error");
      setBusy("");
    }
  };

  const openPortal = async () => {
    setBusy("portal");
    try {
      const token = _auth && _auth.currentUser ? await _auth.currentUser.getIdToken() : "";
      const res = await fetch(CFG.stripe.portalEndpoint, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + token },
        body: JSON.stringify({ uid: user.uid, returnUrl: location.href })
      });
      const json = await res.json();
      if (json.url) window.location.href = json.url;
      else throw new Error("No portal URL");
    } catch (e) {
      window.toast && window.toast("Could not open billing portal", "error");
      setBusy("");
    }
  };

  return html`<div class="screen"><div class="page page-enter">
    ${onClose && html`<div style=${{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
      <button class="btn secondary press-scale" style=${{ padding: "8px 14px", fontSize: 13 }} onClick=${onClose}>← Back</button>
      <div style=${{ flex: 1, fontSize: 18, fontWeight: 800, letterSpacing: "-.3px" }}>Plans &amp; Billing</div>
    </div>`}

    <div class="display-serif" style=${{ fontSize: 32, color: "#fff", marginBottom: 6, lineHeight: 1.15 }}>
      Pick your <em>plan</em>
    </div>
    <div style=${{ color: "var(--t2)", fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>
      Cancel anytime. All plans include cloud sync, mobile-first UI, and 14-day free trial.
    </div>

    <div style=${{ display: "grid", gap: 14, marginBottom: 20 }}>
      ${PLAN_LIST.map(p => {
        const isCurrent = currentPlan === p.id;
        const limits = p.limits;
        return html`<div key=${p.id} class=${"plan-card" + (p.recommended ? " recommended" : "")}>
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div class="plan-name">${p.name}</div>
              <div class="plan-price">$${p.price}<span class="per">/mo</span></div>
            </div>
            ${isCurrent && html`<span style=${{ background: "var(--green-dim)", color: "var(--green)", padding: "4px 10px", borderRadius: 999, fontSize: 10, fontWeight: 800, letterSpacing: ".5px" }}>CURRENT</span>`}
          </div>
          <div style=${{ marginTop: 14, marginBottom: 18 }}>
            ${p.features.map((f, i) => html`<div key=${i} class="plan-feat">${f}</div>`)}
          </div>
          ${isCurrent
            ? html`<button class="btn secondary press-scale" style=${{ width: "100%" }} onClick=${openPortal} disabled=${busy === "portal"}>
                ${busy === "portal" ? "Opening…" : "Manage Subscription"}
              </button>`
            : html`<button class=${"btn " + (p.recommended ? "primary" : "secondary") + " press-scale"} style=${{ width: "100%" }}
                onClick=${() => goCheckout(p.id)} disabled=${busy === p.id}>
                ${busy === p.id ? "Redirecting…" : (currentPlan === "starter" ? "Start " + p.name + " trial" : "Switch to " + p.name)}
              </button>`}
        </div>`;
      })}
    </div>

    <div style=${{ background: "var(--s1)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px", fontSize: 12, color: "var(--t3)", lineHeight: 1.6, textAlign: "center" }}>
      Secured by <strong style=${{ color: "var(--t2)" }}>Stripe</strong>. Cancel from the billing portal anytime — no long-term commitment.
    </div>
  </div></div>`;
}

function FeatureGate({ profile, featureKey, title, sub, onUpgrade, children }) {
  if (hasFeature(profile, featureKey)) return children;
  // Use centralized prompts if title/sub not provided, so copy is consistent
  // across the app and value-focused rather than feature-focused.
  const prompt = UPGRADE_PROMPTS[featureKey] || {};
  const _title = title || prompt.title || "Upgrade to unlock";
  const _sub   = sub   || prompt.sub;
  const _cta   = prompt.cta || "See Plans";
  return html`<div style=${{ position: "relative" }}>
    ${children}
    <div class="gate-overlay">
      <div class="gate-icon">${prompt.icon || "🔒"}</div>
      <div class="gate-title">${_title}</div>
      ${_sub && html`<div class="gate-sub">${_sub}</div>`}
      <button class="btn primary press-scale" style=${{ marginTop: 6 }} onClick=${onUpgrade}>${_cta}</button>
    </div>
  </div>`;
}

// ── Toast host — global window.toast(msg, kind) ────────────────────────────
function ToastHost() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    window.toast = (msg, kind = "info", ms = 2600) => {
      const id = Math.random().toString(36).slice(2);
      setToasts(prev => [...prev, { id, msg: String(msg || ""), kind, leaving: false }]);
      setTimeout(() => {
        setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 240);
      }, ms);
    };
    return () => { try { delete window.toast; } catch {} };
  }, []);
  if (!toasts.length) return null;
  const iconFor = k => k === "success" ? "✓" : k === "warn" ? "⚠" : k === "error" ? "✕" : "ℹ";
  return html`<div class="toast-stack">
    ${toasts.map(t => html`<div key=${t.id} class=${"toast " + t.kind + (t.leaving ? " leaving" : "")}>
      <span class="toast-icon">${iconFor(t.kind)}</span>
      <span style=${{ flex: 1, minWidth: 0 }}>${t.msg}</span>
    </div>`)}
  </div>`;
}

// ── Error boundary ─────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { crashed: false, error: null }; }
  static getDerivedStateFromError(error) { return { crashed: true, error }; }
  componentDidCatch(error, info) { console.error("MSO crash:", error, info); }
  render() {
    if (this.state.crashed) {
      return React.createElement("div", {
        style: { height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#0a0a0f", padding: "32px", gap: 16 }
      },
        React.createElement("div", { style: { fontSize: 40 } }, "⚠️"),
        React.createElement("div", { style: { color: "#f0f0fa", fontSize: 18, fontWeight: 700 } }, "Something went wrong"),
        React.createElement("div", { style: { color: "#8888a8", fontSize: 13, textAlign: "center", lineHeight: 1.6, maxWidth: 280 } }, "The app hit an error. Tap to recover."),
        React.createElement("div", { style: { color: "#44445a", fontSize: 11, textAlign: "center", fontFamily: "monospace", maxWidth: 320, wordBreak: "break-all" } }, String(this.state.error || "").slice(0, 140)),
        React.createElement("button", {
          onClick: () => this.setState({ crashed: false, error: null }),
          style: { background: "linear-gradient(135deg,#5a97ff,#3d7ef5)", color: "#fff", border: "none", borderRadius: 12, padding: "14px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 8 }
        }, "Reload")
      );
    }
    return this.props.children;
  }
}

}

// ── Progress ring ──────────────────────────────────────────────────────────
function ProgressRing({ size, stroke, pct, color, children }) {
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (clamp(pct, 0, 100) / 100) * circ;
  return html`<div class="progress-ring" style=${{ width: size, height: size }}>
    <svg width=${size} height=${size}>
      <circle class="progress-ring-bg" cx=${size / 2} cy=${size / 2} r=${radius} strokeWidth=${stroke}/>
      <circle class="progress-ring-fill" cx=${size / 2} cy=${size / 2} r=${radius} strokeWidth=${stroke}
        stroke=${color} style=${{ strokeDasharray: circ, strokeDashoffset: offset, color }}/>
    </svg>
    <div class="progress-ring-label">${children}</div>
  </div>`;
}
