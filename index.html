<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mobile Service OS" />
  <meta name="theme-color" content="#0B0B0B" />
  <meta name="description" content="Mobile Service OS — operating system for mobile tire and roadside assistance businesses." />
  <title>Mobile Service OS — Mobile Tire &amp; Roadside</title>

  <!-- ════════════════════════════════════════════════════════════════
       SERVICE WORKER MIGRATION SAFETY NET
       ════════════════════════════════════════════════════════════════
       Runs before any other script. If a stale service worker is
       active with the legacy /mobileserviceos/ scope (left over from
       the old GitHub Pages project URL), this unregisters it and
       clears its caches, then hard-reloads. One-time per session;
       safe to leave in permanently. ════════════════════════════════ -->
  <script>
    (function () {
      try {
        if (sessionStorage.getItem('msos-sw-migrated-v2') === '1') return;
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var stale = false;
          var promises = [];
          regs.forEach(function (r) {
            var scope = (r.scope || '');
            if (scope.indexOf('/mobileserviceos/') !== -1) {
              stale = true;
              promises.push(r.unregister());
            }
          });
          if (!stale) {
            sessionStorage.setItem('msos-sw-migrated-v2', '1');
            return;
          }
          if (window.caches) {
            promises.push(
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              })
            );
          }
          Promise.all(promises).then(function () {
            sessionStorage.setItem('msos-sw-migrated-v2', '1');
            location.reload(true);
          });
        }).catch(function () { /* silent */ });
      } catch (e) { /* silent */ }
    })();
  </script>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="shortcut icon" href="icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png" />
  <!-- Phase-5 splash polish: iOS standalone mode uses
       apple-touch-startup-image for the launch screen. Without it,
       installed PWAs show a generic blank white flash. A single
       fallback to the 1024 icon gives every iPhone something
       on-brand to show during boot. Per-device images (iPhone X /
       12 / 14 / etc) can be added later for pixel-perfect splash. -->
  <link rel="apple-touch-startup-image" href="icons/icon-1024.png" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0f; color: #f0f0fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #boot-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      /* Subtle radial glow behind everything — implies the brand
         tone before the icon even loads. */
      background:
        radial-gradient(ellipse at center, rgba(200,164,74,.10) 0%, rgba(200,164,74,0) 55%),
        #0a0a0f;
      transition: opacity .35s ease;
    }
    #boot-splash.hide { opacity: 0; pointer-events: none; }

    /* Icon: gentle breathing + a soft glow ring that pulses in
       counter-phase so the brand color reads even at a glance. */
    @keyframes bp     { 0%,100% { opacity: 1; transform: scale(1); }      50% { opacity: .82; transform: scale(.97); } }
    @keyframes bpHalo { 0%,100% { opacity: 0; transform: scale(1); }      50% { opacity: .55; transform: scale(1.18); } }

    #boot-splash .wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    #boot-splash .halo {
      position: absolute; width: 140px; height: 140px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(200,164,74,.45) 0%, rgba(200,164,74,0) 65%);
      animation: bpHalo 2.2s ease-in-out infinite;
      pointer-events: none;
    }
    #boot-splash img {
      width: 88px; height: 88px; border-radius: 20px;
      box-shadow:
        0 12px 40px rgba(200,164,74,.30),
        0 0 0 1px rgba(200,164,74,.22);
      animation: bp 1.8s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    #boot-splash .t { margin-top: 24px; font-size: 15px; font-weight: 700; letter-spacing: .5px; }
    #boot-splash .s { margin-top: 4px; color: #6a6a82; font-size: 11px; font-weight: 600; }
    #boot-error { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; background: #0a0a0f; padding: 32px; text-align: center; }
    #boot-error.show { display: flex; }
    #boot-error .ico { font-size: 44px; margin-bottom: 18px; }
    #boot-error h2 { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    #boot-error p { font-size: 13px; color: #8888a8; max-width: 320px; line-height: 1.5; margin: 0 0 18px; }
    #boot-error code { display: block; margin: 0 0 18px; padding: 10px 12px; background: #13131a; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: #ef4444; max-width: 320px; word-break: break-word; text-align: left; }
    #boot-error button { background: linear-gradient(135deg, #c8a44a, #a0843b); color: #0a0a0f; border: none; padding: 12px 22px; font-size: 14px; font-weight: 700; border-radius: 10px; cursor: pointer; }
    #boot-error a { color: #c8a44a; font-size: 12px; margin-top: 12px; text-decoration: none; }
  </style>

  <script>
    // SPA-fallback restore: 404.html stashes the original path here for deep-link refreshes
    (function () {
      try {
        var r = sessionStorage.getItem('msos_redirect');
        if (r) {
          sessionStorage.removeItem('msos_redirect');
          if (r !== location.pathname + location.search + location.hash) {
            history.replaceState(null, '', r);
          }
        }
      } catch (e) {}
    })();

    // Boot watchdog: if React doesn't signal ready within 12s, show diagnostic.
    // App calls window.__msosReady() once mounted to clear the watchdog.
    window.__msosBootStart = Date.now();
    window.__msosBootError = null;
    window.__msosReady = function () {
      window.__msosBootDone = true;
      var s = document.getElementById('boot-splash');
      if (s) { s.classList.add('hide'); setTimeout(function () { s.remove(); }, 300); }
    };
    window.__msosShowError = function (title, detail) {
      var e = document.getElementById('boot-error');
      if (!e) return;
      var t = document.getElementById('boot-error-title'); if (t) t.textContent = title || 'App failed to start';
      var d = document.getElementById('boot-error-detail'); if (d && detail) d.textContent = String(detail).slice(0, 500);
      e.classList.add('show');
    };
    window.addEventListener('error', function (ev) {
      window.__msosBootError = ev.error || ev.message || 'unknown';
      console.error('[msos boot] error:', ev.error || ev.message, ev.filename, ev.lineno);
    });
    window.addEventListener('unhandledrejection', function (ev) {
      window.__msosBootError = ev.reason || 'unhandled promise';
      console.error('[msos boot] unhandled rejection:', ev.reason);
    });
    setTimeout(function () {
      if (window.__msosBootDone) return;
      var detail = window.__msosBootError ? String((window.__msosBootError && window.__msosBootError.message) || window.__msosBootError) : 'No JavaScript loaded within 12 seconds.';
      window.__msosShowError('App failed to start', detail);
    }, 12000);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Audit P1 (2026-05-31): the stylesheet href was a synchronous
       render-blocking <link rel="stylesheet">. On LTE that added one
       extra round-trip to fonts.googleapis.com plus a chained
       round-trip to fonts.gstatic.com before the browser's CSSOM
       finished, pushing LCP back 400-900ms on cellular cold start.
       The preload+onload pattern fetches the stylesheet asynchronously
       and applies it once available, while keeping a <noscript>
       fallback for the rare JS-disabled visit. The display=swap query
       parameter still applies, so fallback fonts paint instantly. -->
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />
  </noscript>
</head>
<body>
  <div id="boot-splash">
    <div class="wrap">
      <div class="halo" aria-hidden="true"></div>
      <img src="icons/icon-rounded-192.png" alt="Mobile Service OS" />
    </div>
    <div class="t">Mobile Service OS</div>
    <div class="s">Loading your business…</div>
  </div>
  <div id="boot-error">
    <div class="ico">⚠️</div>
    <h2 id="boot-error-title">App failed to start</h2>
    <p>Something went wrong while loading the app. Try a hard refresh, or clear site data and reload.</p>
    <code id="boot-error-detail">—</code>
    <button onclick="(async function(){try{if('serviceWorker' in navigator){var rs=await navigator.serviceWorker.getRegistrations();for(var r of rs)await r.unregister();}if(window.caches){var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k);}));}}catch(e){}location.reload(true);})();">
      Clear cache &amp; reload
    </button>
    <a href="javascript:location.reload(true);">Just reload</a>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
